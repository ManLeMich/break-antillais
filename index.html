#app-overlay { position:fixed; inset:0; z-index:0; pointer-events:none; background:rgba(8,6,4,.62); }
body > *:not(#loading):not(#app-bg):not(nav) { position:relative; z-index:1; }


@keyframes spin { to { transform: rotate(360deg); } }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .5; } }
@keyframes slideDown { from { transform: translateY(-100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
@keyframes confettiFall { 0% { transform: translateY(-20px) rotate(0deg); opacity:1; } 100% { transform: translateY(100vh) rotate(720deg); opacity:0; } }
@keyframes confettiWiggle { 0%,100% { transform: skewX(-5deg); } 50% { transform: skewX(5deg); } }
@keyframes bounceIn { 0% { transform:scale(0); opacity:0; } 60% { transform:scale(1.2); } 80% { transform:scale(.95); } 100% { transform:scale(1); opacity:1; } }
@keyframes pointsCount { from { transform:scale(1.4); color:#D4AF37; } to { transform:scale(1); } }
@keyframes palierGlow { 0%,100% { box-shadow:0 0 15px rgba(212,175,55,.3); } 50% { box-shadow:0 0 30px rgba(212,175,55,.7); } }

/* QR */
.qr-wrap { display:flex; flex-direction:column; align-items:center; gap:1.25rem; padding:2rem 1rem 1rem; }
.qr-box { background:#fff; padding:1.2rem; border-radius:16px; box-shadow:0 8px 32px rgba(200,35,43,.25); }
.qr-box canvas { display:block !important; } .qr-box img { display:none !important; }

/* CGV */
.cgv-content { font-size:.85rem; line-height:1.7; color:rgba(240,236,228,.85); }
.cgv-content h3 { font-family:var(--head); font-size:.95rem; font-weight:800; color:#fff; margin:1.25rem 0 .4rem; }
.cgv-content p { margin-bottom:.65rem; }

/* ── LOADING ── */
#loading {
  position: fixed; inset: 0; background: #0a0a0a;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  z-index: 9999; gap: 0; overflow: hidden;
}
#loading img { width: 100%; height: 100%; object-fit: cover; position: absolute; inset: 0; opacity: .15; }
#loading-inner { position: relative; z-index: 1; text-align: center; }
#loading-logo-wrap { margin-bottom: 2rem; animation: loadLogoIn 1s cubic-bezier(.16,1,.3,1) forwards; }
@keyframes loadLogoIn { from { opacity:0; transform: translateY(30px) scale(.9); } to { opacity:1; transform: translateY(0) scale(1); } }
#loading-tagline { font-size:.85rem; color:rgba(200,35,43,.8); letter-spacing:.15em; text-transform:uppercase; font-weight:700; margin-bottom:2.5rem; opacity:0; animation: fadeIn .6s ease .8s forwards; }
#loading-dots { display:flex; gap:.5rem; justify-content:center; opacity:0; animation: fadeIn .4s ease 1.2s forwards; }
.loading-dot { width:8px; height:8px; border-radius:50%; background:var(--red); animation: dotPulse 1.2s ease-in-out infinite; }
.loading-dot:nth-child(2) { animation-delay:.2s; }
.loading-dot:nth-child(3) { animation-delay:.4s; }
@keyframes dotPulse { 0%,80%,100% { transform:scale(.6); opacity:.4; } 40% { transform:scale(1); opacity:1; } }
#loading-spinner { display:none; }

/* ── SCREENS ── */
.screen { display: none; min-height: 100vh; background: transparent; animation: fadeIn .25s ease; padding-bottom: 75px; }
@keyframes homeReveal { 0% { opacity:0; transform:scale(1.04) translateY(12px); } 100% { opacity:1; transform:scale(1) translateY(0); } }
.home-reveal { animation: homeReveal .55s cubic-bezier(.16,1,.3,1) forwards; }
@keyframes flameWiggle { 0%,100% { transform: rotate(-8deg) scale(1); } 25% { transform: rotate(8deg) scale(1.1); } 50% { transform: rotate(-5deg) scale(.95); } 75% { transform: rotate(5deg) scale(1.05); } }
.flame-anim { display:inline-block; animation: flameWiggle .6s ease-in-out infinite; }
@keyframes badgePulse { 0%,100% { transform:scale(1); } 50% { transform:scale(1.08); } }
.status-preparing-anim { animation: badgePulse 1.5s ease infinite; }
.screen.active { display: block; }

/* ── HEADER ── */
.header {
  background: var(--dark2); border-bottom: 1px solid var(--border);
  padding: .7rem 1.1rem; display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 100; backdrop-filter: blur(10px);
}
.logo { display: flex; align-items: center; gap: 0; line-height: 1; }
.logo-break { font-family: var(--head); font-weight: 800; font-size: 1.25rem; color: #fff; letter-spacing: -.02em; }
.logo-antillais { font-family: var(--script); font-weight: 700; font-size: 1.15rem; color: var(--red); margin-left: .18rem; }

/* ── BOTTOM NAV ── */
.nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--dark2); border-top: 1px solid var(--border);
  display: flex; z-index: 9999; padding-bottom: env(safe-area-inset-bottom);
  transform: translateZ(0); -webkit-transform: translateZ(0);
}
.nav-btn {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  padding: .6rem .4rem; border: none; background: none;
  color: var(--muted); font-family: var(--body); font-size: .62rem;
  font-weight: 600; gap: .22rem; cursor: pointer; transition: color .2s;
  position: relative; letter-spacing: .02em; text-transform: uppercase;
}
.nav-btn svg { width: 20px; height: 20px; }
.nav-btn.active { color: var(--red); }
.nav-badge {
  position: absolute; top: 4px; right: calc(50% - 18px);
  background: var(--red); color: #fff; font-size: .58rem; font-weight: 700;
  min-width: 15px; height: 15px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center; padding: 0 3px;
  transition: transform .15s;
}
@keyframes badgeBounce { 0% { transform:scale(1); } 30% { transform:scale(1.7); } 60% { transform:scale(.85); } 80% { transform:scale(1.2); } 100% { transform:scale(1); } }
.badge-bounce { animation: badgeBounce .45s cubic-bezier(.36,.07,.19,.97); }
/* ── Masquer la nav pendant le chargement ── */
.nav { display: none; }
.app-ready .nav { display: flex; }

/* ── BUTTONS ── */
.btn {
  display: inline-flex; align-items: center; justify-content: center;
  gap: .45rem; padding: .75rem 1.4rem; border-radius: var(--radius-sm);
  border: none; cursor: pointer; font-family: var(--body);
  font-weight: 600; font-size: .88rem; transition: all .2s; text-decoration: none;
}
.btn-primary { background: var(--red); color: #fff; box-shadow: 0 4px 18px rgba(200,35,43,.3); }
.btn-primary:hover { background: var(--red2); transform: translateY(-1px); }
.btn-secondary { background: rgba(255,255,255,.06); color: var(--text); border: 1px solid var(--border); }
.btn-secondary:hover { background: rgba(255,255,255,.1); }
.btn-danger { background: #991b1b; color: #fff; }
.btn-full { width: 100%; }
.btn-sm { padding: .45rem .9rem; font-size: .8rem; }
.btn:disabled { opacity: .4; cursor: not-allowed; }

/* ── FORMS ── */
.form-group { display: flex; flex-direction: column; gap: .35rem; margin-bottom: .85rem; }
.form-label { font-size: .72rem; font-weight: 700; color: var(--muted); letter-spacing: .07em; text-transform: uppercase; }
.form-input, .form-select, .form-textarea {
  background: var(--dark3); border: 1.5px solid var(--border);
  border-radius: var(--radius-sm); padding: .7rem .95rem;
  color: var(--text); font-family: var(--body); font-size: .92rem;
  width: 100%; transition: border-color .2s; outline: none;
}
.form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--red); }
.form-input::placeholder { color: var(--muted); }
.form-textarea { resize: vertical; min-height: 90px; }
.form-select option { background: var(--dark3); }
.form-error { color: #f87171; font-size: .78rem; display: none; margin-top: .2rem; }
.form-error.show { display: block; }

/* ── CARD ── */
.card { background: var(--dark3); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.1rem; }

/* ── MODAL ── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.85); z-index: 500;
  display: flex; align-items: flex-end; justify-content: center;
  padding: .5rem;
  padding-top: max(.5rem, env(safe-area-inset-top));
  padding-bottom: calc(.5rem + env(safe-area-inset-bottom) + 72px);
  animation: fadeIn .2s ease;
}
.modal {
  background: var(--dark2); border: 1px solid var(--border);
  border-radius: var(--radius);
  width: 100%; max-width: 520px;
  max-height: min(92dvh, calc(100dvh - env(safe-area-inset-top) - env(safe-area-inset-bottom) - 84px));
  max-height: min(92vh, calc(100vh - 84px));
  overflow-y: auto;
  padding: 1.4rem; animation: slideUp .28s ease;
}
.modal-handle { width: 36px; height: 3px; background: var(--border); border-radius: 2px; margin: 0 auto 1.1rem; }
.modal-title { font-family: var(--head); font-size: 1.25rem; font-weight: 800; margin-bottom: 1.1rem; }

.modal-scroll { overflow-y: auto; flex: 1; min-height: 0; -webkit-overflow-scrolling: touch; }
.modal-checkout { display:flex; flex-direction:column; overflow:hidden; padding:0; }
.modal-checkout .checkout-head { padding:1rem 1.2rem .75rem; border-bottom:1px solid var(--border); flex-shrink:0; }
.modal-checkout .checkout-body { padding:1rem 1.2rem; }
.modal-checkout .checkout-foot { padding:.9rem 1.2rem; border-top:1px solid var(--border); background:var(--dark2); flex-shrink:0; }

/* Forcing modals to stay fully visible (no scroll) on small screens */
.modal-fit-no-scroll { overflow: hidden !important; }
.modal-fit-no-scroll .modal-scroll { overflow: hidden !important; }

@media (max-width: 640px) {
  .modal { border-radius: var(--radius) var(--radius) 0 0; }
}
@media (min-width: 768px) {
  .modal-overlay { align-items: center; }
}

/* ── CHIPS ── */
.chips { display: flex; flex-wrap: wrap; gap: .35rem; }
.chip {
  padding: .38rem .8rem; border: 1.5px solid var(--border);
  border-radius: 100px; font-size: .78rem; font-weight: 600;
  cursor: pointer; transition: all .15s; background: transparent; color: var(--text);
}
.chip:hover { border-color: var(--red); color: var(--red); }
.chip.on { background: var(--red); color: #fff; border-color: var(--red); }

/* ── PRODUCT GRID ── */
.tabs { display: flex; gap: .35rem; overflow-x: auto; padding: .65rem 1rem; scrollbar-width: none; }
.tabs::-webkit-scrollbar { display: none; }
.tab-btn {
  padding: .4rem .9rem; border: 1.5px solid var(--border); border-radius: 100px;
  background: transparent; color: var(--muted); font-family: var(--body);
  font-weight: 600; font-size: .76rem; cursor: pointer; white-space: nowrap;
  transition: all .15s; flex-shrink: 0;
}
.tab-btn.active { background: var(--red); color: #fff; border-color: var(--red); }
.pgrid { display: grid; grid-template-columns: 1fr 1fr; gap: .65rem; padding: 0 .9rem .9rem; }
.pcard {
  background: var(--dark3); border: 1.5px solid var(--border);
  border-radius: var(--radius); overflow: hidden; cursor: pointer;
  transition: all .2s; position: relative;
}
.pcard:hover { border-color: var(--red); transform: translateY(-2px); box-shadow: 0 6px 20px rgba(200,35,43,.15); }
.pcard.unavail { opacity: .45; cursor: not-allowed; }
.pcard-img { width: 100%; height: 100px; background: var(--dark4); display: flex; align-items: center; justify-content: center; font-size: 2.2rem; }
.pcard-img img { width: 100%; height: 100%; object-fit: cover; }
.pcard-body { padding: .65rem .75rem; }

.soon-badge {

  background: var(--red); color: #fff; font-size: .6rem;

}

/* ── CART ── */
.cart-item {
  display: flex; align-items: flex-start; gap: .85rem;

.cart-item-name { font-weight: 700; font-size: .88rem; margin-bottom: .15rem; }

.empty-state { text-align: center; padding: 3.5rem 1rem; color: var(--muted); }
.empty-state .icon { font-size: 3.5rem; margin-bottom: .75rem; }
.empty-state .title { font-family: var(--head); font-size: 1.2rem; font-weight: 800; color: var(--text); margin-bottom: .4rem; }

/* ── SLOTS ── */
.slot-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: .5rem; }
.slot-btn {
  padding: .75rem .5rem; border: 1.5px solid var(--border); border-radius: var(--radius-sm);

.slot-btn:hover:not(.full):not(.on) { border-color: var(--red); color: var(--red) !important; }
.slot-btn.on { background: var(--red) !important; color: #fff !important; border-color: var(--red) !important; }
.slot-btn.full { opacity: .35; cursor: not-allowed; background: var(--dark4); }

.pay-opt.on { border-color: var(--red); background: rgba(200,35,43,.07); }

/* ── STATUS ── */

/* ── PROFILE ── */

.pts-card::before {

.avatar {

  justify-content: center; font-family: var(--head);
  font-weight: 800; font-size: .95rem; color: #fff; flex-shrink: 0;
}

/* ── ADMIN ── */
.admin-tabs { display: flex; flex-wrap: wrap; gap: .4rem; padding: .85rem; }
.admin-tab {
  flex: 1; min-width: 80px; padding: .62rem .4rem;

.admin-tab.active, .admin-tab:hover { border-color: var(--red); color: var(--red); background: rgba(200,35,43,.07); }
.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: .65rem; padding: 0 .9rem; }
.stat-card { background: var(--dark3); border: 1px solid var(--border); border-radius: var(--radius); padding: .9rem; text-align: center; }

/* ── SECTION TITLE ── */

/* ── TOAST ── */
.toast-wrap { position: fixed; top: 1rem; right: 1rem; z-index: 9999; display: flex; flex-direction: column; gap: .4rem; max-width: 290px; pointer-events: none; }

}

/* ── UTILS ── */
.divider { height: 1px; background: var(--border); margin: 1.1rem 0; }
.text-red { color: var(--red); } .text-gold { color: var(--gold); } .text-muted { color: var(--muted); }
.text-center { text-align: center; } .text-sm { font-size: .8rem; }

<script>

'use strict';

// ══ FIREBASE ══
var firebaseConfig = {
  apiKey: "AIzaSyD9EarYlpDbDfPL3n7AXS0Dv8U1tyTWeR8",
  authDomain: "application-break-antillais.firebaseapp.com",
  databaseURL: "https://application-break-antillais-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "application-break-antillais",
  storageBucket: "application-break-antillais.firebasestorage.app",
  messagingSenderId: "788821898426",
  appId: "1:788821898426:web:992bc58a2f829028407e83"
};
firebase.initializeApp(firebaseConfig);
var db = firebase.database();
var storage = firebase.storage();
var messaging = null;
try { messaging = firebase.messaging(); } catch(e) { console.log('FCM not available:', e); }

// OneSignal init
var ONESIGNAL_APP_ID = '924617f0-5d1b-47ea-8951-1f2e86ec8eb1';
window.OneSignalDeferred = window.OneSignalDeferred || [];
OneSignalDeferred.push(function(OneSignal) {
  OneSignal.init({
    appId: ONESIGNAL_APP_ID,
    allowLocalhostAsSecureOrigin: true,
    serviceWorkerPath: 'OneSignalSDK.sw.js',
    serviceWorkerParam: { scope: '/break-antillais/' },
    notifyButton: { enable: false }
  });
});

function osSubscribe(userId) {
  if (!window.OneSignalDeferred) return;
  OneSignalDeferred.push(function(OneSignal) {
    // Demande permission si pas encore accordée
    OneSignal.Notifications.requestPermission();
    // Lie l'external_id (pour ciblage par external_id)
    OneSignal.login(userId).catch(function(e){ console.warn('OS login:', e); });
    // Ajoute aussi le tag (double sécurité)
    OneSignal.User.addTag('userId', userId);
  });
}

// OneSignal REST API key - needed to send push from browser
// Get it from OneSignal Dashboard > Settings > Keys & IDs > REST API Key
var OS_REST_KEY = 'os_v2_app_sjdbp4c5dnd6vckrd4xin3eowfvscoorm5cu3tvek5nbtqgcaixhwzcsb4k7lmhocbybzbzdawmfzlqgxhug4r5odi66d5q5h4exzbi';

function osSendPush(userId, title, body, delayMs) {
  if (!OS_REST_KEY) {
    console.log('OneSignal REST key not set - storing in queue');
    db.ref('os_queue/'+Date.now()).set({
      userId:userId, title:title, body:body,
      delayMs:delayMs||0, at:new Date().toISOString(), sent:false
    });
    return;
  }
  // Ciblage par external_id (lié via OneSignal.login(userId) lors de la connexion)
  var payload = {
    app_id: ONESIGNAL_APP_ID,
    target_channel: 'push',
    include_aliases: { external_id: [String(userId)] },
    headings: {en: title, fr: title},
    contents: {en: body, fr: body},
    url: 'https://break-antillais.github.io/break-antillais',
    web_url: 'https://break-antillais.github.io/break-antillais'
  };
  if (delayMs) {
    payload.send_after = new Date(Date.now() + delayMs).toISOString();
  }
  fetch('https://onesignal.com/api/v1/notifications', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': 'Basic '+OS_REST_KEY
    },
    body: JSON.stringify(payload)
  }).then(function(r){ return r.json(); })
    .then(function(d){ console.log('OneSignal sent:', d); })
    .catch(function(e){ console.warn('OneSignal error:', e); });
}

// EmailJS init
var EMAILJS_SERVICE = 'service_uez8gro';
var EMAILJS_TEMPLATE = 'template_gs8itxh';
var EMAILJS_KEY = 'LLbn9BnRqyy4NjYAW';
try { emailjs.init(EMAILJS_KEY); } catch(e) { console.log('EmailJS not available:', e); }

function load(key, def) {
  try { var v = localStorage.getItem('_ba_'+key); return v ? JSON.parse(v) : def; } catch(e) { return def; }
}
function save(key, val) {
  try { localStorage.setItem('_ba_'+key, JSON.stringify(val)); } catch(e) {}
  db.ref('data/'+key).set(val !== undefined ? val : null).catch(function(e){ console.warn('FB write:',e); });
}

// Save single user by ID (prevents overwriting other users)
function saveUserToFirebase(user) {
  // Save individually to prevent overwrite
  db.ref('data/users/'+user.id).set(user).catch(function(e){ console.warn('FB user write:',e); });
  // Update local cache
  var users = load('ba_users', []);
  var idx = users.findIndex(function(u){ return u.id === user.id; });
  if (idx >= 0) users[idx] = user; else users.push(user);
  try { localStorage.setItem('_ba_ba_users', JSON.stringify(users)); } catch(e) {}
}

function loadFromFirebase(cb) {
  db.ref('data').once('value').then(function(snap) {
    var d = snap.val() || {};
    // Load all flat data
    Object.keys(d).forEach(function(k){
      if (k === 'users') return;
      try { localStorage.setItem('_ba_'+k, JSON.stringify(d[k])); } catch(e) {}
    });
    // Merge users: from ba_users array (old format) + users object (new format)
    var mergedUsers = {};
    // Old format: ba_users is an array
    var oldUsers = d['ba_users'] || [];
    if (Array.isArray(oldUsers)) {
      oldUsers.forEach(function(u){ if(u && u.id) mergedUsers[u.id] = u; });
    }
    // New format: users is an object keyed by ID
    var newUsers = d['users'] || {};
    Object.keys(newUsers).forEach(function(id){
      if (newUsers[id]) mergedUsers[id] = newUsers[id];
    });
    var usersArr = Object.values(mergedUsers);
    if (usersArr.length > 0) {
      try { localStorage.setItem('_ba_ba_users', JSON.stringify(usersArr)); } catch(e) {}
    }
    cb();
  }).catch(function(e){ console.warn('Firebase load error:', e); cb(); });
}

function startFirebaseListeners() {
  var user = getCurrentUser();
  var isAdmin = user && (user.role==='superadmin'||user.role==='admin'||user.role==='entreprise'||user.role==='preparateur');
  console.log('[Firebase] Starting listeners, user:', user ? user.prenom : 'none', 'isAdmin:', isAdmin);

  // Real-time orders sync - with status change detection
  db.ref('data/ba_orders').on('value', function(snap){
    var v = snap.val();
    if (v === null) return;
    var newOrders = Array.isArray(v) ? v : Object.values(v);
    var oldOrdersStr = localStorage.getItem('_ba_ba_orders');
    var oldOrders = oldOrdersStr ? JSON.parse(oldOrdersStr) : [];

    // Detect status changes for current client
    if (user && !isAdmin) {
      newOrders.forEach(function(newO) {
        if (!newO || newO.userId !== user.id) return;
        var oldO = oldOrders.find(function(o){ return o.id === newO.id; });
        if (oldO && oldO.status !== newO.status) {
          // Status changed!
          if (newO.status === 'ready') {
            showOrderReadyAlert(newO);
          } else if (newO.status === 'confirmed' || newO.status === 'preparing') {
            var msgs = {
              confirmed: '✅ Commande n°'+newO.orderNumber+' confirmee !',
              preparing: '👨‍🍳 Votre commande n°'+newO.orderNumber+' est en preparation !'
            };
            toast(msgs[newO.status]||'Statut mis a jour', 'info', 5000);
            sendPushNotif('Break Antillais', msgs[newO.status]||'Statut mis a jour');
          }
        }
      });
    }

    // Detect new orders for admin
    if (isAdmin && _adminAlertEnabled) {
      var newPending = newOrders.filter(function(o){ return o && o.status==='pending'; });
      var oldPending = oldOrders.filter(function(o){ return o && o.status==='pending'; });
      if (_lastOrderCount >= 0 && newPending.length > oldPending.length) {
        var added = newPending.filter(function(no){
          return !oldPending.find(function(oo){ return oo.id===no.id; });
        });
        added.forEach(function(o){
          playAdminAlert();
          showNewOrderBanner(o);
          sendPushNotif('🆕 Nouvelle commande !', 'N°'+o.orderNumber+' — '+o.userPrenom+' — '+fmt(o.total));
        });
      }
      _lastOrderCount = newPending.length;
    }

    // Save to cache
    try { localStorage.setItem('_ba_ba_orders', JSON.stringify(newOrders)); } catch(e) {}

    // Refresh UI if on relevant screen
    if (currentScreen === 'orders' && !isAdmin) renderOrders();
    if (currentScreen === 'profile' && isAdmin) {
      var ac = document.getElementById('admin-content');
      var activeTab = document.querySelector('.admin-tab.active');
      if (ac && activeTab) {
        if (activeTab.textContent.indexOf('Commandes') >= 0) ac.innerHTML = adminOrders();
        if (activeTab.textContent.indexOf('Dashboard') >= 0) ac.innerHTML = adminDashboard();
      }
    }
  });

  // Real-time users sync
  var mergeUsers = function() {
    var mergedUsers = {};
    db.ref('data/ba_users').once('value').then(function(s1){
      var old = s1.val() || [];
      if (Array.isArray(old)) old.forEach(function(u){ if(u&&u.id) mergedUsers[u.id]=u; });
      return db.ref('data/users').once('value');
    }).then(function(s2){
      var newU = s2.val() || {};
      Object.keys(newU).forEach(function(id){ if(newU[id]) mergedUsers[id]=newU[id]; });
      var arr = Object.values(mergedUsers);
      if (arr.length > 0) try { localStorage.setItem('_ba_ba_users', JSON.stringify(arr)); } catch(e) {}
    });
  };
  db.ref('data/users').on('value', function(){ mergeUsers(); });
  db.ref('data/ba_users').on('value', function(){ mergeUsers(); });

  // Listen for real-time status updates
  if (user && !isAdmin) {
    // Only show updates written after session started
    var _sessionStart = new Date().toISOString();
    db.ref('status_updates/'+user.id).on('child_added', function(snap) {
      var update = snap.val();
      if (!update || !update.at) { snap.ref.remove(); return; }
      // Only process updates written after we connected
      if (update.at < _sessionStart) { snap.ref.remove(); return; }
      if (update.status === 'ready') {
        launchConfetti(3000);
        showOrderReadyAlert({orderNumber: update.orderNumber, id: update.orderId});
        sendPushNotif(update.title, update.body);
      } else if (update.status === 'confirmed' || update.status === 'preparing') {
        toast('📦 '+update.title+' — '+update.body, 'info', 7000);
        sendPushNotif(update.title, update.body);
        if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
      } else if (update.status === 'check_palier') {
        // Vérifier si nouveau palier atteint
        var curUser = getCurrentUser();
        if (curUser) {
          var pts = curUser.points || 0;
          var paliers = load('ba_paliers', []);
          paliers.forEach(function(p) {
            if (pts >= p.min && pts - (update.pts||0) < p.min) {
              launchConfetti(4000);
              toast('🎉 Félicitations ! Vous atteignez le palier ' + p.name + ' !', 'success', 5000);
            }
          });
        }
      } else if (update.status === 'picked_up') {
        toast('✅ '+update.body, 'success', 5000);
      } else {
        // Message admin / offre / relance
        toast('📣 '+update.title+' : '+update.body, 'info', 8000);
        sendPushNotif(update.title, update.body);
        if (navigator.vibrate) navigator.vibrate([300, 100, 300]);
      }
      snap.ref.remove();
    });
  }
}

// ══════════════════════════════════════════════════════

var DEFAULT_SAUCES = ['Ketchup','Mayonnaise','Moutarde','Sauce piquante','Sauce cocktail','Sauce blanche','Harissa','Sans sauce'];
var DEFAULT_SUPPLEMENTS = ['Jambon Fromage','Kebab','Merguez','Poulet','Saucisse Fromage','Steak','Thon'];
function getSauces() {
  var s = load('ba_sauces', DEFAULT_SAUCES).slice();
  // Keep 'Sans sauce' at the end
  var sans = s.filter(function(x){ return x.toLowerCase().startsWith('sans'); });
  var rest = s.filter(function(x){ return !x.toLowerCase().startsWith('sans'); });
  rest.sort(function(a,b){ return a.localeCompare(b,'fr'); });
  return rest.concat(sans);
}
function getSupplements() {
  // Supplements = available meats by default
  var saved = load('ba_supplements', null);
  if (saved !== null) return saved;
  return getMeats().map(function(m){ return m.name; });
}
var SAUCES = DEFAULT_SAUCES;
var CRUDITES = ['Oignon','Salade','Tomate','Tout','Sans crudites'];
var DEFAULT_MEATS = [
  {name:'Jambon',    price:6.50, ok:true},
  {name:'Kebab',     price:7.00, ok:true},
  {name:'Merguez',   price:7.00, ok:true},
  {name:'Poulet',    price:6.50, ok:true},
  {name:'Saucisse',  price:6.50, ok:true},
  {name:'Steak',     price:7.00, ok:true},
  {name:'Thon',      price:6.50, ok:true}
];
var SUPPLEMENT_PRICE = 0.50;

function getUsers()    { return load('ba_users', []); }
function getOrders()   { return load('ba_orders', []); }
function getProducts() {
  var deleted = load('ba_deleted_products', []);
  var saved = load('ba_products', null);
  if (!saved) {
    return DEFAULT_PRODUCTS.filter(function(p){ return deleted.indexOf(p.id) < 0; });
  }
  // Merge: add new default products not yet in saved list AND not deleted
  var savedIds = saved.map(function(p){ return p.id; });
  var missing = DEFAULT_PRODUCTS.filter(function(p){
    return savedIds.indexOf(p.id) < 0 && deleted.indexOf(p.id) < 0;
  });
  if (missing.length > 0) {
    var merged = saved.concat(missing);
    save('ba_products', merged);
    return merged;
  }
  // Filter out any deleted that snuck back in
  return saved.filter(function(p){ return deleted.indexOf(p.id) < 0; });
}
function getCfg()      { return load('ba_cfg', DEFAULT_CFG); }
function getCurrentUser() {
  var uid = sessionStorage.getItem('ba_uid');
  if (!uid) uid = localStorage.getItem('ba_uid_persist');
  if (!uid) return null;
  // Return fresh user from storage
  var user = getUsers().find(function(u){ return u.id === uid; }) || null;
  if (user && !sessionStorage.getItem('ba_uid')) sessionStorage.setItem('ba_uid', user.id);
  return user;
}
function setCurrentUser(user, remember) {
  if (user) {
    sessionStorage.setItem('ba_uid', user.id);
    if (remember) localStorage.setItem('ba_uid_persist', user.id);
  } else {
    sessionStorage.removeItem('ba_uid');
    localStorage.removeItem('ba_uid_persist');
  }
}
function saveUser(user) {
  // Save individually in Firebase to prevent overwriting other users
  saveUserToFirebase(user);
}
function saveOrder(order) {
  var orders = getOrders();
  var idx = orders.findIndex(function(o){ return o.id === order.id; });
  if (idx >= 0) orders[idx] = order; else orders.push(order);
  save('ba_orders', orders);
  save('ba_last_save', new Date().toISOString());
}
function saveProduct(p) {
  // Si l'image est en base64 (> 500 chars), la stocker séparément dans Firebase
  // pour ne pas saturer localStorage
  var pToSave = Object.assign({}, p);
  if (p.image && p.image.length > 500 && p.image.indexOf('data:') === 0) {
    // Stocker l'image dans Firebase séparément
    db.ref('data/product_images/' + p.id).set(p.image)
      .catch(function(e){ console.warn('Image save error:', e); });
    // Dans le produit, garder juste une référence
    pToSave.image = '__firebase__' + p.id;
    pToSave._imageRef = p.id;
  }
  var saved = load('ba_products', null);
  if (!saved) saved = DEFAULT_PRODUCTS.slice();
  var idx = saved.findIndex(function(x){ return x.id === pToSave.id; });
  if (idx >= 0) saved[idx] = pToSave; else saved.push(pToSave);
  save('ba_products', saved);
}


// Charger et injecter les images produits stockées dans Firebase
function loadProductImages() {
  var prods = getProducts();
  prods.forEach(function(p) {
    if (p.image && p.image.indexOf('__firebase__') === 0) {
      var refId = p._imageRef || p.id;
      db.ref('data/product_images/' + refId).once('value').then(function(snap){
        var imgData = snap.val();
        if (!imgData) return;
        // Mettre à jour le produit en mémoire
        p.image = imgData;
        // Mettre à jour l'affichage si la carte est visible
        var wrap = document.getElementById('pwrap-'+p.id);
        if (wrap) {
          wrap.outerHTML = '<div class="pcard-img"><img src="'+imgData+'" id="pimg-'+p.id+'" alt="'+p.name+'" /></div>';
        }
        var imgEl = document.getElementById('pimg-'+p.id);
        if (imgEl) imgEl.src = imgData;
      }).catch(function(){});
    }
  });
}

// Charger l'image réelle d'un produit depuis Firebase si nécessaire
function getProductImage(p, callback) {
  if (!p.image) { callback(null); return; }
  if (p.image.indexOf('__firebase__') === 0) {
    var refId = p._imageRef || p.id;
    db.ref('data/product_images/' + refId).once('value').then(function(snap){
      callback(snap.val() || null);
    }).catch(function(){ callback(null); });
  } else {
    callback(p.image);
  }
}
function deleteProduct(id) {
  // Track deleted IDs so merge doesn't bring them back
  var deleted = load('ba_deleted_products', []);
  if (deleted.indexOf(id) < 0) deleted.push(id);
  save('ba_deleted_products', deleted);
  // Remove from saved list
  var saved = load('ba_products', null) || DEFAULT_PRODUCTS.slice();
  saved = saved.filter(function(p){ return p.id !== id; });
  save('ba_products', saved);
}
function genId() { return Date.now().toString(36) + Math.random().toString(36).substr(2,5); }
function fmt(p) { return (typeof p==='number' ? p.toFixed(2) : p).replace('.',',') + '€'; }
function notifyOrder(userId, title, body, status, orderId, orderNumber, pickupTime) {
  // ONE notification via status_updates (in-app) + OneSignal (background)
  var notifId = genId();
  // Firebase real-time (in-app)
  db.ref('status_updates/'+userId+'/'+notifId).set({
    orderId: orderId,
    orderNumber: orderNumber,
    status: status,
    title: title,
    body: body,
    at: new Date().toISOString()
  });
  // OneSignal (background/push)
  osSendPush(userId, title, body, 0);
  // Save to user notifs history
  var users = getUsers();
  var u = users.find(function(x){ return x.id === userId; });
  if (u) {
    if (!u.notifs) u.notifs = [];
    u.notifs.unshift({id:notifId, title:title, body:body, read:false, at:new Date().toISOString()});
    if (u.notifs.length > 50) u.notifs = u.notifs.slice(0,50);
    saveUser(u);
  }
}

function notify(userId, title, body) {
  var users = getUsers();
  var u = users.find(function(x){ return x.id === userId; });
  if (!u) return;
  if (!u.notifs) u.notifs = [];
  var notif = {id:genId(), title:title, body:body, read:false, at:new Date().toISOString()};
  u.notifs.unshift(notif);
  if (u.notifs.length > 50) u.notifs = u.notifs.slice(0,50);
  saveUser(u);
  // Write to status_updates so client listener picks it up immediately
  db.ref('status_updates/'+userId+'/'+notif.id).set({
    orderId: '',
    orderNumber: '',
    status: 'message',
    title: title,
    body: body,
    at: notif.at
  }).catch(function(e){ console.warn('notify write error:', e); });
  // If current user is viewing app right now, show immediately
  var cur = getCurrentUser();
  if (cur && cur.id === userId) {
    toast(title + ' : ' + body, 'info', 5000);
    sendPushNotif(title, body);
  }
}

  var p = paliers[0];
  for (var i=0; i<paliers.length; i++) { if (pts >= paliers[i].min) p = paliers[i]; }
  return p;
}

}
// Auto-fit the main modal to avoid any scroll on small screens.
// Uses zoom (simpler than transform for layout in this page).
function fitModalNoScroll(modalEl) {
  if (!modalEl) return;
  var vh = window.innerHeight || document.documentElement.clientHeight || 0;
  var targetH = Math.max(320, vh - 96); // leave a little breathing room
  var contentH = modalEl.scrollHeight || modalEl.offsetHeight || 0;
  if (!contentH) return;
  var scale = Math.min(1, targetH / contentH);
  modalEl.style.zoom = (scale < 1) ? scale.toFixed(3) : '1';
}
function fitMainNoScrollModal() {
  var host = document.getElementById('m-product');
  if (!host || host.style.display === 'none') return;
  var modalEl = host.querySelector('.modal-fit-no-scroll');
  if (!modalEl) return;
  // Run twice to catch late layout (fonts/images)
  fitModalNoScroll(modalEl);
  setTimeout(function(){ fitModalNoScroll(modalEl); }, 120);
}
window.addEventListener('resize', function(){ fitMainNoScrollModal(); });
function go(id) {
  document.querySelectorAll('.screen').forEach(function(s){ s.classList.remove('active'); });
  var sc = document.getElementById('s-'+id);
  if (sc) sc.classList.add('active');
  currentScreen = id;
  document.querySelectorAll('.nav-btn').forEach(function(b){ b.classList.remove('active'); });
  var nb = document.querySelector('.nav-btn[data-s="'+id+'"]');
  if (nb) nb.classList.add('active');
  window.scrollTo(0,0);
  updateBadges();
  if (id==='cart')    renderCart();
  if (id==='orders')  renderOrders();
  if (id==='profile') renderProfile();
  if (id==='info')    renderInfo();
}

    +'<span class="text-sm text-muted">J\'accepte les <button type="button" onclick="showCGV()" style="background:none;border:none;color:var(--red);font-weight:700;cursor:pointer;padding:0;font-size:inherit;text-decoration:underline">CGV</button> et la <button type="button" onclick="showRGPD()" style="background:none;border:none;color:var(--red);font-weight:700;cursor:pointer;padding:0;font-size:inherit;text-decoration:underline">politique RGPD</button></span></label>'

function doLogin() {
  var email = (document.getElementById('li-email').value||'').trim().toLowerCase();
  var pwd = document.getElementById('li-pwd').value;
  var err = document.getElementById('li-err');
  if (!email||!pwd) { if(err){err.textContent='Champs requis';err.classList.add('show');} return; }
  var users = getUsers();
  var user = users.find(function(u){ return u.email===email && u.pwd===pwd; });
  if (!user) { if(err){err.textContent='Email ou mot de passe incorrect';err.classList.add('show');} return; }
  var remember = document.getElementById('li-remember') && document.getElementById('li-remember').checked;
  setCurrentUser(user, remember);
  closeModal('m-auth');
  updateHeaderAuth(); updateBadges();
  renderHome();
  checkBirthdayOffer(user);
  requestNotifPermission();
  // Attach notification listener for this user
  attachClientNotifListener(user);
  osSubscribe(user.id);
  toast('Bienvenue '+user.prenom+' ! 🌴','success');
}
function doRegister() {
  var prenom = (document.getElementById('rg-p').value||'').trim();
  var phone  = (document.getElementById('rg-t').value||'').trim().replace(/\s/g,'');
  var bday   = document.getElementById('rg-b').value;
  var email  = (document.getElementById('rg-e').value||'').trim().toLowerCase();
  var pwd    = document.getElementById('rg-pw').value;
  var pwd2   = document.getElementById('rg-pw2').value;
  var cgv    = document.getElementById('rg-cgv').checked;
  document.querySelectorAll('.form-error').forEach(function(e){e.textContent='';e.classList.remove('show');});
  var ok=true;
  function setErr(id,msg){var el=document.getElementById(id);if(el){el.textContent=msg;el.classList.add('show');}ok=false;}
  if(!prenom) setErr('rg-p-e','Prenom requis');
  if(!phone||phone.length<10) setErr('rg-t-e','Numero invalide');
  if(!email||email.indexOf('@')<0) setErr('rg-e-e','Email invalide');
  if(!pwd||pwd.length<6) setErr('rg-pw-e','Min. 6 caracteres');
  if(pwd!==pwd2) setErr('rg-pw2-e','Mots de passe differents');
  if(!cgv) setErr('rg-cgv-e','Acceptez les CGV');
  if(!ok) return;
  var users = getUsers();
  if(users.find(function(u){return u.email===email;})){setErr('rg-e-e','Email deja utilise');return;}
  var cfg = getCfg();
  var signupPts = cfg.signupPts||50;
  var newUser = {
    id:genId(), role:'client', prenom:prenom, phone:phone,
    email:email, pwd:pwd, bday:bday||null,
    points:signupPts, notifs:[], createdAt:new Date().toISOString()
  };
  newUser.referralCode = prenom.toUpperCase().substr(0,3) + Math.random().toString(36).substr(2,4).toUpperCase();
  saveUser(newUser);
  // Save signup points history
  var initHist = [{pts:signupPts, label:'Bonus inscription', at:new Date().toISOString()}];
  save('ba_pts_history_'+newUser.id, initHist);
  // Process referral code via Firebase
  var refCode = (document.getElementById('rg-ref')||{}).value||'';
  if (refCode.trim()) {
    var refCodeUpper = refCode.trim().toUpperCase();
    // Search in Firebase directly to find parrain
    db.ref('data/users').orderByChild('referralCode').equalTo(refCodeUpper).once('value').then(function(snap) {
      var usersObj = snap.val();
      if (!usersObj) return;
      var refUser = Object.values(usersObj)[0];
      if (!refUser || refUser.id === newUser.id) return;
      var cfg2 = getCfg();
      var refBonus = cfg2.referralPtsParrain || 100;
      var filleulBonus = cfg2.referralPtsFilleul || 50;
      // Update parrain points
      refUser.points = (refUser.points||0) + refBonus;
      db.ref('data/users/'+refUser.id+'/points').set(refUser.points);
      var refHist = load('ba_pts_history_'+refUser.id, []);
      refHist.unshift({pts:refBonus, label:'Parrainage de '+prenom, at:new Date().toISOString()});
      save('ba_pts_history_'+refUser.id, refHist);
      saveUser(refUser);
      // Update filleul points
      newUser.points = (newUser.points||0) + filleulBonus;
      db.ref('data/users/'+newUser.id+'/points').set(newUser.points);
      var newHist = load('ba_pts_history_'+newUser.id, []);
      newHist.unshift({pts:filleulBonus, label:'Bonus parrainage', at:new Date().toISOString()});
      save('ba_pts_history_'+newUser.id, newHist);
      saveUser(newUser);
      notify(refUser.id, '🎉 Parrainage valide !', prenom+' a utilise votre code. +'+refBonus+' points offerts !');
      toast('Code de parrainage valide ! +'+filleulBonus+' points bonus !', 'success', 5000);
    }).catch(function(e){ console.warn('Referral error:', e); });
  }
  setCurrentUser(newUser);
  closeModal('m-auth');
  updateHeaderAuth(); updateBadges(); renderHome();
  requestNotifPermission();
  var mAuth = document.getElementById('m-auth');
  if (mAuth) {
    mAuth.style.display = 'block';
    mAuth.innerHTML = '<div class="modal-overlay"><div class="modal" style="text-align:center">'
      + '<div style="font-size:3.5rem;margin-bottom:.5rem">\u{1F334}</div>'
      + '<h2 class="modal-title">Bienvenue ' + prenom + ' !</h2>'
      + '<p style="color:var(--muted);margin-bottom:1rem">Vous faites partie de la famille <strong style="color:var(--red)">Break Antillais</strong> !</p>'
      + '<div style="background:rgba(212,175,55,.1);border:1px solid rgba(212,175,55,.3);border-radius:var(--radius);padding:.75rem 1rem;margin-bottom:1rem">'
      + '<div style="font-size:1.5rem;font-weight:800;color:var(--gold)">+' + newUser.points + ' points offerts \u{1F381}</div>'
      + '<div style="font-size:.8rem;color:var(--muted)">Cadeau de bienvenue</div></div>'
      + '<p style="font-size:.82rem;color:var(--muted);margin-bottom:1rem">Accumulez des points a chaque commande et debloquez des recompenses !</p>'
      + '<button class="btn btn-primary btn-full" onclick="closeModal(\u0027m-auth\u0027)">C\u0027est parti ! \u{1F680}</button>'
      + '</div></div>';
  }
}
function doLogout() {
  setCurrentUser(null); cart=[];
  updateHeaderAuth(); updateBadges(); go('home');
  toast('Deconnecte','info');
}

function renderHome() {

  var openDays = cfg.openDays || [2,3,4,5,6];
  var isWorkDay = openDays.indexOf(todayDay) >= 0;

      if (!upcomingClosure || cDate < new Date(upcomingClosure.date)) upcomingClosure = c;
    }

  var html = '<div style="padding-bottom:1rem">';

  html += '<div style="margin-top:.75rem">';
  html += '<span style="display:inline-flex;align-items:center;gap:.4rem;padding:.25rem .8rem;border-radius:100px;font-size:.75rem;font-weight:700;background:'+(open?'rgba(16,185,129,.12)':'rgba(239,68,68,.12)')+';color:'+(open?'#10b981':'#ef4444')+'">'+(open?'🟢 Commandes ouvertes jusqu&apos;a '+cfg.cutoff:'🔴 Commandes du jour fermees')+'</span>';
  if (!open) html += '<p style="font-size:.75rem;color:var(--gold);margin-top:.35rem;font-weight:600">📅 Commandez pour un prochain jour !</p>';
  html += '</div>'; // close margin-top
  html += '</div></div>'; // close parallax

  if (!isWorkDay) {
    var dayNames = ['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
    var nextWorkDay = null;
    for (var d=1;d<=7;d++) {
      var nd = new Date(); nd.setDate(nd.getDate()+d);
      if (openDays.indexOf(nd.getDay())>=0) { nextWorkDay=nd; break; }
    }
    html += '<p style="font-size:.78rem;color:#f59e0b;margin-top:.35rem;font-weight:600">📅 Ferme le '+dayNames[todayDay]+' — ouverture '+(nextWorkDay?dayNames[nextWorkDay.getDay()]+' '+nextWorkDay.toLocaleDateString('fr-FR',{day:'numeric',month:'long'}):'prochainement')+'</p>';
  } else if (todayClosed) {
    html += '<p style="font-size:.78rem;color:#f59e0b;margin-top:.35rem;font-weight:600">📅 Fermeture exceptionnelle — '+todayClosed.msg+'</p>';
  }

  if (upcomingClosure) {
    var ucDate = new Date(upcomingClosure.date);
    var ucDiff = Math.ceil((ucDate-now)/(1000*60*60*24));
    if (ucDiff <= 7) {
      html += '<div style="background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.3);border-radius:8px;padding:.45rem .85rem;margin-top:.5rem;font-size:.75rem;color:#f59e0b;display:inline-block">'
        +'📅 Fermeture le '+ucDate.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'})+' — '+upcomingClosure.msg

  html += '</div>';

  if (user) {

    if (promos.length > 0) {
      html += '<div style="padding:0 .9rem .75rem"><div class="sec-title">🔥 Mes offres</div>';

  var orders = getOrders().filter(function(o){ return o.status==='picked_up'; });
  var freq = {};
  orders.forEach(function(o){ o.items.forEach(function(i){ if(i.cat!=='boisson'&&i.cat!=='reward') freq[i.name]=(freq[i.name]||0)+1; }); });
  var hasFeatured = prods.some(function(p){ return p.featured || (freq[p.name]&&freq[p.name]>=2); });

  var cats = [];
  if(hasFeatured) cats.push({k:'featured',l:'⭐ Top'});
  cats = cats.concat([{k:'bokit',l:'🫓 Bokits'},{k:'agoulou',l:'🌯 Agoulou'},{k:'crepe_salee',l:'🥞 Crepes Salee'},{k:'crepe_sucree',l:'🍫 Crepes Sucree'},{k:'mini_bokit',l:'📦 Box Mini'},{k:'enfant',l:'🧒 Enfants'},{k:'boisson',l:'🥤 Boissons'}]);

    initProds.sort(function(a,b){ return ((freq[b.name]||0)+(b.featured?100:0)) - ((freq[a.name]||0)+(a.featured?100:0)); });
  } else {
    initProds = prods.filter(function(p){ return p.cat==='bokit'; });
    initProds.sort(function(a,b){ return a.name.localeCompare(b.name,'fr'); });
  }
  initProds.forEach(function(p){ html += pcardHTML(p); });

  setTimeout(loadProductImages, 300);

function filterCat(cat, btn) {
  document.querySelectorAll('.tab-btn').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
  var g = document.getElementById('pgrid');
  if (!g) return;
  var allProds = getProducts();
  var prods;
  if (cat === 'featured') {
    var orders = getOrders().filter(function(o){ return o.status==='picked_up'; });
    var freq = {};
    orders.forEach(function(o){ o.items.forEach(function(i){ if(i.cat!=='boisson'&&i.cat!=='reward') freq[i.name]=(freq[i.name]||0)+1; }); });
    prods = allProds.filter(function(p){ return p.featured || (freq[p.name]&&freq[p.name]>=2); });
    prods.sort(function(a,b){ return ((freq[b.name]||0)+(b.featured?100:0)) - ((freq[a.name]||0)+(a.featured?100:0)); });
  } else {
    prods = allProds.filter(function(p){ return p.cat===cat; });
    prods.sort(function(a,b){ return a.name.localeCompare(b.name,'fr'); });
  }
  g.innerHTML = prods.length ? prods.map(pcardHTML).join('') : '<div class="empty-state" style="padding:2rem 0"><div class="icon">📭</div><p class="text-sm">Aucun produit dans cette categorie</p></div>';
  setTimeout(loadProductImages, 200);
}
function pcardHTML(p) {
  var clickable = p.ok && !p.soon;
  var div = document.createElement('div');
  div.className = 'pcard' + (clickable?'':' unavail');
  if (clickable) { div.dataset.pid = p.id; div.setAttribute('onclick','openProduct(this.dataset.pid)'); }
  var _imgSrc = p.image && p.image.indexOf('__firebase__') === 0 ? null : p.image;
  var _imgId = 'pimg-' + p.id;
  var imgHtml = _imgSrc
    ? '<div class="pcard-img"><img src="'+_imgSrc+'" id="'+_imgId+'" alt="'+p.name+'"/></div>'
    : (p.image && p.image.indexOf('__firebase__') === 0)
      ? '<div class="pcard-img" id="pwrap-'+p.id+'"><div style="width:100%;height:100%;background:var(--dark4);display:flex;align-items:center;justify-content:center;font-size:1.5rem">'+(EMOJI[p.cat]||'🍽')+'</div></div>'
      : '<div class="pcard-img">'+(EMOJI[p.cat]||'\u{1F37D}')+'</div>';
  var allergenBadge = (p.allergens && p.allergens.length) ? '<div style="font-size:.7rem;color:#f59e0b;margin-top:.2rem">⚠ '+p.allergens.join(', ')+'</div>' : '';
  var user = getCurrentUser();
  var favs = user ? load('ba_favs_'+user.id, []) : [];
  var isFav = favs.indexOf(p.id) >= 0;
  div.innerHTML = imgHtml
    + (p.soon ? '<span class="soon-badge">Bientot</span>' : '')
    + (clickable && user ? '<button style="position:absolute;top:.45rem;left:.45rem;background:rgba(0,0,0,.5);border:none;border-radius:50%;width:28px;height:28px;cursor:pointer;font-size:.9rem;display:flex;align-items:center;justify-content:center" data-fid="'+p.id+'" onclick="event.stopPropagation();toggleFav(this.dataset.fid,this)">'+( isFav?'❤️':'🤍')+'</button>' : '')
    + '<div class="pcard-body">'
    + '<div class="pcard-name">'+p.name+'</div>'
    + '<div class="pcard-desc">'+(p.desc||'')+'</div>'
    + allergenBadge
    + (p.isClassique ? '<div class="pcard-price" style="font-size:.8rem;color:var(--muted)">Prix selon selection</div>' : '<div class="pcard-price">'+fmt(p.price)+'</div>')
    + '</div>';
  return div.outerHTML;
}

  html += '<div id="box-saveurs">';
  MINI_SAVEURS.forEach(function(s, i){
    html += '<div style="display:flex;align-items:center;justify-content:space-between;padding:.65rem .9rem;background:var(--dark3);border-radius:var(--radius-sm);margin-bottom:.35rem;border:1.5px solid var(--border);transition:border-color .2s" id="box-row-'+i+'">'

      +'<div style="display:flex;align-items:center;gap:.5rem">'
      +'<button style="width:30px;height:30px;border-radius:50%;background:var(--dark4);border:1px solid var(--border);color:var(--text);font-size:1.2rem;cursor:pointer;line-height:1" data-idx="'+i+'" data-max="'+maxSaveurs+'" data-total="'+totalQty+'" data-qps="'+qtyPerSaveur+'" onclick="boxAdjust(this,-1)">−</button>'
      +'<span class="fw-700 text-sm" id="box-qty-'+i+'" style="min-width:50px;text-align:center;font-size:.82rem">0</span>'
      +'<button style="width:30px;height:30px;border-radius:50%;background:var(--red);border:none;color:#fff;font-size:1.2rem;cursor:pointer;line-height:1" data-idx="'+i+'" data-max="'+maxSaveurs+'" data-total="'+totalQty+'" data-qps="'+qtyPerSaveur+'" onclick="boxAdjust(this,1)">+</button>'
      +'</div></div>';
  });
  html += '</div>';
  html += '<div style="display:flex;justify-content:space-between;padding:.6rem .9rem;background:rgba(212,175,55,.08);border-radius:var(--radius-sm);margin-top:.35rem;border:1px solid rgba(212,175,55,.2)">'
    +'<span class="text-sm text-muted">Total mini bokits</span>'
    +'<span class="fw-700 text-gold" id="box-total">0 / '+totalQty+'</span></div>';
  html += '</div>';
  return html;
}

function boxAdjust(btn, delta) {
  var idx = parseInt(btn.dataset.idx);
  var maxSav = parseInt(btn.dataset.max);
  var totalQty = parseInt(btn.dataset.total);
  var qps = parseInt(btn.dataset.qps); // qty per saveur = 5
  var current = _boxQtys[idx] || 0; // nombre de fois cette saveur (en packs de 5)
  var activeSaveurs = Object.keys(_boxQtys).filter(function(k){ return (_boxQtys[k]||0)>0; }).length;
  var totalPcs = Object.values(_boxQtys).reduce(function(s,v){return s+(v||0)*qps;},0);

  if (delta > 0) {
    if (current === 0 && activeSaveurs >= maxSav) { toast('Maximum '+maxSav+' saveurs differentes pour cette box','warning'); return; }
    if (totalPcs + qps > totalQty) { toast('Box complete ('+totalQty+' pcs)','warning'); return; }
    _boxQtys[idx] = current + 1;
  } else {
    if (current <= 0) return;
    _boxQtys[idx] = current - 1;
  }

  var newCount = _boxQtys[idx];

function adjustBoxSaveur(idx, delta, maxSaveurs, totalQty, qtyPerSaveur) {
  idx = parseInt(idx);
  if (!_boxQtys[idx]) _boxQtys[idx] = 0;
  var currentTotal = Object.values(_boxQtys).reduce(function(s,v){return s+v;},0);
  if (delta > 0 && currentTotal >= maxSaveurs) {
    toast('Maximum '+maxSaveurs+' saveurs pour cette box','warning'); return;
  }
  if (delta < 0 && _boxQtys[idx] <= 0) return;
  _boxQtys[idx] = (_boxQtys[idx]||0) + delta;
  if (_boxQtys[idx] < 0) _boxQtys[idx] = 0;
  // Update display
  var el = document.getElementById('box-qty-'+idx);
  if (el) el.textContent = _boxQtys[idx] > 0 ? _boxQtys[idx]+'x ('+(_boxQtys[idx]*qtyPerSaveur)+' pcs)' : '0';
  var row = document.getElementById('box-row-'+idx);
  if (row) row.style.borderColor = _boxQtys[idx]>0 ? 'var(--red)' : 'var(--border)';
  // Update total
  var newTotal = Object.values(_boxQtys).reduce(function(s,v){return s+v;},0);
  var totalEl = document.getElementById('box-total');
  if (totalEl) totalEl.textContent = newTotal+' / '+maxSaveurs;
}

function adjustBoxQty(idx, delta, maxSav, totalQty) {
  idx = parseInt(idx);
  var current = _boxQtys[idx] || 0;
  var totalUsed = Object.values(_boxQtys).reduce(function(s,v){ return s+(v||0); }, 0);
  var activeSaveurs = Object.keys(_boxQtys).filter(function(k){ return (_boxQtys[k]||0)>0; }).length;
  var newVal = current + delta;
  if (newVal < 0) return;
  if (delta > 0) {
    if (current === 0 && activeSaveurs >= maxSav) { toast('Maximum '+maxSav+' saveurs pour cette box','warning'); return; }
    if (totalUsed >= totalQty) { toast('Maximum '+totalQty+' mini bokits atteint','warning'); return; }
  }
  _boxQtys[idx] = newVal;
  var el = document.getElementById('box-qty-'+idx);
  if (el) el.textContent = newVal+'';
  var row = document.getElementById('box-row-'+idx);
  if (row) row.style.borderColor = newVal > 0 ? 'var(--red)' : 'var(--border)';
  var newTotal = Object.values(_boxQtys).reduce(function(s,v){ return s+(v||0); }, 0);
  var totalEl = document.getElementById('box-total');
  if (totalEl) totalEl.textContent = newTotal+' / '+totalQty;
}

var _pendingQty = 1;

function changeQty(delta) {
  _pendingQty = Math.max(1, (_pendingQty||1) + delta);
  var el = document.getElementById('prod-qty');
  if (el) el.textContent = _pendingQty;
  updateModalTotalPrice();
}

function updateModalTotalPrice() {
  var qty = _pendingQty || 1;
  var basePrice = pendingProd ? (pendingProd._dynamicPrice || pendingProd.price || 0) : 0;
  var suppCost = (pendingExtras.supplements||[]).length * SUPPLEMENT_PRICE;
  var unitPrice = basePrice + suppCost;
  var total = unitPrice * qty;
  var mainPrice = document.getElementById('modal-main-price');
  if (mainPrice && unitPrice > 0) mainPrice.textContent = qty > 1 ? fmt(unitPrice)+' x'+qty+' = '+fmt(total) : fmt(unitPrice);
  var btnPrice = document.getElementById('cart-btn-price');
  if (btnPrice && unitPrice > 0) btnPrice.textContent = fmt(total);
}

function selectClassiqueMeat(btn) {
  document.querySelectorAll('#meat-chips .chip').forEach(function(c){ c.classList.remove('on'); });
  btn.classList.add('on');
  pendingExtras.meats = [btn.dataset.v];
  var price = parseFloat(btn.dataset.price) || 6.50;
  pendingProd._dynamicPrice = price;
  // Update the main price display at top of modal
  var priceEl = document.getElementById('classique-price');
  if (priceEl) priceEl.style.display = 'none';
  updateModalTotalPrice();
}

function toggleSupp(btn) {
  var v = btn.dataset.v;
  if (!pendingExtras.supplements) pendingExtras.supplements = [];
  var idx = pendingExtras.supplements.indexOf(v);
  if (idx >= 0) {
    pendingExtras.supplements.splice(idx, 1);
    btn.classList.remove('on');
  } else {
    pendingExtras.supplements.push(v);
    btn.classList.add('on');
  }
  var count = pendingExtras.supplements.length;
  var suppCost = count * SUPPLEMENT_PRICE;
  // Update supplement total display
  var suppEl = document.getElementById('supp-total');
  if (suppEl) {
    if (count > 0) {
      suppEl.textContent = '+' + count + ' supplement(s) = +' + fmt(suppCost);
      suppEl.style.display = 'block';
    } else {
      suppEl.style.display = 'none';
    }
  }
  // Update main price display
  updateModalTotalPrice();
}

function getMeatCount(p) {
  var n=p.name.toLowerCase();
  if(n.includes('4 viande'))return 4;
  if(n.includes('3 viande'))return 3;
  if(n.includes('2 viande'))return 2;
  if(n.includes('1 viande'))return 1;
  return 0;
}
function toggleMeat(btn, max) {
  var v=btn.dataset.v, idx=pendingExtras.meats.indexOf(v);
  if(idx>=0){pendingExtras.meats.splice(idx,1);btn.classList.remove('on');}
  else if(pendingExtras.meats.length<max){pendingExtras.meats.push(v);btn.classList.add('on');}
  else toast('Maximum '+max+' viande(s)','warning');
}
function toggleSauce(btn) {
  var v = btn.dataset.v;
  var idx = pendingExtras.sauces.indexOf(v);
  if (idx >= 0) {
    pendingExtras.sauces.splice(idx, 1);
    btn.classList.remove('on');
  } else {
    if (pendingExtras.sauces.length >= 3) { toast('Maximum 3 sauces','warning'); return; }
    pendingExtras.sauces.push(v);
    btn.classList.add('on');
  }
}
function toggleCrudite(btn) {
  var v=btn.dataset.v;
  var excl=['Sans crudites','Tout'];
  if(excl.indexOf(v)>=0){
    document.querySelectorAll('#crud-chips .chip').forEach(function(c){c.classList.remove('on');});
    pendingExtras.crudites=[v]; btn.classList.add('on');
  } else {
    excl.forEach(function(o){
      var ob=Array.from(document.querySelectorAll('#crud-chips .chip')).find(function(x){return x.dataset.v===o;});
      if(ob&&ob.classList.contains('on')){ob.classList.remove('on');pendingExtras.crudites=[];}
    });
    var idx=pendingExtras.crudites.indexOf(v);
    if(idx>=0){pendingExtras.crudites.splice(idx,1);btn.classList.remove('on');}
    else{pendingExtras.crudites.push(v);btn.classList.add('on');}
  }
}
function addToCart() {
  if (!pendingProd) return;
  var mc=getMeatCount(pendingProd);
  if(pendingProd.isClassique && pendingExtras.meats.length===0){toast('Choisissez votre viande','warning');return;}
  if(!pendingProd.isClassique && mc>0&&pendingExtras.meats.length<mc){toast('Choisissez '+mc+' viande(s)','warning');return;}
  var details=[];
  if(pendingExtras.meats.length) details.push('Viandes: '+pendingExtras.meats.join(', '));
  if(pendingExtras.sauces.length) details.push('Sauce: '+pendingExtras.sauces.join(', '));
  if(pendingExtras.crudites.length) details.push('Crudites: '+pendingExtras.crudites.join(', '));
  // Supplements
  if (pendingExtras.supplements && pendingExtras.supplements.length > 0) {
    details.push('Suppl: '+pendingExtras.supplements.join(', ')+' (+'+fmt(pendingExtras.supplements.length*SUPPLEMENT_PRICE)+')');
  }
  var suppCost = (pendingExtras.supplements || []).reduce(function(s, mname){
    var mObj = getMeats().find(function(x){ return x.name===mname; });
    return s + (mObj && mObj.supplementPrice ? mObj.supplementPrice : SUPPLEMENT_PRICE);
  }, 0);
  var noteEl = document.getElementById('prod-note');
  var note = noteEl ? noteEl.value.trim() : '';
  if (note) details.push('Note: '+note);
  // Dynamic price for classique
  var finalPrice = (pendingProd._dynamicPrice || pendingProd.price) + suppCost;
  // Box mini bokit validation
  if (pendingProd.cat === 'mini_bokit') {
    var qps = 5;
    var totalPcs = Object.values(_boxQtys||{}).reduce(function(s,v){return s+(v||0)*qps;},0);
    var activeSav = Object.keys(_boxQtys||{}).filter(function(k){return (_boxQtys[k]||0)>0;});
    if (activeSav.length === 0) { toast('Choisissez au moins une saveur','warning'); return; }
    if (totalPcs !== pendingProd.qty) { toast('Completez votre box : '+totalPcs+'/'+pendingProd.qty+' mini bokits','warning'); return; }
    activeSav.forEach(function(k){
      var cnt = _boxQtys[k]||0;
      if(cnt>0) details.push(MINI_SAVEURS[parseInt(k)]+' x'+(cnt*qps)+' pcs');
    });
    _boxQtys = {};
  }
  // Name for classique
  var cartName = pendingProd.name;
  if (pendingProd.isClassique && pendingExtras.meats.length > 0) {
    cartName = 'Bokit '+pendingExtras.meats[0];
  }
  var qtyToAdd = _pendingQty || 1;
  for (var qi = 0; qi < qtyToAdd; qi++) {
    cart.push({id:genId(),pid:pendingProd.id,name:cartName,price:finalPrice,cat:pendingProd.cat,details:details.join(' | '),qty:1});
  }
  closeModal('m-product'); updateBadges();
  setTimeout(function(){
    var b = document.querySelector('#nav-cart .nav-badge');
    if (b) { b.classList.remove('badge-bounce'); void b.offsetWidth; b.classList.add('badge-bounce'); }
  }, 50);
  var qtyMsg = (_pendingQty||1) > 1 ? ' x'+(_pendingQty||1) : '';
  toast(cartName+qtyMsg+' ajoute !','success');
  setTimeout(function(){ showUpsell(pendingProd); }, 500);
}
function showUpsell(p) {
  if(['bokit','crepe_salee','agoulou'].indexOf(p.cat)<0) return;
  var prods=getProducts().filter(function(x){return x.ok&&!x.soon;});
  var sw=prods.filter(function(x){return x.cat==='crepe_sucree';});
  var dr=prods.filter(function(x){return x.cat==='boisson';});

  if(dr.length) sug.push(dr[Math.floor(Math.random()*dr.length)]);

  var html='<div class="modal-overlay" onclick="if(event.target===this)closeModal(&apos;m-product&apos;)">'
    +'<div class="modal"><div class="modal-handle"></div><h2 class="modal-title">On vous propose aussi 🤤</h2>'
    +'<div style="display:flex;flex-direction:column;gap:.6rem">';
  sug.forEach(function(s){
    html+='<div style="display:flex;align-items:center;gap:.85rem;padding:.75rem;background:var(--dark3);border-radius:var(--radius-sm);border:1px solid var(--border)">'
      +'<div style="font-size:1.8rem">'+(EMOJI[s.cat]||'🍽')+'</div>'
      +'<div style="flex:1"><div style="font-weight:700;font-size:.88rem">'+s.name+'</div>'

  }

  // Date
  html+='<div style="margin-bottom:.85rem">'
    +'<div style="font-size:.72rem;font-weight:700;color:var(--muted);letter-spacing:.07em;text-transform:uppercase;margin-bottom:.4rem">📅 Date de retrait</div>'
    +'<select class="form-select" id="date-select" onchange="changeDate(this.value)">';
  dates.forEach(function(d){
    html+='<option value="'+d.value+'"'+(d.value===_selDate?' selected':'')+'>'+d.label+'</option>';
  });
  html+='</select></div>';

  // Créneaux
  html+='<div style="margin-bottom:.85rem">'
    +'<div style="font-size:.72rem;font-weight:700;color:var(--muted);letter-spacing:.07em;text-transform:uppercase;margin-bottom:.4rem">⏰ Heure de retrait</div>'
    +'<div class="slot-grid" id="slot-grid">'+buildSlots(_selDate||new Date().toISOString().split('T')[0])+'</div>'
    +'<div id="slot-info" class="text-sm text-muted text-center" style="margin-top:.4rem"></div>'
    +'</div>';

  // Paiement
  html+='<div style="margin-bottom:.5rem">'
    +'<div style="font-size:.72rem;font-weight:700;color:var(--muted);letter-spacing:.07em;text-transform:uppercase;margin-bottom:.6rem">💳 Mode de reglement</div>'
    +'<div style="display:flex;gap:.5rem">'
    +'<div class="pay-opt" id="pay-card" onclick="pickPayment(&apos;card&apos;)" style="flex:1;flex-direction:column;padding:.9rem .5rem;text-align:center;gap:.3rem">'
    +'<span style="font-size:1.6rem">💳</span><div class="fw-700 text-sm">Carte</div></div>'
    +'<div class="pay-opt" id="pay-cash" onclick="pickPayment(&apos;cash&apos;)" style="flex:1;flex-direction:column;padding:.9rem .5rem;text-align:center;gap:.3rem">'
    +'<span style="font-size:1.6rem">💵</span><div class="fw-700 text-sm">Especes</div></div>'
    +'</div></div>'
    +'</div>'  // fin zone scroll

    +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.7rem">'

function getSlots(date,cfg) {
  var sp=cfg.start.split(':'),ep=cfg.end.split(':');
  var sh=+sp[0],sm=+sp[1],eh=+ep[0],em=+ep[1];
  var max=cfg.maxSlot||8;
  var orders=getOrders().filter(function(o){return o.pickupDate===date&&o.status!=='cancelled';});
  var slots=[];
  while(sh*60+sm<=eh*60+em){
    var t=(sh<10?'0':'')+sh+':'+(sm<10?'0':'')+sm;
    // Count total items (not orders) for this slot
    var itemCount=0;
    orders.filter(function(o){return o.pickupTime===t;}).forEach(function(o){
      itemCount+=o.items.reduce(function(s,i){return s+1;},0);
    });
    slots.push({time:t,count:itemCount,ok:itemCount<max});
    sm+=30; if(sm>=60){sh++;sm-=60;}
  }
  return slots;
}

// Find next available slot for a given item count
function findNextAvailableSlot(date, itemCount, cfg) {
  var slots = getSlots(date, cfg);
  var max = cfg.maxSlot||8;
  for (var i=0; i<slots.length; i++) {
    if (slots[i].count + itemCount <= max) return slots[i].time;
  }
  return null;
}
function pickSlot(btn){
  document.querySelectorAll('.slot-btn').forEach(function(b){b.classList.remove('on');});
  btn.classList.add('on'); _slot=btn.dataset.t;
  var itemCount = cart.reduce(function(s,i){return s+1;},0);
  var cfg = getCfg();
  var date = window._selectedDate||new Date().toISOString().split('T')[0];
  var slots = getSlots(date, cfg);
  var slotData = slots.find(function(s){return s.time===_slot;});
  var info = document.getElementById('slot-info');
  if (info) {
    var remaining = (cfg.maxSlot||8) - (slotData?slotData.count:0);
    if (slotData && slotData.count + itemCount > (cfg.maxSlot||8)) {
      // Suggest next slot
      var next = findNextAvailableSlot(date, itemCount, cfg);
      info.innerHTML = '<span style="color:#f59e0b">⚠️ Ce creneau sera plein avec votre commande ('+(slotData.count+itemCount)+' articles).'+(next?' <button class="btn btn-sm" style="background:rgba(200,35,43,.2);color:var(--red);border:none;cursor:pointer;font-size:.78rem" onclick="autoSelectSlot(&quot;'+next+'&quot;)">→ Prendre '+next+' a la place</button>':'')+'</span>';
    } else {
      info.textContent = 'Creneau : '+_slot+' ('+remaining+' places restantes)';
    }
  }
  checkReady();
}

function autoSelectSlot(time) {
  var btn = Array.from(document.querySelectorAll('.slot-btn')).find(function(b){return b.dataset.t===time;});
  if (btn) pickSlot(btn);
}
function pickPayment(m){
  document.querySelectorAll('.pay-opt').forEach(function(b){b.classList.remove('on');});
  document.getElementById('pay-'+m).classList.add('on'); _payment=m;
  checkReady();
}
function checkReady(){
  var b=document.getElementById('confirm-btn');
  if(b) b.disabled=!(_slot&&_payment);
}
function confirmOrder(){
  var user=getCurrentUser();
  if(!user||!_slot||!_payment) return;
  var cfg=getCfg();
  var today=window._selectedDate||new Date().toISOString().split('T')[0];
  var total=cart.reduce(function(s,i){return s+i.price*i.qty;},0);
  var orders=getOrders();
  var num=String(orders.length+1).padStart(4,'0');
  var discount = _selectedReduction ? (_selectedReduction.discount||0) : 0;
  var finalTotal = Math.max(0, total - discount);
  // Mark promo as used
  if (_selectedReduction && _selectedReduction.type === 'promo') {
    var promos = load('ba_promos', []);
    var pi = promos.findIndex(function(p){ return p.id === _selectedReduction.promoId; });
    if (pi >= 0) { promos[pi].used = true; save('ba_promos', promos); }
  }
  var order={
    id:genId(),orderNumber:num,userId:user.id,userPrenom:user.prenom,userPhone:user.phone,
    items:cart.slice(),total:finalTotal,originalTotal:total,
    pointsDiscount:_selectedReduction?_selectedReduction.pts:0,
    discountLabel:_selectedReduction?_selectedReduction.label:null,
    pickupDate:today,pickupTime:_slot,
    payment:_payment==='card'?'Carte':'Especes',
    status:'pending',createdAt:new Date().toISOString(),pointsAwarded:false
  };
  // Deduct points immediately if reduction used
  if (_selectedReduction) {
    user.points = Math.max(0, (user.points||0) - _selectedReduction.pts);
    var hist = load('ba_pts_history_'+user.id, []);
    hist.unshift({pts:-_selectedReduction.pts, label:'Reduction utilisee: '+_selectedReduction.label, at:new Date().toISOString()});
    save('ba_pts_history_'+user.id, hist);
    saveUser(user);
    _selectedReduction = null;
  }
  saveOrder(order);
  cart=[]; closeModal('m-product'); updateBadges();
  setTimeout(function(){
    order.status='confirmed';
    saveOrder(order);
    notify(user.id,'✅ Commande confirmee !','Votre commande n°'+num+' est confirmee. Retrait a '+_slot+'.');
  },2000);
  // Send email confirmation
  sendOrderEmail(order, user, cfg);
  showOrderConfirm(order,cfg);
}

function sendOrderEmail(order, user, cfg) {
  try {
    if (typeof emailjs === 'undefined') { console.log('EmailJS not loaded'); return; }
    var itemsList = order.items.map(function(i){
      return '- ' + i.name + (i.details ? ' (' + i.details + ')' : '') + ' : ' + i.price.toFixed(2) + 'EUR';
    }).join('\n');
    var pickupDate = new Date(order.pickupDate).toLocaleDateString('fr-FR', {
      weekday:'long', day:'numeric', month:'long'
    });
    var templateParams = {
      email: user.email,
      client_name: user.prenom,
      order_number: order.orderNumber,
      items: itemsList,
      total: order.total.toFixed(2) + 'EUR',
      pickup_date: pickupDate,
      pickup_time: order.pickupTime,
      payment: order.payment,
      address: cfg.address
    };
    emailjs.send(EMAILJS_SERVICE, EMAILJS_TEMPLATE, templateParams)
      .then(function() {
        console.log('Email envoye avec succes');
        toast('Email de confirmation envoye ! 📧', 'success', 4000);
      })
      .catch(function(e) {
        console.log('EmailJS error:', e);
      });
  } catch(e) { console.log('Email error:', e); }
}

function showOrderConfirm(order,cfg){

  var html='<div class="modal-overlay"><div class="modal">'
    +'<div style="text-align:center;font-size:3rem;margin-bottom:.5rem">🎉</div>'
    +'<h2 class="modal-title text-center">Commande confirmee !</h2>'
    +'<div class="card mb-2" style="background:rgba(16,185,129,.07);border-color:rgba(16,185,129,.25)">'
    +'<div class="fw-700 mb-1">Commande n°'+order.orderNumber+'</div>'

    +'<div class="divider"></div>'
    +'<div style="display:flex;justify-content:space-between"><span class="text-muted text-sm">Retrait</span><span class="fw-700">'+order.pickupTime+'</span></div>'
    +(order.discountLabel?'<div style="display:flex;justify-content:space-between;margin-top:.25rem"><span class="text-muted text-sm">Reduction points</span><span class="fw-700 text-red">-'+fmt(order.originalTotal-order.total)+'</span></div>':'')
    +'<div style="display:flex;justify-content:space-between;margin-top:.25rem"><span class="text-muted text-sm">Total</span><span class="fw-700 text-gold">'+fmt(order.total)+'</span></div>'
    +'<div style="display:flex;justify-content:space-between;margin-top:.25rem"><span class="text-muted text-sm">Reglement</span><span class="fw-700">'+order.payment+'</span></div>'
    +'</div>'
    +'<div style="background:rgba(22,101,52,.1);border:1px solid rgba(22,101,52,.25);border-radius:var(--radius);padding:.7rem 1rem;margin-bottom:.75rem;font-size:.82rem">'
    +'🎁 <strong style="color:#2d9e5f">+'+pts+' points</strong> seront ajoutes lors du retrait</div>'
    +'<button class="btn btn-primary btn-full" onclick="closeModal(&apos;m-product&apos;);go(&apos;orders&apos;)">Suivre ma commande</button>'

function renderOrders(){
  var sc=document.getElementById('s-orders');
  if(!sc) return;
  var user=getCurrentUser();
  if(!user){
    sc.innerHTML=header('Commandes')+'<div class="empty-state"><div class="icon">📦</div><div class="title">Mes commandes</div><p class="text-sm">Connectez-vous pour voir vos commandes</p><button class="btn btn-primary mt-2" onclick="showLogin()">Se connecter</button></div>';
    return;
  }
  var orders=getOrders().filter(function(o){return o.userId===user.id;});
  var cfg=getCfg();
  var html=header('Commandes')+'<div style="padding:1rem 1rem 5rem">';
  var active=orders.filter(function(o){return ['pending','confirmed','preparing','ready'].indexOf(o.status)>=0;});
  // Historique trié du plus récent au plus ancien
  var done=orders.filter(function(o){return o.status==='picked_up'||o.status==='cancelled';});
  done.sort(function(a,b){return new Date(b.createdAt)-new Date(a.createdAt);});
  if(active.length>0){
    html+='<div class="sec-title">En cours ('+active.length+')</div>';
    active.forEach(function(o){html+=orderCard(o);});
  }
  if(done.length>0){
    html+='<div class="sec-title" style="margin-top:1.5rem">Historique ('+done.length+')</div>';
    done.forEach(function(o){html+=orderCard(o);});
  }
  if(orders.length===0){
    html+='<div class="empty-state" style="padding:2.5rem 0"><div class="icon">📭</div><div class="title">Aucune commande</div><p class="text-sm">Passez votre premiere commande !</p></div>';
  }
  // Historique complet des points
  var ptsHist = load('ba_pts_history_'+user.id, []);
  if (ptsHist.length > 0) {
    html += '<div class="sec-title" style="margin-top:1.75rem">Historique des points</div>';
    html += '<div class="card" style="padding:.5rem .75rem">';
    ptsHist.forEach(function(h){
      var isPos = h.pts >= 0;
      var dateStr = h.at ? new Date(h.at).toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit',year:'numeric'}) : '';
      html += '<div style="display:flex;justify-content:space-between;align-items:center;padding:.35rem 0;border-bottom:1px solid var(--border);font-size:.82rem">'
        +'<div><div style="font-weight:600">'+h.label+'</div><div style="font-size:.72rem;color:var(--muted)">'+dateStr+'</div></div>'
        +'<span style="font-weight:800;color:'+(isPos?'#10b981':'#ef4444')+';white-space:nowrap">'+(isPos?'+':'')+h.pts+' pts</span>'
        +'</div>';
    });
    html += '</div>';
  }
  html+='</div>';
  sc.innerHTML=html;
}
function orderCard(o){
  var st=STATUTS[o.status]||STATUTS.pending;
  var steps=['confirmed','preparing','ready','picked_up'];
  var stepL={confirmed:'Confirmee',preparing:'En prep.',ready:'Prete',picked_up:'Recuperee'};
  var cur=steps.indexOf(o.status);
  var html='<div class="card mb-2">'
    +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.65rem">'
    +'<span class="font-head fw-800">N°'+o.orderNumber+'</span>'
    +'<span class="status-badge" style="background:'+st.color+'22;color:'+st.color+'">'+st.icon+' '+st.label+'</span></div>'
    +'<div class="text-sm text-muted mb-1">'+new Date(o.createdAt).toLocaleDateString('fr-FR',{day:'numeric',month:'long',hour:'2-digit',minute:'2-digit'})+'</div>'
    +'<div style="margin:.4rem 0">'+o.items.map(function(it,idx){
      var s = o.itemsStatus && o.itemsStatus[idx];
      var dot = s==='done'?'<span style="color:#10b981">✓</span>':o.status==='picked_up'?'<span style="color:#6b7280">✓</span>':o.status==='preparing'&&idx===0&&!s?'<span style="color:#3b82f6">~</span>':'<span style="color:#6b7280">○</span>';
      return '<div style="font-size:.82rem;padding:.15rem 0">'+dot+' '+it.name+'</div>';
    }).join('')+'</div>'
    +'<div class="text-sm fw-700 text-gold">'+fmt(o.total)+' · '+o.payment+'</div>'
    +'<div class="text-sm mt-1">⏰ Retrait a '+o.pickupTime+'</div>';
  if(cur>=0){
    html+='<div style="display:flex;margin-top:.85rem;overflow-x:auto">';
    steps.forEach(function(s,i){
      html+='<div style="flex:1;text-align:center;min-width:60px">'
        +'<div style="width:24px;height:24px;border-radius:50%;background:'+(i<=cur?'var(--red)':'var(--dark4)')+';border:2px solid '+(i<=cur?'var(--red)':'var(--border)')+';margin:0 auto;display:flex;align-items:center;justify-content:center;font-size:.7rem;color:#fff">'
        +(i<=cur?'✓':'')+'</div>'
        +'<div style="font-size:.6rem;color:'+(i<=cur?'var(--text)':'var(--muted)')+';margin-top:.2rem;line-height:1.2">'+stepL[s]+'</div></div>';
    });
    html+='</div>';
  }
  if(o.pointsAwarded){
    var cfg2=getCfg();
    var earnedPts=Math.floor(o.total)*(cfg2.ptsPerEuro||10);
    var bonus=o.total>=(cfg2.bonusOrderThreshold||20)?(cfg2.bonusOrderPts||5):0;
    html+='<div class="text-sm mt-1" style="color:#2d9e5f">+'+( earnedPts+bonus)+' pts gagnés'+( bonus>0?' (dont +'+bonus+' bonus)':'')+'</div>';
  }
  if(o.status==='picked_up'){
    html+='<button class="btn btn-secondary btn-sm btn-full mt-2" data-oid="'+o.id+'" onclick="reorder(this.dataset.oid)">🔄 Recommander la meme chose</button>';
  }
  html+='</div>';
  return html;
}

function buildMsgCreneauSection() {
  var today = new Date().toISOString().split('T')[0];
  var cfg = getCfg();
  var slots = getSlots(today, cfg);
  if (!slots.length) return '<div class="text-sm text-muted">Aucun creneau aujourd\'hui</div>';
  var html = '<div class="card" style="padding:.75rem">';
  html += '<div class="form-group"><label class="form-label">Creneau</label><select class="form-select" id="msg-slot-select">';
  slots.forEach(function(s){ html += '<option value="'+s.time+'">'+s.time+' ('+s.count+' cmd)</option>'; });
  html += '</select></div>';
  html += '<div class="form-group"><label class="form-label">Message</label>';
  html += '<textarea class="form-input" id="msg-slot-text" rows="2" placeholder="Ex: Votre commande est prete !" style="resize:none"></textarea></div>';
  html += '<button class="btn btn-primary btn-sm btn-full" onclick="sendMsgToCreneau()">Envoyer a ce creneau</button>';
  html += '</div>';
  return html;
}

function sendMsgToCreneau() {
  var slot = document.getElementById('msg-slot-select') ? document.getElementById('msg-slot-select').value : '';
  var msg = document.getElementById('msg-slot-text') ? document.getElementById('msg-slot-text').value.trim() : '';
  if (!slot || !msg) { toast('Remplissez creneau et message','error'); return; }
  var today = new Date().toISOString().split('T')[0];
  var orders = getOrders().filter(function(o){
    return o.pickupDate===today && o.pickupTime===slot && ['pending','confirmed','preparing','ready'].indexOf(o.status)>=0;
  });
  if (!orders.length) { toast('Aucun client actif sur ce creneau','info'); return; }
  orders.forEach(function(o){ notify(o.userId, 'Break Antillais', msg); });
  toast('Message envoye a '+orders.length+' client(s) !','success');
  var el = document.getElementById('msg-slot-text');
  if(el) el.value = '';
}

function adminDashboard(){
  var orders = getOrders();
  var today = new Date().toISOString().split('T')[0];
  var todayOrders = orders.filter(function(o){ return o.pickupDate===today; });
  var cfg = getCfg();
  var now = new Date();
  var cp = cfg.cutoff.split(':');
  var cutoff = new Date(); cutoff.setHours(+cp[0],+cp[1],0,0);
  var isOpen = now < cutoff;

  // Today stats
  var active = todayOrders.filter(function(o){ return ['pending','confirmed','preparing','ready'].indexOf(o.status)>=0; });
  var done = todayOrders.filter(function(o){ return o.status==='picked_up'; });
  var cancelled = todayOrders.filter(function(o){ return o.status==='cancelled'; });
  var revenue = done.reduce(function(s,o){ return s+o.total; }, 0);
  var caTotal = todayOrders.filter(function(o){ return o.status!=='cancelled'; }).reduce(function(s,o){ return s+o.total; }, 0);

  // Slots for today
  var slots = getSlots(today, cfg);
  var slotHtml = '';
  slots.forEach(function(s){
    var pct = Math.round(s.count/(cfg.maxSlot||8)*100);
    var col = pct>=100?'var(--red)':pct>=70?'#f59e0b':'#10b981';
    slotHtml += '<div style="margin-bottom:.5rem">'
      +'<div style="display:flex;justify-content:space-between;font-size:.8rem;margin-bottom:.2rem">'
      +'<span class="fw-700">'+s.time+'</span><span style="color:'+col+'">'+s.count+'/'+(cfg.maxSlot||8)+'</span></div>'
      +'<div style="background:var(--dark4);border-radius:100px;height:6px">'
      +'<div style="background:'+col+';width:'+Math.min(100,pct)+'%;height:100%;border-radius:100px"></div></div></div>';
  });

  // Status breakdown
  var statusBreak = {};
  active.forEach(function(o){ statusBreak[o.status]=(statusBreak[o.status]||0)+1; });

  }, 100);

  return html;
}

function exportWhatsApp() {
  var today = new Date().toISOString().split('T')[0];
  var orders = getOrders().filter(function(o){
    return o.pickupDate===today && ['pending','confirmed','preparing','ready','picked_up'].indexOf(o.status)>=0;
  }).sort(function(a,b){ return (a.pickupTime||'').localeCompare(b.pickupTime||''); });
  if(!orders.length){ toast('Aucune commande aujourd\'hui','info'); return; }
  var total = orders.reduce(function(s,o){return s+o.total;},0);
  var done = orders.filter(function(o){return o.status==='picked_up';}).length;
  var dateStr = new Date().toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'});
  var catCount = {};
  var totalItems = 0;
  var catLabel = {bokit:'Bokit',agoulou:'Agoulou',crepe_salee:'Crepe Salee',crepe_sucree:'Crepe Sucree',mini_bokit:'Mini Bokit',enfant:'Menu Enfant',boisson:'Boisson'};
  orders.forEach(function(o){
    o.items.forEach(function(it){
      totalItems++;
      var cat = it.cat || 'autre';
      catCount[cat] = (catCount[cat]||0)+1;
    });
  });
  var lines = [];
  lines.push('BREAK ANTILLAIS - ' + dateStr.toUpperCase());
  lines.push('========================');
  lines.push(orders.length+' commande(s) | '+totalItems+' article(s)');
  lines.push('CA estime : '+fmt(total));
  lines.push('Recuperees : '+done+'/'+orders.length);
  lines.push('');
  lines.push('--- RECAP PAR PRODUIT ---');
  Object.keys(catCount).sort().forEach(function(cat){
    lines.push((catLabel[cat]||cat)+' : '+catCount[cat]);
  });
  lines.push('');
  lines.push('--- DETAIL PAR CRENEAU ---');
  var bySlot = {};
  orders.forEach(function(o){
    if(!bySlot[o.pickupTime]) bySlot[o.pickupTime] = [];
    bySlot[o.pickupTime].push(o);
  });
  var st = {pending:'[ATT]',confirmed:'[OK]',preparing:'[PREP]',ready:'[PRET]',picked_up:'[DONE]'};
  Object.keys(bySlot).sort().forEach(function(slot){
    var slotOrders = bySlot[slot];
    lines.push('');
    lines.push(slot+' ('+slotOrders.length+' cmd)');
    slotOrders.forEach(function(o){
      lines.push((st[o.status]||'?')+' N'+o.orderNumber+' - '+o.userPrenom);
      o.items.forEach(function(i){ lines.push('  > '+i.name+(i.details?' ('+i.details.split('|')[0]+')':'')); });
      lines.push('  '+fmt(o.total)+' - '+o.payment);
    });
  });
  lines.push('');
  lines.push('========================');
  lines.push('Break Antillais App');
  var msg = lines.join('\n');
  window.open('https://wa.me/33659502975?text='+encodeURIComponent(msg),'_blank');
}
