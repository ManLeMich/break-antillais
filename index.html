function adminOrders(){
  var orders=getOrders().slice().sort(function(a,b){
    var activeStatus=['pending','confirmed','preparing','ready'];
    var aActive=activeStatus.indexOf(a.status)>=0;
    var bActive=activeStatus.indexOf(b.status)>=0;
    if(aActive&&!bActive) return -1;
    if(!aActive&&bActive) return 1;
    if(aActive&&bActive){
      var dc=(a.pickupDate||'').localeCompare(b.pickupDate||'');
      if(dc!==0) return dc;
      return (a.pickupTime||'').localeCompare(b.pickupTime||'');
    }
    return new Date(b.createdAt)-new Date(a.createdAt);
  });
  if(!orders.length) return '<div class="empty-state"><div class="icon">📭</div><div class="title">Aucune commande</div></div>';
  var next={pending:'confirmed',confirmed:'preparing',preparing:'ready',ready:'picked_up'};
  var nextL={confirmed:'✅ Valider',preparing:'👨‍🍳 En prep.',ready:'🎉 Prete',picked_up:'✅ Recuperee'};
  var html='<div style="padding:0 .9rem">';
  orders.forEach(function(o){
    var st=STATUTS[o.status]||STATUTS.pending;
    var nxt=next[o.status];
    var canCancel=['pending','confirmed','preparing'].indexOf(o.status)>=0;
    // Format items — bouton Prêt intégré directement si en préparation
    var isPreparingMode = (nxt==='ready' && o.status==='preparing');
    var itemsHtml = o.items.map(function(it, idx){
      var isDone = o.itemsStatus && o.itemsStatus[idx]==='done';
      var parts = [it.name];
      if(it.details) {
        var dets = it.details.split('|').map(function(d){ return d.trim(); }).filter(Boolean);
        dets.forEach(function(d){ parts.push('<span style="color:var(--muted)">&rarr; '+d+'</span>'); });
      }
      var itemText = '<div>'+parts.join('<br style="margin-left:1rem">')+'</div>';
      if (isPreparingMode) {
        var btnOrCheck = isDone
          ? '<span style="color:#10b981;font-weight:700;font-size:.8rem;white-space:nowrap">&#10003; Pr&ecirc;t</span>'
          : '<button class="btn btn-sm" style="padding:.25rem .65rem;font-size:.75rem;background:rgba(16,185,129,.15);border:1px solid #10b981;color:#10b981;white-space:nowrap;border-radius:6px;flex-shrink:0" data-oid="'+o.id+'" data-idx="'+idx+'" onclick="markItemDone(this.dataset.oid,this.dataset.idx)">Pr&ecirc;t ?</button>';
        return '<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:.5rem;padding:.3rem 0;border-bottom:1px solid rgba(255,255,255,.05)">'
          +'<div style="flex:1;line-height:1.5;'+(isDone?'opacity:.45;text-decoration:line-through;':'')+'">'+itemText+'</div>'
          +btnOrCheck
          +'</div>';
      }
      return '<div style="margin-bottom:.2rem">'+itemText+'</div>';
    }).join('');

    html+='<div class="card mb-2">'
      +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.35rem">'
      +'<span class="font-head fw-800">N&deg;'+o.orderNumber+'</span>'
      +'<span class="status-badge" style="background:'+st.color+'22;color:'+st.color+'">'+st.icon+' '+st.label+'</span></div>'
      +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.4rem">'
      +'<span class="fw-700">'+o.userPrenom+'</span>'
      +'<span class="text-sm text-muted">&#128222; '+o.userPhone+'</span></div>'
      +'<div style="font-size:.72rem;color:var(--muted);margin-bottom:.5rem">'+new Date(o.createdAt).toLocaleString('fr-FR')+'</div>'
      +'<div style="background:var(--dark4);border-radius:8px;padding:.6rem .75rem;margin-bottom:.5rem;font-size:.82rem;line-height:1.6">'
      +itemsHtml+'</div>'
      +'<div style="display:flex;justify-content:space-between;align-items:center;padding:.4rem 0;border-top:1px solid var(--border)">'
      +'<span class="text-gold fw-800" style="font-size:1.05rem">'+fmt(o.total)+'</span>'
      +'<span class="text-sm text-muted">&#9200; '+o.pickupDate+' &agrave; '+o.pickupTime+' &middot; '+o.payment+'</span></div>';
    if(nxt==='preparing') {
      html+='<button class="btn btn-primary btn-sm btn-full mt-1" data-oid="'+o.id+'" onclick="advanceOrder(this.dataset.oid)">D&eacute;marrer pr&eacute;paration</button>';
    } else if(isPreparingMode) {
      html+='<button class="btn btn-primary btn-sm btn-full mt-1" data-oid="'+o.id+'" onclick="advanceOrder(this.dataset.oid)">Toute la commande est pr&ecirc;te</button>';
    } else if(nxt) {
      html+='<button class="btn btn-primary btn-sm btn-full mt-1" data-oid="'+o.id+'" onclick="advanceOrder(this.dataset.oid)">&rarr; '+nextL[nxt]+'</button>';
    }

    html+='</div>';
  });
  // Avis clients
  var ratings = load('ba_ratings',[]);
  // Also check Firebase
  if(ratings.length){
    html+='<div class="sec-title">⭐ Avis clients ('+ratings.length+')</div>';
    var avgNote = ratings.reduce(function(s,r){return s+r.note;},0)/ratings.length;
    html+='<div style="text-align:center;padding:.75rem;background:var(--dark3);border-radius:var(--radius);margin-bottom:.75rem">'
      +'<div style="font-size:2rem;font-weight:800;color:var(--gold)">'+avgNote.toFixed(1)+'/5</div>'
      +'<div class="text-sm text-muted">Note moyenne sur '+ratings.length+' avis</div></div>';
    ratings.slice(0,10).forEach(function(r){
      html+='<div style="background:var(--dark3);border-radius:8px;padding:.65rem .85rem;margin-bottom:.35rem">'
        +'<div style="display:flex;justify-content:space-between;align-items:center">'
        +'<span class="fw-700 text-sm">'+r.userName+'</span>'
        +'<span style="color:var(--gold)">'+'⭐'.repeat(r.note)+'</span></div>'
        +(r.comment?'<div class="text-sm text-muted mt-1">'+r.comment+'</div>':'')
        +'<div style="font-size:.7rem;color:var(--muted);margin-top:.25rem">'+new Date(r.at).toLocaleDateString('fr-FR')+'</div>'
        +'</div>';
    });
  }
  return html+'</div>';
}

function markItemDone(orderId, itemIdx) {
  var orders = getOrders();
  var o = orders.find(function(x){ return x.id===orderId; });
  if (!o) return;
  if (!o.itemsStatus) o.itemsStatus = {};
  o.itemsStatus[parseInt(itemIdx)] = 'done';
  saveOrder(o);
  var item = o.items[parseInt(itemIdx)];
  if (item) {
    db.ref('status_updates/'+o.userId+'/item-'+orderId+'-'+itemIdx).set({
      status:'item_ready', orderId:orderId, orderNumber:o.orderNumber,
      title:'En cours...', body:item.name+' est pret !', at:new Date().toISOString()
    });
  }
  toast('Produit marque pret','success');
  document.getElementById('admin-content').innerHTML = adminOrders();
}

function launchConfetti(duration) {
  duration = duration || 2500;
  var colors = ['#C8232B','#D4AF37','#fff','#10b981','#3b82f6','#f59e0b'];
  var container = document.createElement('div');
  container.style.cssText = 'position:fixed;inset:0;pointer-events:none;z-index:9999;overflow:hidden';
  document.body.appendChild(container);
  for (var i = 0; i < 80; i++) {
    (function(i) {
      var el = document.createElement('div');
      var size = Math.random() * 8 + 6;
      var color = colors[Math.floor(Math.random() * colors.length)];
      var left = Math.random() * 100;
      var delay = Math.random() * 1.5;
      var dur = Math.random() * 1.5 + 2;
      var shape = Math.random() > 0.5 ? '50%' : '0';
      el.style.cssText = 'position:absolute;top:-20px;left:'+left+'%;width:'+size+'px;height:'+size+'px;background:'+color+';border-radius:'+shape+';animation:confettiFall '+dur+'s ease '+delay+'s forwards,confettiWiggle '+(.3+Math.random()*.4)+'s ease infinite';
      container.appendChild(el);
    })(i);
  }
  setTimeout(function(){ if(container.parentNode) container.parentNode.removeChild(container); }, duration + 2000);
}

function advanceOrder(id){
  var next={pending:'confirmed',confirmed:'preparing',preparing:'ready',ready:'picked_up'};
  var orders=getOrders();
  var o=orders.find(function(x){return x.id===id;});
  if(!o) return;
  var nxt=next[o.status]; if(!nxt) return;
  o.status=nxt;
  if(nxt==='picked_up'&&!o.pointsAwarded){
    var users=getUsers();
    var u=users.find(function(x){return x.id===o.userId;});
    if(u){
      var cfg=getCfg();
      var pts=Math.floor(o.total)*(cfg.ptsPerEuro||10);
      // Bonus 5pts for orders over 20€
      var cfg3 = getCfg();
      var bonusThreshold = cfg3.bonusOrderThreshold || 20;
      var bonusPts = cfg3.bonusOrderPts || 5;
      var bonus = o.total >= bonusThreshold ? bonusPts : 0;
      var totalPts = pts + bonus;
      u.points=(u.points||0)+totalPts;
      db.ref('data/users/'+u.id+'/points').set(u.points);
      // Save points history
      var hist = load('ba_pts_history_'+u.id, []);
      var histLabel = 'Commande n°'+o.orderNumber+(bonus>0?' (+'+bonus+' pts bonus >'+bonusThreshold+'€)':'');
      hist.unshift({pts:totalPts, label:histLabel, at:new Date().toISOString()});
      if(hist.length>50) hist=hist.slice(0,50);
      save('ba_pts_history_'+u.id, hist);
      saveUser(u);
      o.pointsAwarded=true;
      var notifMsg = '+'+pts+' points'+(bonus>0?' + '+bonus+' pts bonus':'')+' pour votre commande n°'+o.orderNumber;
      notify(o.userId,'🎁 Points ajoutes !', notifMsg);
      // Vérifier palier atteint
      db.ref('status_updates/'+o.userId+'/palier-check').set({status:'check_palier',at:new Date().toISOString()});
    }
  }
  saveOrder(o);
  var titles={confirmed:'✅ Confirmee',preparing:'👨‍🍳 En preparation',ready:'🎉 Prete !',picked_up:'✅ Recuperee'};
  var bodies={
    confirmed:'Votre commande n°'+o.orderNumber+' est confirmee. Retrait a '+o.pickupTime+'.',
    preparing:'Votre commande n°'+o.orderNumber+' est en preparation.',
    ready:'Votre commande n°'+o.orderNumber+' est prete ! Venez la recuperer.',
    picked_up:'Commande n°'+o.orderNumber+' recuperee. Merci ! 🌴'
  };
  // Single notification channel - notify() handles Firebase + OneSignal
  notifyOrder(o.userId, titles[nxt], bodies[nxt], nxt, o.id, o.orderNumber, o.pickupTime);
  toast('Statut mis a jour','success');
  document.getElementById('admin-content').innerHTML=adminOrders();
  // Prompt rating when order is picked up - 25 min delay
  if(nxt==='picked_up') {
    var delayMs = 25 * 60 * 1000; // 25 minutes
    setTimeout(function(){
      // In-app notification if app is open
      db.ref('status_updates/'+o.userId+'/rating-'+o.id).set({
        status:'rate_order', orderId:o.id, orderNumber:o.orderNumber,
        title:'Comment etait votre commande ?',
        body:'Donnez votre avis sur la commande N°'+o.orderNumber,
        at:new Date().toISOString()
      });
    }, delayMs);
    // OneSignal push notification - scheduled 25 min later
    osSendPush(o.userId,
      '⭐ Comment etait votre commande ?',
      'Donnez votre avis sur la commande N°'+o.orderNumber+' - ca nous aide beaucoup !',
      delayMs
    );
  }
}

function previewImg(input){
  var f=input.files[0]; if(!f) return;
  // Lire et compresser l'image
  var reader = new FileReader();
  reader.onload = function(e) {
    var img = new Image();
    img.onload = function() {
      // Compression : max 900px, qualite 80%
      var MAX = 900;
      var w = img.width, h = img.height;
      if (w > h) { if(w>MAX){h=Math.round(h*MAX/w);w=MAX;} } else { if(h>MAX){w=Math.round(w*MAX/h);h=MAX;} }
      var canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      var dataUrl = canvas.toDataURL('image/jpeg', 0.80);
      // Stocker l'image compressée en base64
      _newImg = dataUrl;
      // Afficher l'apercu
      var prev = document.getElementById('pf-prev');
      if (prev) {
        if (prev.tagName==='IMG') prev.src = dataUrl;
        else prev.outerHTML = '<img id="pf-prev" src="'+dataUrl+'" style="width:100%;height:110px;object-fit:cover;border-radius:8px;margin-top:.4rem">';
      }
      toast('Photo prête ! Cliquez Enregistrer.','success',2000);
    };
    img.onerror = function(){
      // Fallback sans compression
      _newImg = e.target.result;
      toast('Photo prête !','success',1500);
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(f);
}

function adminStats(period){
  period = period||'all';
  var allOrders = getOrders();
  var now = new Date();
  var filtered = allOrders.filter(function(o){
    if(o.status==='cancelled') return false;
    if(period==='week'){var d=new Date(o.createdAt);return (now-d)<7*86400000;}
    if(period==='month'){var d=new Date(o.createdAt);return (now-d)<30*86400000;}
    return true;
  });
  var done = filtered.filter(function(o){return o.status==='picked_up';});
  var revenue = done.reduce(function(s,o){return s+o.total;},0);
  var avg = done.length?revenue/done.length:0;
  var clients = getUsers().filter(function(u){var r=u.role||'client';return r==='client'||r==='';});

  // Revenue by day of week
  var byDay = [0,0,0,0,0,0,0];
  var byDayCount = [0,0,0,0,0,0,0];
  done.forEach(function(o){
    var d = new Date(o.createdAt).getDay();
    byDay[d] += o.total;
    byDayCount[d]++;
  });
  var dayNames = ['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];
  var maxDay = Math.max.apply(null, byDay) || 1;

  // Revenue by hour (affluence)
  var byHour = {};
  allOrders.filter(function(o){return o.status!=='cancelled';}).forEach(function(o){
    var h = o.pickupTime ? o.pickupTime.split(':')[0] : null;
    if(h) byHour[h] = (byHour[h]||0)+1;
  });
  var maxHour = Math.max.apply(null, Object.values(byHour).concat([1]));

  // Top products
  var freq={};
  done.forEach(function(o){o.items.forEach(function(i){if(i.cat!=='reward') freq[i.name]=(freq[i.name]||0)+1;});});
  var top=Object.entries(freq).sort(function(a,b){return b[1]-a[1];}).slice(0,8);

  var html='<div style="padding:0 .9rem">';

  // Period selector
  html+='<div style="display:flex;gap:.35rem;margin:.75rem 0;flex-wrap:wrap">'
    +'<button class="btn btn-sm '+(period==='all'?'btn-primary':'btn-secondary')+'" onclick="document.getElementById(&apos;admin-content&apos;).innerHTML=adminStats(&apos;all&apos;)">Tout</button>'
    +'<button class="btn btn-sm '+(period==='month'?'btn-primary':'btn-secondary')+'" onclick="document.getElementById(&apos;admin-content&apos;).innerHTML=adminStats(&apos;month&apos;)">30 jours</button>'
    +'<button class="btn btn-sm '+(period==='week'?'btn-primary':'btn-secondary')+'" onclick="document.getElementById(&apos;admin-content&apos;).innerHTML=adminStats(&apos;week&apos;)">7 jours</button>'
    +'</div>';

  // KPIs
  html+='<div class="stat-grid">'
    +'<div class="stat-card"><div class="stat-val">'+fmt(revenue)+'</div><div class="stat-lbl">CA</div></div>'
    +'<div class="stat-card"><div class="stat-val">'+done.length+'</div><div class="stat-lbl">Commandes</div></div>'
    +'<div class="stat-card"><div class="stat-val">'+fmt(avg)+'</div><div class="stat-lbl">Panier moy.</div></div>'
    +'<div class="stat-card"><div class="stat-val">'+clients.length+'</div><div class="stat-lbl">Clients</div></div>'
    +'</div>';

  // CA par jour de semaine
  html+='<div class="sec-title mt-2">📅 CA par jour</div>'
    +'<div class="card mb-2">';
  dayNames.forEach(function(d,i){
    var pct = Math.round((byDay[i]/maxDay)*100);
    var col = byDay[i]>0?'var(--red)':'var(--dark4)';
    html+='<div style="display:flex;align-items:center;gap:.75rem;margin-bottom:.45rem">'
      +'<div style="width:28px;font-size:.75rem;font-weight:700;color:var(--muted)">'+d+'</div>'
      +'<div style="flex:1;background:var(--dark4);border-radius:100px;height:8px">'
      +'<div style="background:'+col+';width:'+pct+'%;height:100%;border-radius:100px"></div></div>'
      +'<div style="min-width:60px;text-align:right;font-size:.75rem;font-weight:700;color:var(--gold)">'+fmt(byDay[i])+'</div>'
      +'<div style="min-width:30px;text-align:right;font-size:.7rem;color:var(--muted)">'+byDayCount[i]+'x</div>'
      +'</div>';
  });
  html+='</div>';

  // Affluence par heure
  html+='<div class="sec-title">🕐 Affluence par créneau</div>'
    +'<div class="card mb-2">';
  Object.keys(byHour).sort().forEach(function(h){
    var pct = Math.round((byHour[h]/maxHour)*100);
    var col = pct>=80?'#ef4444':pct>=50?'#f59e0b':'#10b981';
    html+='<div style="display:flex;align-items:center;gap:.75rem;margin-bottom:.45rem">'
      +'<div style="width:40px;font-size:.75rem;font-weight:700">'+h+'h</div>'
      +'<div style="flex:1;background:var(--dark4);border-radius:100px;height:8px">'
      +'<div style="background:'+col+';width:'+pct+'%;height:100%;border-radius:100px"></div></div>'
      +'<div style="min-width:35px;text-align:right;font-size:.75rem;font-weight:700;color:'+col+'">'+byHour[h]+'</div>'
      +'</div>';
  });
  if(!Object.keys(byHour).length) html+='<p class="text-sm text-muted">Pas encore de données</p>';
  html+='</div>';

  // Top produits
  if(top.length){
    html+='<div class="sec-title">🏆 Top produits</div>';
    var maxFreq = top[0][1]||1;
    top.forEach(function(e,i){
      var pct = Math.round((e[1]/maxFreq)*100);
      html+='<div style="display:flex;align-items:center;gap:.75rem;padding:.5rem .75rem;background:var(--dark3);border-radius:8px;margin-bottom:.35rem">'
        +'<div style="min-width:20px;font-weight:800;color:var(--red);font-size:.85rem">'+(i+1)+'</div>'
        +'<div style="flex:1">'
        +'<div class="fw-700 text-sm">'+e[0]+'</div>'
        +'<div style="background:var(--dark4);border-radius:100px;height:4px;margin-top:.25rem">'
        +'<div style="background:var(--red);width:'+pct+'%;height:100%;border-radius:100px"></div></div>'
        +'</div>'
        +'<div class="fw-700 text-gold" style="font-size:.85rem">'+e[1]+'x</div>'
        +'</div>';
    });
  }
  // Avis clients
  var ratings = load('ba_ratings',[]);
  // Also check Firebase
  if(ratings.length){
    html+='<div class="sec-title">⭐ Avis clients ('+ratings.length+')</div>';
    var avgNote = ratings.reduce(function(s,r){return s+r.note;},0)/ratings.length;
    html+='<div style="text-align:center;padding:.75rem;background:var(--dark3);border-radius:var(--radius);margin-bottom:.75rem">'
      +'<div style="font-size:2rem;font-weight:800;color:var(--gold)">'+avgNote.toFixed(1)+'/5</div>'
      +'<div class="text-sm text-muted">Note moyenne sur '+ratings.length+' avis</div></div>';
    ratings.slice(0,10).forEach(function(r){
      html+='<div style="background:var(--dark3);border-radius:8px;padding:.65rem .85rem;margin-bottom:.35rem">'
        +'<div style="display:flex;justify-content:space-between;align-items:center">'
        +'<span class="fw-700 text-sm">'+r.userName+'</span>'
        +'<span style="color:var(--gold)">'+'⭐'.repeat(r.note)+'</span></div>'
        +(r.comment?'<div class="text-sm text-muted mt-1">'+r.comment+'</div>':'')
        +'<div style="font-size:.7rem;color:var(--muted);margin-top:.25rem">'+new Date(r.at).toLocaleDateString('fr-FR')+'</div>'
        +'</div>';
    });
  }
  return html+'</div>';
}

function generateMarketCode(userId, amount) {
  var chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  var rand = function(n){ var s=''; for(var i=0;i<n;i++) s+=chars[Math.floor(Math.random()*chars.length)]; return s; };
  var code = 'BA-' + rand(4) + '-' + rand(4);
  var cfg = getCfg();
  var pts = Math.floor(amount) * (cfg.ptsPerEuro || 10);
  var obj = {code:code, userId:userId, amount:amount, pts:pts, createdAt:new Date().toISOString(), used:false};
  db.ref('data/market_codes/' + code).set(obj);
  return obj;
}

function mcSearchPhone(val) {
  var res = document.getElementById('mc-phone-results');
  if (!res) return;
  var clean = (val||'').replace(/[^0-9]/g,'');
  if (clean.length < 3) { res.innerHTML = ''; return; }
  var users = getUsers().filter(function(u){ return !u.role || u.role==='client'; });
  var found = users.filter(function(u){ return (u.phone||'').replace(/[^0-9]/g,'').indexOf(clean) >= 0; });
  if (!found.length) {

function redeemMarketCode(code) {
  if (!code || !code.trim()) { toast('Entrez un code','error'); return; }
  var codeUpper = code.trim().toUpperCase();
  db.ref('data/market_codes/' + codeUpper).once('value').then(function(snap){
    var c = snap.val();
    if (!c) { toast('Code invalide','error'); return; }
    if (c.used) { toast('Ce code a deja ete utilise','error'); return; }
    var user = getCurrentUser();
    if (!user) { toast('Connectez-vous','error'); return; }
    // Vérifier que le code appartient à ce compte OU au numéro de téléphone
  var phoneMatch = c.phone && c.phone.replace(/[^0-9]/g,'') === (user.phone||'').replace(/[^0-9]/g,'');
  if (c.userId && c.userId !== user.id) { toast('Ce code n\'est pas pour votre compte','error'); return; }
  if (!c.userId && !phoneMatch) { toast('Ce code est lie a un autre numero de telephone','error'); return; }
  // Si c'était un client inconnu, lier maintenant au compte
  if (c.unknownClient && !c.userId) {
    db.ref('data/market_codes/' + codeUpper + '/userId').set(user.id);
  }
    var created = new Date(c.createdAt);
    if ((new Date() - created) > 7*24*60*60*1000) { toast('Code expire','error'); return; }
    db.ref('data/market_codes/' + codeUpper + '/used').set(true);
    user.points = (user.points || 0) + c.pts;
    db.ref('data/users/' + user.id + '/points').set(user.points);
    var hist = load('ba_pts_history_' + user.id, []);
    hist.unshift({pts: c.pts, label: 'Achat marche (' + c.amount.toFixed(2) + 'EUR)', at: new Date().toISOString()});
    save('ba_pts_history_' + user.id, hist);
    saveUser(user);
    setCurrentUser(user);
    toast('+' + c.pts + ' points ajoutes !', 'success', 4000);
    renderProfile();
  }).catch(function(){ toast('Erreur verification','error'); });
}

function createPromoCode() {
  var code = (document.getElementById('pc-code').value||'').trim().toUpperCase();

  var limit = parseInt(document.getElementById('pc-limit').value)||0;

  if (!pts) { toast('Points requis','error'); return; }
  if (!code) {
    var chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
    code = 'BA'; for(var i=0;i<6;i++) code+=chars[Math.floor(Math.random()*chars.length)];
  }
  var obj = {code:code, pts:pts, limit:limit, used:0, expiry:expiry, createdAt:new Date().toISOString(), active:true};
  db.ref('data/promo_codes/'+code).set(obj).then(function(){
    toast('Code '+code+' cree !','success');
    document.getElementById('pc-code').value = '';

  });

function loadPromoCodes() {
  var list = document.getElementById('pc-list');
  if (!list) return;
  db.ref('data/promo_codes').once('value').then(function(snap){
    var codes = []; snap.forEach(function(s){ codes.push(s.val()); });
    if (!codes.length) { list.innerHTML = '<div class="text-sm text-muted">Aucun code</div>'; return; }
    var h = '';
    codes.reverse().forEach(function(p){
      var expired = p.expiry && new Date(p.expiry) < new Date();
      var full = p.limit > 0 && p.used >= p.limit;
      var status = !p.active||expired||full ? 'Inactif' : 'Actif';
      var col = (!p.active||expired||full) ? 'var(--muted)' : '#10b981';
      h += '<div style="display:flex;justify-content:space-between;align-items:flex-start;padding:.5rem 0;border-bottom:1px solid var(--border)">'
        +'<div><div class="fw-700" style="font-family:monospace;letter-spacing:.06em">'+p.code+'</div>'
        +'<div class="text-muted" style="font-size:.75rem">+'+p.pts+' pts &bull; Utilise: '+p.used+'/'+(p.limit||'illim.')+(p.expiry?' &bull; exp: '+new Date(p.expiry).toLocaleDateString('fr-FR'):'')+' </div></div>'
        +'<div style="display:flex;align-items:center;gap:.4rem">'
        +'<span style="color:'+col+';font-weight:700;font-size:.75rem">'+status+'</span>'
        +'<button class="btn btn-sm" style="padding:.2rem .4rem;font-size:.7rem;background:rgba(239,68,68,.15);border-color:#ef4444;color:#ef4444" data-code="'+p.code+'" onclick="deletePromoCode(this.dataset.code)">X</button>'
        +'</div></div>';
    });
    list.innerHTML = h;
  }).catch(function(){ list.innerHTML = '<div class="text-sm text-muted">Erreur</div>'; });
}

function deletePromoCode(code) {

}

function redeemPromoCode(code) {
  if (!code||!code.trim()) { toast('Entrez un code','error'); return; }
  var user = getCurrentUser();
  if (!user) { toast('Connectez-vous','error'); return; }
  var codeUp = code.trim().toUpperCase();
  db.ref('data/promo_codes/'+codeUp).once('value').then(function(snap){
    var p = snap.val();
    if (!p||!p.active) { toast('Code invalide','error'); return; }
    if (p.expiry && new Date(p.expiry) < new Date()) { toast('Code expire','error'); return; }
    if (p.limit > 0 && p.used >= p.limit) { toast('Code epuise','error'); return; }
    // Vérifier si ce user a déjà utilisé ce code
    db.ref('data/promo_uses/'+codeUp+'/'+user.id).once('value').then(function(usnap){
      if (usnap.exists()) { toast('Vous avez deja utilise ce code','error'); return; }
      // Appliquer
      db.ref('data/promo_codes/'+codeUp+'/used').set((p.used||0)+1);
      db.ref('data/promo_uses/'+codeUp+'/'+user.id).set(new Date().toISOString());
      user.points = (user.points||0) + p.pts;
      db.ref('data/users/'+user.id+'/points').set(user.points);
      var hist = load('ba_pts_history_'+user.id,[]);
      hist.unshift({pts:p.pts, label:'Code promo: '+codeUp, at:new Date().toISOString()});
      save('ba_pts_history_'+user.id, hist);
      saveUser(user); setCurrentUser(user);
      toast('+'+p.pts+' points ! Code '+codeUp+' utilise.','success',4000);
      renderProfile();
    });
  }).catch(function(){ toast('Erreur verification','error'); });
}

function getFilteredClients(target) {
  var allUsers = getUsers();
  // If no users in cache, try to get from Firebase sync
  if (!allUsers.length) {
    toast('Chargement des clients...', 'info', 2000);
  }
  var allClients = allUsers.filter(function(u){ return !u.role || u.role==='client'; });
  var now = new Date();
  if (target === 'all') return allClients;
  if (target === 'inactive' || target === 'inactive30') {
    var days = target === 'inactive' ? 14 : 30;
    var orders = getOrders();
    return allClients.filter(function(u){
      var lastOrder = orders.filter(function(o){ return o.userId===u.id && o.status!=='cancelled'; })
        .sort(function(a,b){ return new Date(b.createdAt)-new Date(a.createdAt); })[0];
      if (!lastOrder) {
        // No orders - check signup date
        var signupDays = (now - new Date(u.createdAt)) / (1000*60*60*24);
        return signupDays >= days;
      }
      var daysSince = (now - new Date(lastOrder.createdAt)) / (1000*60*60*24);
      return daysSince >= days;
    });
  }
  if (target.startsWith('palier-')) {
    var palierName = target.replace('palier-','');
    return allClients.filter(function(u){
      var p = getPalier(u.points||0);
      return p.name === palierName;
    });
  }
  return allClients;
}

function sendAdminMessage() {
  var target = document.getElementById('msg-target').value;
  var type = document.getElementById('msg-type').value;
  var title = (document.getElementById('msg-title').value||'').trim();
  var body = (document.getElementById('msg-body').value||'').trim();
  if (!title || !body) { toast('Titre et message requis','error'); return; }
  toast('Envoi en cours...','info', 2000);
  // Reload fresh users from Firebase
  db.ref('data/users').once('value').then(function(snap) {
    var usersObj = snap.val() || {};
    var usersArr = Object.values(usersObj).filter(function(u){ return u && (!u.role || u.role==='client'); });
    if (!usersArr.length) { toast('Aucun client inscrit','warning'); return; }
    // Filter by target
    var now = new Date();
    var orders = getOrders();
    var clients = usersArr;
    if (target === 'inactive' || target === 'inactive30') {
      var days = target === 'inactive' ? 14 : 30;
      clients = usersArr.filter(function(u){
        var lastO = orders.filter(function(o){ return o.userId===u.id && o.status!=='cancelled'; })
          .sort(function(a,b){ return new Date(b.createdAt)-new Date(a.createdAt); })[0];
        var ref = lastO ? new Date(lastO.createdAt) : new Date(u.createdAt);
        return (now - ref) / (1000*60*60*24) >= days;
      });
    } else if (target.startsWith('palier-')) {
      var palierName = target.replace('palier-','');
      clients = usersArr.filter(function(u){ return getPalier(u.points||0).name===palierName; });
    }
    if (!clients.length) { toast('Aucun client correspond a ce filtre','warning'); return; }
    var expiry = document.getElementById('msg-expiry');
    var expiryVal = expiry ? expiry.value : null;
    clients.forEach(function(u){
      if (type === 'promo') {
        var promos = load('ba_promos', []);
        var exp = expiryVal ? new Date(expiryVal).toISOString() : new Date(Date.now()+7*86400000).toISOString();
        promos.push({id:genId(),userId:u.id,type:'limited',title:title,desc:body,expiresAt:exp,used:false});
        save('ba_promos', promos);
      }
      notify(u.id, title, body);
      osSendPush(u.id, title, body, 0);
    });
    toast('✅ Message envoye a '+clients.length+' client(s) !','success', 5000);
    ['msg-title','msg-body'].forEach(function(id){ var el=document.getElementById(id); if(el) el.value=''; });
  }).catch(function(e){ toast('Erreur envoi: '+e.message,'error'); });
}

  var q = query.toLowerCase().trim();

    return u.prenom.toLowerCase().includes(q) || (u.email||'').toLowerCase().includes(q) || (u.phone||'').includes(q);

function addCustomChoiceToPalier(palierIdx) {
  // Construire la liste de tous les produits de l'app
  var allProds = getProducts().filter(function(p){ return p.name; });
  allProds.sort(function(a,b){ return a.name.localeCompare(b.name,'fr'); });
  // Récupérer les produits déjà cochés dans ce palier pour éviter doublons
  var wrap = document.getElementById("pal-choices-wrap-"+palierIdx);
  var already = [];
  if(wrap){ wrap.querySelectorAll('input[type=checkbox]').forEach(function(inp){ already.push(inp.dataset.prod); }); }
  // Produits pas encore présents
  var toShow = allProds.filter(function(p){ return already.indexOf(p.name)<0; });

  // Créer la modale de sélection
  var existing = document.getElementById('modal-add-choice');
  if(existing) existing.remove();

  var m = document.createElement('div');
  m.id = 'modal-add-choice';
  m.style.cssText = 'position:fixed;inset:0;z-index:10001;background:rgba(0,0,0,.75);display:flex;align-items:flex-end;justify-content:center';
  
  var cats = {};
  toShow.forEach(function(p){
    var cat = p.cat || 'autre';
    if(!cats[cat]) cats[cat] = [];
    cats[cat].push(p);
  });
  
  var catLabels = {bokit:'🫓 Bokits', agoulou:'🌯 Agoulou', crepe_salee:'🥞 Crêpes salées', crepe_sucree:'🍫 Crêpes sucrées', mini_bokit:'📦 Box Mini', enfant:'🧒 Enfants', boisson:'🥤 Boissons'};
  
  var inner = '<div style="background:var(--dark2);border-radius:16px 16px 0 0;width:100%;max-width:520px;max-height:75vh;overflow-y:auto;padding:1.25rem">';
  inner += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">';
  inner += '<div style="font-weight:800;font-size:1.05rem">Ajouter un produit au palier</div>';
    inner += '<button onclick="closeAddChoiceModal()" style="background:none;border:none;color:var(--muted);font-size:1.4rem;cursor:pointer">×</button></div>';
  
  if(!toShow.length){
    inner += '<p style="color:var(--muted);font-size:.85rem;text-align:center;padding:1rem 0">Tous les produits sont déjà ajoutés</p>';
  } else {
    Object.keys(cats).forEach(function(cat){
      inner += '<div style="font-size:.7rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin:.75rem 0 .35rem">'+(catLabels[cat]||cat)+'</div>';
      inner += '<div style="display:flex;flex-direction:column;gap:.3rem">';
      cats[cat].forEach(function(p){
        inner += '<button data-prodname="'+p.name.replace(/"/g,"&quot;")+'" data-pi="'+palierIdx+'" onclick="confirmAddChoiceToPalier(this)" style="background:var(--dark3);border:1px solid var(--border);border-radius:8px;padding:.55rem .85rem;text-align:left;color:var(--text);font-size:.85rem;cursor:pointer;display:flex;align-items:center;gap:.5rem">'+p.name+(p.price?'<span style=\"color:var(--muted);font-size:.75rem;margin-left:auto\">'+p.price+'€</span>':'')+'</button>';
      });
      inner += '</div>';
    });
  }
  inner += '</div>';
  m.innerHTML = inner;
  m.addEventListener('click', function(e){ if(e.target===m) m.remove(); });
  document.body.appendChild(m);
}

function saveMeats() {
  var updated = [];
  var i = 0;
  while(true) {
    var n = document.getElementById('meat-name-'+i);
    if (!n) break;
    var p = document.getElementById('meat-price-'+i);
    var o = document.getElementById('meat-ok-'+i);
    updated.push({
      name: n.value.trim() || ('Viande '+i),
      price: p ? (parseFloat(p.value)||6.50) : 6.50,
      ok: o ? o.checked : true,
      halal: document.getElementById('meat-halal-'+i) ? document.getElementById('meat-halal-'+i).checked : false,
      supplementPrice: document.getElementById('meat-suprice-'+i) ? (parseFloat(document.getElementById('meat-suprice-'+i).value)||0.50) : 0.50
    });
    i++;
  }
  if (updated.length === 0) { toast('Aucune viande trouvee','error'); return; }
  updated.sort(function(a,b){return a.name.localeCompare(b.name,'fr');});
  save('ba_meats', updated);
  MEATS = updated.map(function(m){return m.name;});
  MEAT_PRICES = {};
  updated.forEach(function(m){MEAT_PRICES[m.name]=m.price;});
  toast('Viandes enregistrees !','success');
  var ml = document.getElementById('meats-list') || document.getElementById('pf-meats-list');
  if(ml) ml.innerHTML = buildMeatsList();
}
function saveMeatsInline() {
  saveMeats();
  var ml = document.getElementById('pf-meats-list');
  if(ml) ml.innerHTML = buildMeatsList();
}
function addMeat() {
  var meats = getMeats();
  meats.push({name:'Nouvelle viande', price:6.50, ok:true});
  save('ba_meats', meats);
  var ml = document.getElementById('meats-list') || document.getElementById('pf-meats-list');
  if(ml) ml.innerHTML = buildMeatsList();
}
function deleteMeat(i) {
  var meats = getMeats();
  if(meats.length<=1){toast('Gardez au moins 1 viande','warning');return;}
  meats.splice(parseInt(i),1);
  save('ba_meats', meats);
  var ml = document.getElementById('meats-list') || document.getElementById('pf-meats-list');
  if(ml) ml.innerHTML = buildMeatsList();
  toast('Viande supprimee','info');
}
function buildClosedDatesList() {
  var cfg = getCfg();
  var dates = cfg.closedDates || [];
  if (!dates.length) return '<p class="text-sm text-muted">Aucune fermeture programmee</p>';
  var html = '';
  dates.forEach(function(c, i){
    var d = new Date(c.date);
    html += '<div style="display:flex;align-items:center;justify-content:space-between;padding:.5rem .75rem;background:var(--dark3);border-radius:8px;margin-bottom:.35rem">'
      +'<div><div class="fw-700 text-sm">'+d.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',year:'numeric'})+'</div>'
      +'<div class="text-sm text-muted">'+c.msg+'</div></div>'
      +'<button class="btn btn-danger btn-sm" data-ci="'+i+'" onclick="removeClosedDate(this.dataset.ci)" style="padding:.3rem .5rem">🗑</button>'
      +'</div>';
  });
  return html;

function addClosedDate() {
  var dateEl = document.getElementById('closed-date-input');
  var msgEl = document.getElementById('closed-date-msg');
  if (!dateEl || !dateEl.value) { toast('Choisissez une date','error'); return; }
  var cfg = getCfg();
  if (!cfg.closedDates) cfg.closedDates = [];
  cfg.closedDates.push({date: dateEl.value, msg: msgEl.value.trim() || 'Fermeture exceptionnelle'});
  cfg.closedDates.sort(function(a,b){ return a.date.localeCompare(b.date); });
  save('ba_cfg', cfg);
  dateEl.value = ''; msgEl.value = '';
  var el = document.getElementById('closed-dates-list');
  if(el) el.innerHTML = buildClosedDatesList();
  toast('Fermeture ajoutee','success');

function removeClosedDate(i) {
  var cfg = getCfg();
  cfg.closedDates = cfg.closedDates || [];

  cfg.address=document.getElementById('cfg-ad').value;

function createAdminAccount(){
  var email=(document.getElementById('adm-e').value||'').trim().toLowerCase();
  var pwd=document.getElementById('adm-p').value;
  var prenom=(document.getElementById('adm-n').value||'').trim();
  var role=document.getElementById('adm-r').value;
  if(!email||!pwd||!prenom){toast('Tous les champs sont requis','error');return;}
  var users=getUsers();
  if(users.find(function(u){return u.email===email;})){toast('Email deja utilise','error');return;}
  var newUser={id:genId(),role:role,prenom:prenom,email:email,pwd:pwd,phone:'',points:0,notifs:[],createdAt:new Date().toISOString()};
  saveUser(newUser); toast('Compte '+role+' cree pour '+prenom,'success');
}
function adminInvoices(sortBy){
  sortBy = sortBy||'recent';
  var orders=getOrders().filter(function(o){return o.status!=='cancelled';});
  if(sortBy==='recent') orders.sort(function(a,b){return new Date(b.createdAt)-new Date(a.createdAt);});
  else if(sortBy==='oldest') orders.sort(function(a,b){return new Date(a.createdAt)-new Date(b.createdAt);});
  else if(sortBy==='name') orders.sort(function(a,b){return a.userPrenom.localeCompare(b.userPrenom,'fr');});
  else if(sortBy==='total') orders.sort(function(a,b){return b.total-a.total;});
  var html='<div style="padding:0 .9rem"><div style="display:flex;justify-content:space-between;align-items:center;margin:.75rem 0">'
    +'<span class="font-head fw-800" style="font-size:1.1rem">Factures ('+orders.length+')</span>'
    +'<button class="btn btn-primary btn-sm" onclick="exportCSV()">📥 CSV</button></div>'
    +'<div style="display:flex;gap:.35rem;flex-wrap:wrap;margin-bottom:.75rem">'
    +'<button class="btn btn-sm '+(sortBy==='recent'?'btn-primary':'btn-secondary')+'" onclick="document.getElementById(&apos;admin-content&apos;).innerHTML=adminInvoices(&apos;recent&apos;)">🕐 Récent</button>'
    +'<button class="btn btn-sm '+(sortBy==='oldest'?'btn-primary':'btn-secondary')+'" onclick="document.getElementById(&apos;admin-content&apos;).innerHTML=adminInvoices(&apos;oldest&apos;)">🕐 Ancien</button>'
    +'<button class="btn btn-sm '+(sortBy==='name'?'btn-primary':'btn-secondary')+'" onclick="document.getElementById(&apos;admin-content&apos;).innerHTML=adminInvoices(&apos;name&apos;)">👤 Nom</button>'
    +'<button class="btn btn-sm '+(sortBy==='total'?'btn-primary':'btn-secondary')+'" onclick="document.getElementById(&apos;admin-content&apos;).innerHTML=adminInvoices(&apos;total&apos;)">💰 Montant</button>'
    +'</div>';
  orders.forEach(function(o){
    html+='<div class="card mb-1" style="display:flex;justify-content:space-between;align-items:center">'
      +'<div><div class="fw-700 text-sm">N°'+o.orderNumber+'</div>'
      +'<div class="text-sm text-muted">'+new Date(o.createdAt).toLocaleDateString('fr-FR')+' · '+o.userPrenom+'</div>'
      +'<div class="text-sm text-gold">'+fmt(o.total)+'</div></div>'
      +'<button class="btn btn-secondary btn-sm" data-oid="'+o.id+'" onclick="viewInvoice(this.dataset.oid)">Voir</button></div>';
  });
  // Avis clients
  var ratings = load('ba_ratings',[]);
  // Also check Firebase
  if(ratings.length){
    html+='<div class="sec-title">⭐ Avis clients ('+ratings.length+')</div>';
    var avgNote = ratings.reduce(function(s,r){return s+r.note;},0)/ratings.length;
    html+='<div style="text-align:center;padding:.75rem;background:var(--dark3);border-radius:var(--radius);margin-bottom:.75rem">'
      +'<div style="font-size:2rem;font-weight:800;color:var(--gold)">'+avgNote.toFixed(1)+'/5</div>'
      +'<div class="text-sm text-muted">Note moyenne sur '+ratings.length+' avis</div></div>';
    ratings.slice(0,10).forEach(function(r){
      html+='<div style="background:var(--dark3);border-radius:8px;padding:.65rem .85rem;margin-bottom:.35rem">'
        +'<div style="display:flex;justify-content:space-between;align-items:center">'
        +'<span class="fw-700 text-sm">'+r.userName+'</span>'
        +'<span style="color:var(--gold)">'+'⭐'.repeat(r.note)+'</span></div>'
        +(r.comment?'<div class="text-sm text-muted mt-1">'+r.comment+'</div>':'')
        +'<div style="font-size:.7rem;color:var(--muted);margin-top:.25rem">'+new Date(r.at).toLocaleDateString('fr-FR')+'</div>'
        +'</div>';
    });
  }
  return html+'</div>';

function importAllData(input) {
  var file = input.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var data = JSON.parse(e.target.result);
      if (!data.version || !data.ba_users) { toast('Fichier invalide','error'); return; }
      // Restore all keys
      Object.keys(data).forEach(function(k){
        if (k === 'version' || k === 'exportedAt') return;
        if (data[k] !== null && data[k] !== undefined) {
          save(k, data[k]);
        }
      });
      save('ba_last_save', new Date().toISOString());
      toast('Donnees importees ! Rechargement...','success', 3000);
      setTimeout(function(){ location.reload(); }, 2000);
    } catch(err) {
      toast('Erreur lors de l\'import : '+err.message,'error');
    }
  };
  reader.readAsText(file);
  input.value = '';
}

// POINTS REDUCTIONS
function getPointsReductions(pts, palier, total) {
  var reductions = [];
  // Single reduction: 200pts = -1€
  if (pts >= 200) reductions.push({id:'r1', label:'Remise -1€ sur cette commande', pts:200, discount:1.00});
  return reductions.filter(function(r){ return r.discount <= total; });
}

function togglePtsReduction(id) {
  var user = getCurrentUser();
  if (!user) return;
  var total = cart.reduce(function(s,i){return s+i.price*i.qty;},0);

  // Build full list of available options
  var palierList = load('ba_paliers', PALIERS);
  var curPalier = getPalier(user.points||0);
  var curPalierFull = palierList.find(function(p){ return p.name===curPalier.name; });
  var allOptions = [];

  // Palier reward
  if (curPalierFull && curPalierFull.reward && curPalier.name !== 'Bronze') {
    allOptions.push({id:'palier', label:curPalierFull.reward, pts:0, discount:0, type:'palier', reward:curPalierFull.reward});
  }
  // Active promos
  var promos = load('ba_promos',[]).filter(function(p){
    return p.userId===user.id && !p.used && new Date(p.expiresAt)>new Date();
  });
  promos.forEach(function(p){
    allOptions.push({id:'promo-'+p.id, label:p.title, pts:0, discount:0, type:'promo', promoId:p.id});
  });
  // Points reduction
  getPointsReductions(user.points||0, curPalier, total).forEach(function(r){ allOptions.push(r); });

  var opt = allOptions.find(function(x){return x.id===id;});
  if (!opt) return;

  // Deselect previous
  if (_selectedReduction) {
    var prevEl = document.getElementById('pts-opt-'+_selectedReduction.id);
    var prevCk = document.getElementById('pts-check-'+_selectedReduction.id);
    if (prevEl) { prevEl.style.borderColor='var(--border)'; prevEl.style.background=''; }
    if (prevCk) { prevCk.style.background='transparent'; }
  }

  if (_selectedReduction && _selectedReduction.id === id) {
    _selectedReduction = null;
  } else {
    _selectedReduction = opt;
    var el = document.getElementById('pts-opt-'+id);
    var ck = document.getElementById('pts-check-'+id);
    if (el) { el.style.borderColor='var(--gold)'; el.style.background='rgba(212,175,55,.08)'; }
    if (ck) { ck.style.background='var(--gold)'; }
    if (opt.type === 'palier') toast('🎁 '+opt.reward+' sera applique a votre commande !','success', 3000);
    if (opt.type === 'promo') toast('🎁 Offre appliquee !','success', 3000);
  }
}

function playAdminAlert() {
  try {
    var ctx = new (window.AudioContext || window.webkitAudioContext)();
    // Triple beep - urgent
    [[880,0,.15],[660,.2,.15],[880,.4,.15],[660,.6,.3]].forEach(function(b){
      var osc = ctx.createOscillator();
      var gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.value = b[0]; osc.type = 'square';
      gain.gain.setValueAtTime(0.15, ctx.currentTime+b[1]);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+b[1]+b[2]);
      osc.start(ctx.currentTime+b[1]);
      osc.stop(ctx.currentTime+b[1]+b[2]+0.05);
    });
  } catch(e) {}
  if (navigator.vibrate) navigator.vibrate([200,100,200]);
}

function startOrderPolling() {
  setInterval(function(){
    var user = getCurrentUser();
    if (!user) return;
    var isAdmin = user.role==='superadmin'||user.role==='admin'||user.role==='entreprise';

    if (isAdmin) {
      // Admin: check for new orders
      var allOrders = getOrders();
      var pendingOrders = allOrders.filter(function(o){ return o.status==='pending'; });
      if (_lastOrderCount >= 0 && pendingOrders.length > _lastOrderCount && _adminAlertEnabled) {
        // New order(s) arrived!
        var newOrders = pendingOrders.slice(0, pendingOrders.length - _lastOrderCount);
        newOrders.forEach(function(o){
          playAdminAlert();
          showNewOrderBanner(o);
          sendPushNotif('🆕 Nouvelle commande !', 'N°'+o.orderNumber+' — '+o.userPrenom+' — '+fmt(o.total));
        });
      }
      _lastOrderCount = pendingOrders.length;
      // Refresh admin orders tab if open
      if (currentScreen === 'profile') {
        var ac = document.getElementById('admin-content');
        if (ac) {
          var activeTab = document.querySelector('.admin-tab.active');
          if (activeTab && activeTab.textContent.indexOf('Commandes') >= 0) {
            ac.innerHTML = adminOrders();
          }
          if (activeTab && activeTab.textContent.indexOf('Dashboard') >= 0) {
            ac.innerHTML = adminDashboard();
          }
        }
      }
      return;
    }

    // Auto relance check (once per session via flag)
    if (!window._relanceChecked) {
      window._relanceChecked = true;
      checkAutoRelance();
    }
    // Client: check order status changes
    var orders = getOrders().filter(function(o){ return o.userId === user.id; });
    orders.forEach(function(o){
      var prev = _lastOrderStatuses[o.id];
      if (prev && prev !== o.status) {
        if (o.status === 'ready') {
          showOrderReadyAlert(o);
        }
      }
      _lastOrderStatuses[o.id] = o.status;
    });
    if (Object.keys(_lastOrderStatuses).length === 0) {
      orders.forEach(function(o){ _lastOrderStatuses[o.id] = o.status; });
    }
    if (currentScreen === 'orders') renderOrders();
    var freshUser = getUsers().find(function(u){ return u.id === user.id; });
    if (freshUser) { window._currentUserCached = freshUser; updateBadges(); }
  }, 5000);
}

function showOrderReadyAlert(order) {

      var gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.value = freq;
      osc.type = 'sine';
      gain.gain.setValueAtTime(0.3, ctx.currentTime + start);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + start + dur);
      osc.start(ctx.currentTime + start);
      osc.stop(ctx.currentTime + start + dur + 0.1);
    };
    playBeep(523, 0, 0.15);
    playBeep(659, 0.2, 0.15);

  document.body.appendChild(overlay);
  // Request notification permission for future

// ANNIVERSAIRE AUTO
function checkBirthdayOffer(user) {
  if (!user || !user.bday) return;
  var today = new Date();
  var bday = new Date(user.bday);
  if (bday.getDate() === today.getDate() && bday.getMonth() === today.getMonth()) {
    // Check if already sent this year
    var lastBday = load('ba_bday_'+user.id, null);
    if (lastBday === today.getFullYear()) return;
    save('ba_bday_'+user.id, today.getFullYear());
    // Create birthday promo
    var expiry = new Date(); expiry.setDate(expiry.getDate() + 30);
    var cfg = getCfg();
    var bdayPts = cfg.birthdayPts || 50;
    var promos = load('ba_promos', []);
    promos.push({
      id: genId(), userId: user.id, type: 'birthday',
      title: 'Joyeux anniversaire '+user.prenom+' ! 🎂',
      desc: 'Offre speciale anniversaire — '+bdayPts+' points bonus offerts !',
      expiresAt: expiry.toISOString(), used: false
    });
    save('ba_promos', promos);
    user.points = (user.points||0) + bdayPts;
    var hist = load('ba_pts_history_'+user.id, []);
    hist.unshift({pts:bdayPts, label:'Cadeau anniversaire 🎂', at:new Date().toISOString()});
    save('ba_pts_history_'+user.id, hist);
    saveUser(user);
    setTimeout(function(){
      toast('🎂 Joyeux anniversaire '+user.prenom+' ! +50 points offerts !', 'success', 6000);
    }, 2000);
  }
}

function addRewardConfigToCart(btn) {
  var productName = btn.dataset.pname;
  var palierName = btn.dataset.palier;
  var cat = btn.dataset.pcat;
  var pid = btn.dataset.pid;
  var mc = getMeatCount({name:productName});

  if (mc > 0 && pendingExtras.meats.length < mc) {
    toast('Choisissez '+mc+' viande(s)','warning'); return;
  }

  var details = [];
  if (pendingExtras.meats.length) details.push('Viandes: '+pendingExtras.meats.join(', '));
  if (pendingExtras.sauces.length) details.push('Sauce: '+pendingExtras.sauces.join(', '));
  if (pendingExtras.crudites.length) details.push('Crudites: '+pendingExtras.crudites.join(', '));
  if (pendingExtras.supplements && pendingExtras.supplements.length) {
    details.push('Suppl: '+pendingExtras.supplements.join(', ')+' (+'+fmt(pendingExtras.supplements.length*SUPPLEMENT_PRICE)+')');
  }
  var noteEl = document.getElementById('prod-note');
  if (noteEl && noteEl.value.trim()) details.push('Note: '+noteEl.value.trim());

  var suppCost = (pendingExtras.supplements||[]).length * SUPPLEMENT_PRICE;

  closeModal('m-product');
  cart.push({
    id: genId(),
    pid: pid,
    name: productName,
    price: suppCost, // Only supplements are paid
    cat: cat,
    details: details.join(' | '),
    qty: 1,
    isReward: true,
    rewardPalier: palierName
  });
  pendingExtras = {meats:[], sauces:[], crudites:[], supplements:[]};
  updateBadges();
  toast('🎁 '+productName+' ajoute au panier !'+(suppCost>0?' (+'+fmt(suppCost)+' supplements)':''),'success', 4000);
  go('cart');
}

function copyReferral(code) {
  if (navigator.clipboard) {
    navigator.clipboard.writeText(code).then(function(){ toast('Code copie !','success'); });
  } else {
    var el = document.createElement('textarea');
    el.value = code;
    document.body.appendChild(el);
    el.select();
    document.execCommand('copy');
    document.body.removeChild(el);
    toast('Code copie !','success');
  }
}

function shareReferral(code) {
  var cfg = getCfg();

  var refUrl = 'https://break-antillais.github.io/break-antillais?ref=' + code;

function requestNotifPermission() {
  if (!window.Notification) return;
  if (Notification.permission === 'default') {
    setTimeout(function(){
      Notification.requestPermission().then(function(perm){
        if (perm === 'granted') {
          toast('Notifications activees ! 🔔','success', 4000);
          registerFCMToken();
        }
      });
    }, 2000);
  } else if (Notification.permission === 'granted') {
    registerFCMToken();
  }
}

function registerFCMToken() {
  if (!messaging) return;
  var user = getCurrentUser();
  if (!user) return;
  messaging.getToken({vapidKey: VAPID_KEY}).then(function(token) {
    if (token) {
      // Save token to Firebase under user
      db.ref('data/users/'+user.id+'/fcmToken').set(token);
      console.log('FCM token registered');
    }
  }).catch(function(e){ console.log('FCM token error:', e); });

  // Handle foreground messages
  messaging.onMessage(function(payload) {
    var n = payload.notification || {};
    toast((n.title||'Break Antillais')+' : '+(n.body||''), 'info', 6000);
    if (navigator.vibrate) navigator.vibrate([300, 100, 300]);
  });
}

function sendPushNotif(title, body) {

    id:genId(), orderId:orderId, orderNumber:orderNumber,

    note:n, comment:comment, at:new Date().toISOString()
  };

function attachClientNotifListener(user) {
  if (!user || !user.id) return;
  var isAdmin = user.role==='superadmin'||user.role==='admin'||user.role==='entreprise';
  if (isAdmin) return;
  console.log('[Notif] Attaching listener for user:', user.id);
  var sessionStart = new Date().toISOString();
  // Remove old listener first
  db.ref('status_updates/'+user.id).off();
  // Attach new listener
  db.ref('status_updates/'+user.id).on('child_added', function(snap) {
    var update = snap.val();
    if (!update || !update.at) { snap.ref.remove(); return; }
    console.log('[Notif] Received update:', update.status, update.title);
    // Show all updates regardless of age when app is open
    if (update.status === 'ready') {
      showOrderReadyAlert({orderNumber: update.orderNumber, id: update.orderId});
      sendPushNotif(update.title, update.body);
    } else if (update.status === 'confirmed' || update.status === 'preparing') {
      toast('📦 '+update.title+' — '+update.body, 'info', 7000);
      sendPushNotif(update.title, update.body);
      if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
    } else if (update.status === 'picked_up') {
      toast('✅ '+update.body, 'success', 5000);
    } else {
      // Message / offre / relance
      toast('📣 '+update.title+' : '+update.body, 'info', 8000);
      sendPushNotif(update.title, update.body);
      if (navigator.vibrate) navigator.vibrate([300, 100, 300]);
    }
    snap.ref.remove();
  });
}

function startCountdown() {
  setInterval(function(){
    var el = document.getElementById('countdown');
    if (!el) return;
    var cfg = getCfg();
    var now = new Date();
    var cp = cfg.cutoff.split(':');
    var cutoff = new Date(); cutoff.setHours(+cp[0],+cp[1],0,0);
    var ms = cutoff - now;
    if (ms <= 0) {
      // Commandes fermees - refresh home
      if (currentScreen === 'home') renderHome();
      return;
    }
    var h = Math.floor(ms/3600000);
    var m = Math.floor((ms%3600000)/60000);
    var s = Math.floor((ms%60000)/1000);
    el.textContent = h>0 ? h+'h'+String(m).padStart(2,'0')+'min' : m>0 ? m+'min '+String(s).padStart(2,'0')+'s' : s+'s';
  }, 1000);
}
