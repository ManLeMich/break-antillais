  // Check if reward already in cart
  var alreadyIn = cart.find(function(i){ return i.isReward && i.rewardPalier===palierName; });
  if (alreadyIn) { toast('Cette recompense est deja dans votre panier','warning'); return; }

  // Find reward for this palier
  var paliers = load('ba_paliers', PALIERS);
  var pal = paliers.find(function(p){ return p.name===palierName; });
  if (!pal || !pal.reward) { toast('Recompense introuvable','error'); return; }

  cart.push({
    id: genId(),
    pid: 'reward-'+palierName,
    name: pal.reward,
    price: 0,
    cat: 'reward',
    details: 'Recompense palier '+palierName,
    qty: 1,
    isReward: true,
    rewardPalier: palierName
  });
  updateBadges();
  toast('🎁 '+pal.reward+' ajoute au panier !','success', 4000);
  go('cart');
}

function copyReferral(code) {
  if (navigator.clipboard) {
    navigator.clipboard.writeText(code).then(function(){ toast('Code copie !','success'); });
  } else {
    var el = document.createElement('textarea');
    el.value = code;
    document.body.appendChild(el);
    el.select();
    document.execCommand('copy');
    document.body.removeChild(el);
    toast('Code copie !','success');
  }
}

function requestNotifPermission() {
  if (!window.Notification) return;
  if (Notification.permission === 'default') {
    setTimeout(function(){
      Notification.requestPermission().then(function(perm){
        if (perm === 'granted') {
          toast('Notifications activees ! 🔔','success', 4000);
          registerFCMToken();
        }
      });
    }, 2000);
  } else if (Notification.permission === 'granted') {
    registerFCMToken();
  }
}

function registerFCMToken() {
  if (!messaging) return;
  var user = getCurrentUser();
  if (!user) return;
  messaging.getToken({vapidKey: VAPID_KEY}).then(function(token) {
    if (token) {
      // Save token to Firebase under user
      db.ref('data/users/'+user.id+'/fcmToken').set(token);
      console.log('FCM token registered');
    }
  }).catch(function(e){ console.log('FCM token error:', e); });

  // Handle foreground messages
  messaging.onMessage(function(payload) {
    var n = payload.notification || {};
    toast((n.title||'Break Antillais')+' : '+(n.body||''), 'info', 6000);
    if (navigator.vibrate) navigator.vibrate([300, 100, 300]);
  });
}

function sendPushNotif(title, body) {
  if (window.Notification && Notification.permission === 'granted') {
    new Notification(title, {body: body, icon: ''});
  }
}

function attachClientNotifListener(user) {
  if (!user || !user.id) return;
  var isAdmin = user.role==='superadmin'||user.role==='admin'||user.role==='entreprise';
  if (isAdmin) return;
  console.log('[Notif] Attaching listener for user:', user.id);
  var sessionStart = new Date().toISOString();
  // Remove old listener first
  db.ref('status_updates/'+user.id).off();
  // Attach new listener
  db.ref('status_updates/'+user.id).on('child_added', function(snap) {
    var update = snap.val();
    if (!update || !update.at) { snap.ref.remove(); return; }
    console.log('[Notif] Received update:', update.status, update.title);
    // Show all updates regardless of age when app is open
    if (update.status === 'ready') {
      showOrderReadyAlert({orderNumber: update.orderNumber, id: update.orderId});
      sendPushNotif(update.title, update.body);
    } else if (update.status === 'confirmed' || update.status === 'preparing') {
      toast('📦 '+update.title+' — '+update.body, 'info', 7000);
      sendPushNotif(update.title, update.body);
      if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
    } else if (update.status === 'picked_up') {
      toast('✅ '+update.body, 'success', 5000);
    } else {
      // Message / offre / relance
      toast('📣 '+update.title+' : '+update.body, 'info', 8000);
      sendPushNotif(update.title, update.body);
      if (navigator.vibrate) navigator.vibrate([300, 100, 300]);
    }
    snap.ref.remove();
  });
}

function startCountdown() {
  setInterval(function(){
    var el = document.getElementById('countdown');
    if (!el) return;
    var cfg = getCfg();
    var now = new Date();
    var cp = cfg.cutoff.split(':');
    var cutoff = new Date(); cutoff.setHours(+cp[0],+cp[1],0,0);
    var ms = cutoff - now;
    if (ms <= 0) {
      // Commandes fermees - refresh home
      if (currentScreen === 'home') renderHome();
      return;
    }
    var h = Math.floor(ms/3600000);
    var m = Math.floor((ms%3600000)/60000);
    var s = Math.floor((ms%60000)/1000);
    el.textContent = h>0 ? h+'h'+String(m).padStart(2,'0')+'min' : m>0 ? m+'min '+String(s).padStart(2,'0')+'s' : s+'s';
  }, 1000);
}
