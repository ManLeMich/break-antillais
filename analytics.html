<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Break Antillais — Analytics</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<style>
:root {
  --bg: #080808;
  --card: #111;
  --card2: #161616;
  --border: rgba(255,255,255,.07);
  --red: #C8232B;
  --gold: #D4AF37;
  --green: #10b981;
  --blue: #3b82f6;
  --muted: #555;
  --text: #f0ece4;
  --head: 'Syne', sans-serif;
  --body: 'DM Sans', sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--body);min-height:100vh}

/* HEADER */
.header{background:linear-gradient(135deg,#0d0000,#1a0505);border-bottom:1px solid rgba(200,35,43,.2);padding:1.25rem 2rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;backdrop-filter:blur(10px)}
.logo{font-family:var(--head);font-size:1.5rem;font-weight:900;letter-spacing:-.02em}
.logo span{color:var(--red)}
.header-right{display:flex;align-items:center;gap:1rem}
.period-select{background:var(--card);border:1px solid var(--border);color:var(--text);padding:.4rem .75rem;border-radius:8px;font-family:var(--body);font-size:.85rem;cursor:pointer}
.refresh-btn{background:rgba(200,35,43,.15);border:1px solid rgba(200,35,43,.3);color:var(--red);padding:.4rem .9rem;border-radius:8px;cursor:pointer;font-family:var(--head);font-weight:700;font-size:.82rem;transition:.2s}
.refresh-btn:hover{background:rgba(200,35,43,.25)}
.last-update{font-size:.72rem;color:var(--muted)}

/* LAYOUT */
.container{max-width:1400px;margin:0 auto;padding:2rem}
.section-title{font-family:var(--head);font-size:.7rem;font-weight:800;letter-spacing:.15em;color:var(--muted);text-transform:uppercase;margin-bottom:1rem;padding-left:.25rem}

/* KPI ROW */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:.75rem;margin-bottom:2rem}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:1.25rem 1.5rem;position:relative;overflow:hidden;transition:.2s}
.kpi::before{content:'';position:absolute;inset:0;background:var(--accent,transparent);opacity:.05;pointer-events:none}
.kpi-icon{font-size:1.6rem;margin-bottom:.5rem}
.kpi-val{font-family:var(--head);font-size:2.2rem;font-weight:900;line-height:1;color:var(--accent,var(--text))}
.kpi-label{font-size:.75rem;color:var(--muted);margin-top:.25rem;font-weight:500}
.kpi-sub{font-size:.72rem;color:var(--accent,var(--muted));margin-top:.2rem;font-weight:600}

/* CHARTS GRID */
.charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem}
.charts-grid.three{grid-template-columns:1fr 1fr 1fr}
.charts-grid.full{grid-template-columns:1fr}
@media(max-width:900px){.charts-grid,.charts-grid.three{grid-template-columns:1fr}}

/* CARD */
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:1.5rem;margin-bottom:1rem}
.card-title{font-family:var(--head);font-weight:800;font-size:.95rem;margin-bottom:1.25rem;display:flex;align-items:center;gap:.5rem}

/* BAR CHART */
.bar-list{display:flex;flex-direction:column;gap:.55rem}
.bar-row{display:flex;align-items:center;gap:.75rem}
.bar-label{font-size:.8rem;font-weight:600;min-width:140px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar-track{flex:1;background:rgba(255,255,255,.06);border-radius:100px;height:10px;overflow:hidden}
.bar-fill{height:100%;border-radius:100px;transition:width .8s cubic-bezier(.4,0,.2,1)}
.bar-val{font-family:var(--head);font-weight:800;font-size:.82rem;min-width:36px;text-align:right}

/* DONUT */
.donut-wrap{display:flex;align-items:center;gap:1.5rem;flex-wrap:wrap}
.donut-svg{flex-shrink:0}
.donut-legend{display:flex;flex-direction:column;gap:.45rem;flex:1}
.legend-row{display:flex;align-items:center;gap:.5rem;font-size:.78rem}
.legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}

/* TABLE */
.data-table{width:100%;border-collapse:collapse;font-size:.82rem}
.data-table th{text-align:left;font-family:var(--head);font-weight:700;font-size:.7rem;letter-spacing:.08em;color:var(--muted);text-transform:uppercase;padding:.5rem .75rem;border-bottom:1px solid var(--border)}
.data-table td{padding:.55rem .75rem;border-bottom:1px solid rgba(255,255,255,.04)}
.data-table tr:last-child td{border-bottom:none}
.data-table tr:hover td{background:rgba(255,255,255,.02)}
.badge{display:inline-flex;align-items:center;padding:.15rem .55rem;border-radius:100px;font-size:.7rem;font-weight:700}

/* HEATMAP */
.heatmap{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.heat-cell{aspect-ratio:1;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:.6rem;font-weight:700;color:rgba(255,255,255,.6)}

/* LOADING */
.loader{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:1rem}
.spinner{width:40px;height:40px;border:3px solid rgba(200,35,43,.2);border-top-color:var(--red);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* TIMELINE */
.timeline{display:flex;flex-direction:column;gap:.5rem;max-height:320px;overflow-y:auto}
.tl-item{display:flex;align-items:center;gap:.75rem;padding:.5rem .75rem;background:var(--card2);border-radius:8px;font-size:.78rem}
.tl-num{font-family:var(--head);font-weight:800;font-size:.82rem;color:var(--gold);min-width:50px}
.tl-name{flex:1;font-weight:600}
.tl-meta{color:var(--muted);font-size:.72rem}
.tl-amt{font-family:var(--head);font-weight:800;color:var(--green)}

/* STATUS BADGE */
.s-picked{color:#10b981;background:rgba(16,185,129,.12)}
.s-cancelled{color:#ef4444;background:rgba(239,68,68,.12)}
.s-pending{color:#f59e0b;background:rgba(245,158,11,.12)}
.s-confirmed{color:#3b82f6;background:rgba(59,130,246,.12)}

/* EXPORT BTN */
.export-bar{display:flex;gap:.75rem;margin-bottom:1.5rem;flex-wrap:wrap}
.exp-btn{background:var(--card);border:1px solid var(--border);color:var(--text);padding:.5rem 1rem;border-radius:8px;cursor:pointer;font-family:var(--body);font-size:.82rem;font-weight:600;transition:.15s;display:flex;align-items:center;gap:.4rem}
.exp-btn:hover{border-color:var(--gold);color:var(--gold)}

/* SCROLLBAR */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
</style>
</head>
<body>

<div class="header">
  <div class="logo">Break <span>Antillais</span> <span style="font-size:.75rem;color:var(--muted);font-weight:400;font-family:var(--body)">Analytics</span></div>
  <div class="header-right">
    <select class="period-select" id="period-sel" onchange="loadData()">
      <option value="all">Tout l'historique</option>
      <option value="month" selected>Ce mois</option>
      <option value="week">Cette semaine</option>
      <option value="today">Aujourd'hui</option>
    </select>
    <div class="last-update" id="last-update">—</div>
    <button class="refresh-btn" onclick="loadData()">↻ Actualiser</button>
  </div>
</div>

<div class="container" id="app">
  <div class="loader"><div class="spinner"></div><div style="color:var(--muted);font-size:.85rem">Connexion Firebase...</div></div>
</div>

<script>
firebase.initializeApp({
  apiKey:"AIzaSyD9EarYlpDbDfPL3n7AXS0Dv8U1tyTWeR8",
  authDomain:"application-break-antillais.firebaseapp.com",
  databaseURL:"https://application-break-antillais-default-rtdb.europe-west1.firebasedatabase.app",
  projectId:"application-break-antillais",
  storageBucket:"application-break-antillais.firebasestorage.app",
  messagingSenderId:"788821898426",
  appId:"1:788821898426:web:992bc58a2f829028407e83"
});
var db = firebase.database();

// Lire le token admin passé depuis l'app (si présent)
var _adminToken = new URLSearchParams(window.location.search).get('t');
if(_adminToken){
  firebase.auth().signInWithCustomToken(_adminToken).catch(function(){});
}

// ── Utilitaires ──
function fmt(n){ return new Intl.NumberFormat('fr-FR',{style:'currency',currency:'EUR'}).format(n||0); }
function pct(v,t){ return t>0?Math.round(v/t*100):0; }
function today(){ return new Date().toISOString().split('T')[0]; }
function weekStart(){
  var d=new Date(); d.setDate(d.getDate()-d.getDay()+1); return d.toISOString().split('T')[0];
}
function monthStart(){
  var d=new Date(); return d.toISOString().split('T')[0].substring(0,7)+'-01';
}

function filterOrders(orders){
  var p = document.getElementById('period-sel').value;
  if(p==='all') return orders;
  var cutoff = p==='today'?today():p==='week'?weekStart():monthStart();
  return orders.filter(function(o){
    var d = (o.pickupDate||o.createdAt||'').substring(0,10);
    return d >= cutoff;
  });
}

// ── Chargement Firebase ──
function loadData(){
  var app = document.getElementById('app');
  app.innerHTML = '<div class="loader"><div class="spinner"></div><div style="color:var(--muted);font-size:.85rem">Connexion en cours...</div></div>';

  // Vérifier l'uid admin passé depuis l'app
  var _uid = new URLSearchParams(window.location.search).get('uid');
  if(_uid){
    // Vérifier que c'est bien un admin dans Firebase
    db.ref('data/users/'+_uid).once('value').then(function(snap){
      var u = snap.val();
      if(u && (u.role==='superadmin'||u.role==='admin')){
        _doLoad();
      } else {
        // Essayer avec ba_users aussi
        db.ref('data/ba_users').once('value').then(function(s2){
          var users = s2.val()||{};
          var arr = Array.isArray(users)?users:Object.values(users);
          var found = arr.find(function(x){ return x&&x.id===_uid&&(x.role==='superadmin'||x.role==='admin'); });
          if(found) _doLoad();
          else _doLoad(); // accès direct si uid présent
        }).catch(function(){ _doLoad(); });
      }
    }).catch(function(){ _doLoad(); });
  } else {
    // Pas d'uid - essayer quand même (accès depuis le navigateur direct)
    _doLoad();
  }
}

function _doLoad(){
  var app = document.getElementById('app');
  app.innerHTML = '<div class="loader"><div class="spinner"></div><div style="color:var(--muted);font-size:.85rem">Chargement des donnees...</div></div>';

  var merged = {};
  function absorb(v){
    if(!v) return;
    // Peut être un objet plat {id:commande} ou un objet d'objets {date:{id:commande}}
    var vals = Array.isArray(v) ? v : Object.values(v);
    vals.forEach(function(item){
      if(!item) return;
      if(item.id){
        // Commande directe
        // Normaliser items en array si objet Firebase
        if(item.items && !Array.isArray(item.items)){
          item.items = Object.values(item.items);
        }
        merged[item.id] = item;
      } else if(typeof item === 'object'){
        // Sous-niveau (ex: ba_journal/{date}/{id} ou ba_archive/{mois}/{id})
        Object.values(item).forEach(function(o){
          if(o && o.id){
            if(o.items && !Array.isArray(o.items)) o.items = Object.values(o.items);
            merged[o.id] = o;
          }
        });
      }
    });
  }

  // Charger les 4 sources en parallèle
  Promise.all([
    db.ref('data/ba_safe').once('value'),
    db.ref('data/ba_orders').once('value'),
    db.ref('data/ba_journal').once('value'),
    db.ref('data/ba_archive').once('value')
  ]).then(function(snaps){
    absorb(snaps[0].val()); // ba_safe   — backup individuel
    absorb(snaps[1].val()); // ba_orders — commandes actives
    absorb(snaps[2].val()); // ba_journal — classé par date
    absorb(snaps[3].val()); // ba_archive — classé par mois

    var all = Object.values(merged).filter(function(o){ return o && o.id; });
    all.sort(function(a,b){ return new Date(a.createdAt||0)-new Date(b.createdAt||0); });

    var orders = filterOrders(all);
    document.getElementById('last-update').textContent =
      'Mise à jour '+new Date().toLocaleTimeString('fr-FR')+' — '+all.length+' commandes au total';
    render(orders, all);
  }).catch(function(e){
    document.getElementById('app').innerHTML = '<div class="loader"><div style="color:#ef4444;font-size:.9rem">Erreur : '+e.message+'<br><small style="color:var(--muted)">Verifiez les regles Firebase (lecture publique requise)</small></div></div>';
  });
}

// ── Analyse ──
function analyze(orders){
  var done = orders.filter(function(o){ return o.status==='picked_up'; });
  var cancelled = orders.filter(function(o){ return o.status==='cancelled'; });

  var ca = done.reduce(function(s,o){ return s+(o.total||0); },0);
  var caTotal = ca;

  // Compteurs produits
  var bokits=0, agoulou=0, crepes=0, boissons={}, menus=0, miniBokit=0, enfants=0;
  var viandes={}, offres={};
  var prodSales={}, clientFreq={};
  var caByDay={}, caBySlot={};

  // Analyse uniquement sur commandes récupérées
  done.forEach(function(o){
    var d = (o.pickupDate||o.createdAt||'').substring(0,10);
    caByDay[d] = (caByDay[d]||0)+(o.total||0);
    var slot = o.pickupTime||'?';
    caBySlot[slot] = (caBySlot[slot]||0)+(o.total||0);
    if(o.userId) clientFreq[o.userId]=(clientFreq[o.userId]||0)+1;

    // items peut être un array ou un objet Firebase {0:{...}, 1:{...}}
    var itemsArr = o.items ? (Array.isArray(o.items) ? o.items : Object.values(o.items)) : [];
    itemsArr.forEach(function(it){
      var nm = (it.name||'').toLowerCase();
      var cat = it.cat||'';
      var pid = it.pid||it.id||'';

      // Catégories principales
      if(cat==='bokit'||nm.includes('bokit')) {
        if(nm.includes('mini')||cat==='mini_bokit') miniBokit+=(it.qty||1);
        else bokits+=(it.qty||1);
      }
      if(cat==='agoulou'||nm.includes('agoulou')) agoulou+=(it.qty||1);
      if(cat==='crepe_salee'||cat==='crepe_sucree'||nm.includes('crep')) crepes+=(it.qty||1);
      if(cat==='boisson') {
        var bname = it.name||'?';
        // Nettoyer le nom des boissons offertes
        bname = bname.replace(' 🏀','').replace('Boisson offerte','Boisson offerte');
        boissons[bname]=(boissons[bname]||0)+(it.qty||1);
      }
      if(cat==='enfant'||cat==='enfant_agoulou'||nm.includes('menu enfant')) enfants+=(it.qty||1);
      if(nm.includes('menu')&&!nm.includes('enfant')) menus+=(it.qty||1);

      // Viandes dans les détails
      var VIANDE_LIST = ['Poulet','Kebab','Merguez','Steak','Jambon','Saucisse','Thon','Morue','Ordinaire'];
      if(it.details){
        var viandeParts = it.details.split('|');
        viandeParts.forEach(function(part){
          part = part.trim();
          // Chercher chaque viande connue dans la partie
          VIANDE_LIST.forEach(function(v){
            if(part.indexOf(v)>=0) viandes[v]=(viandes[v]||0)+(it.qty||1);
          });
          // Aussi parser 'Viandes: X, Y'
          if(part.toLowerCase().indexOf('viande')>=0){
            var afterColon = part.replace(/.*viandes?\s*[:\-]\s*/i,'');
            afterColon.split(',').forEach(function(seg){
              seg = seg.trim().replace(/حلال\s*/g,'').replace(/[^a-zA-ZÀ-ÿ\s]/g,'').trim();
              VIANDE_LIST.forEach(function(v){
                if(seg.toLowerCase().indexOf(v.toLowerCase())>=0) viandes[v]=(viandes[v]||0)+(it.qty||1);
              });
            });
          }
        });
      }
      // Aussi chercher dans le nom du produit
      VIANDE_LIST.forEach(function(v){
        if(nm.indexOf(v.toLowerCase())>=0) viandes[v]=(viandes[v]||0)+(it.qty||1);
      });

      // Offres
      if(it.isPlayoffBonus) offres['Playoffs NBA']=(offres['Playoffs NBA']||0)+1;
      if(it.isReward) offres['Récompense fidélité']=(offres['Récompense fidélité']||0)+1;
      if(o.promoCode) offres['Code promo: '+(o.promoCode)]=(offres['Code promo: '+(o.promoCode)]||0)+1;

      // Ventes par produit
      var pname = it.name||pid;
      if(pname && !it.isPlayoffBonus && !it.playoffBonusPts) {
        prodSales[pname]=(prodSales[pname]||0)+(it.qty||1);
      }
    });
  });

  // Clients fidèles
  var topClients = Object.entries(clientFreq).sort(function(a,b){return b[1]-a[1];}).slice(0,10);

  // CA par jour trié
  var caByDayArr = Object.entries(caByDay).sort(function(a,b){return a[0].localeCompare(b[0]);});
  var caBySlotArr = Object.entries(caBySlot).sort(function(a,b){return a[0].localeCompare(b[0]);});

  return {
    total:orders.length, done:done.length, cancelled:cancelled.length,
    ca, caTotal,
    bokits, agoulou, crepes, boissons, menus, miniBokit, enfants,
    viandes, offres, prodSales,
    topClients, caByDayArr, caBySlotArr,
    avgTicket: done.length>0?ca/done.length:0,
    tauxAnnul: orders.length>0?pct(cancelled.length,orders.length):0
  };
}

// ── Rendu ──
function render(orders, allOrders){
  var d = analyze(orders);
  var app = document.getElementById('app');
  var period = document.getElementById('period-sel').value;
  var pLabel = period==='today'?'aujourd\'hui':period==='week'?'cette semaine':period==='month'?'ce mois':'tout l historique';

  var html = '';

  // Export bar
  html += '<div class="export-bar">';
  html += '<button class="exp-btn" onclick="exportCSV()">📥 Export CSV</button>';
  html += '<button class="exp-btn" onclick="window.print()">🖨️ Imprimer</button>';
  html += '<div style="margin-left:auto;font-size:.8rem;color:var(--muted);align-self:center">'+orders.length+' commandes analysées — '+pLabel+'</div>';
  html += '</div>';

  // ── KPIs ──
  html += '<div class="section-title">Vue d\'ensemble</div>';
  html += '<div class="kpi-grid">';
  html += kpi('💶', fmt(d.ca), 'Chiffre d\'affaires', d.done+' commandes récupérées', '#D4AF37');
  html += kpi('📦', d.total, 'Commandes totales', d.cancelled+' annulées ('+d.tauxAnnul+'%)', '#3b82f6');
  html += kpi('🧾', fmt(d.avgTicket), 'Panier moyen', 'Par commande récupérée', '#10b981');
  html += kpi('🫓', d.bokits, 'Bokits vendus', 'Hors mini bokits', '#C8232B');
  html += kpi('📦', d.miniBokit, 'Mini Bokits', 'En boxes', '#f59e0b');
  html += kpi('🌯', d.agoulou, 'Agoulous vendus', '', '#8b5cf6');
  html += kpi('🥞', d.crepes, 'Crêpes vendues', '', '#ec4899');
  html += kpi('🧒', d.enfants, 'Menus Enfants', '', '#06b6d4');
  html += '</div>';

  // ── Produits les plus vendus ──
  html += '<div class="charts-grid">';

  // Bar chart produits
  var topProds = Object.entries(d.prodSales).sort(function(a,b){return b[1]-a[1];}).slice(0,12);
  var maxProd = topProds[0]?topProds[0][1]:1;
  html += '<div class="card"><div class="card-title">🏆 Produits les plus vendus</div><div class="bar-list">';
  topProds.forEach(function(p,i){
    var colors = ['#C8232B','#D4AF37','#10b981','#3b82f6','#8b5cf6','#f59e0b','#ec4899','#06b6d4','#84cc16','#f97316','#6366f1','#14b8a6'];
    html += barRow(p[0], p[1], maxProd, colors[i%colors.length]);
  });
  html += '</div></div>';

  // Viandes
  var viList = Object.entries(d.viandes).sort(function(a,b){return b[1]-a[1];});
  var maxVi = viList[0]?viList[0][1]:1;
  html += '<div class="card"><div class="card-title">🥩 Viandes les plus vendues</div><div class="bar-list">';
  var viColors = ['#ef4444','#f97316','#f59e0b','#84cc16','#10b981','#06b6d4','#3b82f6','#8b5cf6','#ec4899'];
  viList.forEach(function(v,i){
    html += barRow(v[0], v[1], maxVi, viColors[i%viColors.length]);
  });
  if(!viList.length) html += '<div style="color:var(--muted);font-size:.82rem">Aucune donnée de viande</div>';
  html += '</div></div>';

  html += '</div>';

  // ── Boissons + Catégories ──
  html += '<div class="charts-grid">';

  // Boissons
  var boissList = Object.entries(d.boissons).sort(function(a,b){return b[1]-a[1];});
  var maxBo = boissList[0]?boissList[0][1]:1;
  var totalBo = boissList.reduce(function(s,b){return s+b[1];},0);
  html += '<div class="card"><div class="card-title">🥤 Boissons vendues <span style="font-size:.75rem;color:var(--muted);font-weight:400">Total: '+totalBo+'</span></div><div class="bar-list">';
  var boColors=['#3b82f6','#ef4444','#f97316','#10b981','#8b5cf6','#f59e0b','#ec4899','#06b6d4'];
  boissList.forEach(function(b,i){
    html += barRow(b[0], b[1], maxBo, boColors[i%boColors.length], pct(b[1],totalBo)+'%');
  });
  if(!boissList.length) html += '<div style="color:var(--muted);font-size:.82rem">Aucune boisson</div>';
  html += '</div></div>';

  // Répartition catégories (donut)
  var cats = [
    {name:'Bokits',val:d.bokits,color:'#C8232B'},
    {name:'Mini Bokits',val:d.miniBokit,color:'#f59e0b'},
    {name:'Agoulous',val:d.agoulou,color:'#8b5cf6'},
    {name:'Crêpes',val:d.crepes,color:'#ec4899'},
    {name:'Menus Enfants',val:d.enfants,color:'#06b6d4'},
    {name:'Boissons',val:totalBo,color:'#3b82f6'},
  ].filter(function(c){return c.val>0;});
  html += '<div class="card"><div class="card-title">📊 Répartition des ventes</div>';
  html += donutChart(cats);
  html += '</div>';

  html += '</div>';

  // ── CA par tranche horaire ──
  if(d.caBySlotArr.length){
    html += '<div class="card"><div class="card-title">⏰ Chiffre d\'affaires par créneau horaire</div>';
    html += '<div class="bar-list">';
    var maxSlot = d.caBySlotArr.reduce(function(m,s){return Math.max(m,s[1]);},0);
    d.caBySlotArr.forEach(function(s){
      html += barRow(s[0], s[1], maxSlot, '#D4AF37', fmt(s[1]));
    });
    html += '</div></div>';
  }

  // ── CA par jour ──
  if(d.caByDayArr.length > 1){
    html += '<div class="card"><div class="card-title">📅 Évolution du CA par jour</div>';
    html += sparkLine(d.caByDayArr);
    html += '</div>';
  }

  // ── Offres utilisées ──
  var offresList = Object.entries(d.offres);
  if(offresList.length){
    html += '<div class="card"><div class="card-title">🎁 Offres & récompenses utilisées</div><div class="bar-list">';
    var maxOf = Math.max.apply(null,offresList.map(function(o){return o[1];}));
    offresList.sort(function(a,b){return b[1]-a[1];}).forEach(function(o){
      html += barRow(o[0], o[1], maxOf, '#D4AF37');
    });
    html += '</div></div>';
  }

  // ── Dernières commandes ──
  var recent = orders.slice().sort(function(a,b){return new Date(b.createdAt)-new Date(a.createdAt);}).slice(0,20);
  html += '<div class="card"><div class="card-title">🕐 Dernières commandes</div><div class="timeline">';
  recent.forEach(function(o){
    var sc = o.status==='picked_up'?'s-picked':o.status==='cancelled'?'s-cancelled':o.status==='confirmed'?'s-confirmed':'s-pending';
    var sl = o.status==='picked_up'?'Récupérée':o.status==='cancelled'?'Annulée':o.status==='confirmed'?'Confirmée':'En attente';
    html += '<div class="tl-item">'
      +'<div class="tl-num">N°'+o.orderNumber+'</div>'
      +'<div class="tl-name">'+((o.userPrenom||'?')+'</div>')
      +'<div class="tl-meta">'+(o.pickupDate||'')+(o.pickupTime?' · '+o.pickupTime:'')+'</div>'
      +'<span class="badge '+sc+'">'+sl+'</span>'
      +'<div class="tl-amt">'+fmt(o.total||0)+'</div>'
      +'</div>';
  });
  html += '</div></div>';

  // ── Tableau complet des produits ──
  html += '<div class="card"><div class="card-title">📋 Tableau complet des ventes</div>';
  html += '<table class="data-table"><thead><tr>'
    +'<th>Produit</th><th>Qté vendue</th><th>% du total</th><th>Tendance</th>'
    +'</tr></thead><tbody>';
  var totalItems = Object.values(d.prodSales).reduce(function(s,v){return s+v;},0);
  Object.entries(d.prodSales).sort(function(a,b){return b[1]-a[1];}).forEach(function(p){
    var pct_ = pct(p[1],totalItems);
    var bar = '<div style="width:'+Math.max(4,pct_*2)+'px;height:6px;background:var(--red);border-radius:3px;display:inline-block"></div>';
    html += '<tr><td><strong>'+p[0]+'</strong></td><td style="font-family:var(--head);font-weight:800;color:var(--gold)">'+p[1]+'</td><td style="color:var(--muted)">'+pct_+'%</td><td>'+bar+'</td></tr>';
  });
  html += '</tbody></table></div>';

  app.innerHTML = html;

  // Stocker pour export
  window._lastData = {orders, d};
}

// ── Composants ──
function kpi(icon, val, label, sub, accent){
  return '<div class="kpi" style="--accent:'+accent+'"><div class="kpi-icon">'+icon+'</div>'
    +'<div class="kpi-val">'+val+'</div>'
    +'<div class="kpi-label">'+label+'</div>'
    +'<div class="kpi-sub">'+sub+'</div></div>';
}

function barRow(label, val, max, color, display){
  var w = max>0?Math.max(2,Math.round(val/max*100)):0;
  var disp = display||val;
  return '<div class="bar-row">'
    +'<div class="bar-label" title="'+label+'">'+label+'</div>'
    +'<div class="bar-track"><div class="bar-fill" style="width:'+w+'%;background:'+color+'"></div></div>'
    +'<div class="bar-val" style="color:'+color+'">'+disp+'</div>'
    +'</div>';
}

function donutChart(cats){
  var total = cats.reduce(function(s,c){return s+c.val;},0);
  if(!total) return '<div style="color:var(--muted);font-size:.82rem">Aucune donnée</div>';
  var r=60,cx=70,cy=70,stroke=22;
  var circ=2*Math.PI*r;
  var offset=0;
  var segs='';
  cats.forEach(function(c){
    var len=circ*(c.val/total);
    segs+='<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="'+c.color
      +'" stroke-width="'+stroke+'" stroke-dasharray="'+len+' '+circ
      +'" stroke-dashoffset="-'+offset+'" transform="rotate(-90 '+cx+' '+cy+')"/>';
    offset+=len;
  });
  var svg='<svg class="donut-svg" width="140" height="140" viewBox="0 0 140 140">'
    +'<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="rgba(255,255,255,.04)" stroke-width="'+stroke+'"/>'
    +segs
    +'<text x="'+cx+'" y="'+cy+'" text-anchor="middle" dy=".3em" fill="var(--text)" font-family="var(--head)" font-weight="900" font-size="1.4rem">'+total+'</text>'
    +'<text x="'+cx+'" y="'+(cy+18)+'" text-anchor="middle" fill="var(--muted)" font-size=".55rem">total</text>'
    +'</svg>';
  var legend='<div class="donut-legend">';
  cats.forEach(function(c){
    legend+='<div class="legend-row"><div class="legend-dot" style="background:'+c.color+'"></div>'
      +'<span>'+c.name+'</span><span style="margin-left:auto;font-weight:700">'+c.val+' ('+pct(c.val,total)+'%)</span></div>';
  });
  legend+='</div>';
  return '<div class="donut-wrap">'+svg+legend+'</div>';
}

function sparkLine(data){
  if(!data.length) return '';
  var vals = data.map(function(d){return d[1];});
  var maxV = Math.max.apply(null,vals)||1;
  var w=600,h=80,pad=30;
  var pts = vals.map(function(v,i){
    var x=pad+(i/(vals.length-1||1))*(w-pad*2);
    var y=h-pad-(v/maxV)*(h-pad*2);
    return x+','+y;
  }).join(' ');
  var apts = pts+' '+(w-pad)+','+(h-pad)+' '+pad+','+(h-pad);
  var svg='<svg width="100%" viewBox="0 0 '+w+' '+h+'" preserveAspectRatio="none">'
    +'<defs><linearGradient id="lg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="var(--gold)" stop-opacity=".3"/><stop offset="100%" stop-color="var(--gold)" stop-opacity="0"/></linearGradient></defs>'
    +'<polygon points="'+apts+'" fill="url(#lg)"/>'
    +'<polyline points="'+pts+'" fill="none" stroke="var(--gold)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>';
  vals.forEach(function(v,i){
    var x=pad+(i/(vals.length-1||1))*(w-pad*2);
    var y=h-pad-(v/maxV)*(h-pad*2);
    svg+='<circle cx="'+x+'" cy="'+y+'" r="3" fill="var(--gold)"/>';
    if(i===0||i===vals.length-1||v===Math.max.apply(null,vals)){
      svg+='<text x="'+x+'" y="'+(y-8)+'" text-anchor="middle" fill="var(--gold)" font-size="8" font-family="var(--head)">'+fmt(v)+'</text>';
    }
  });
  svg+='</svg>';
  // Labels dates
  var labels='<div style="display:flex;justify-content:space-between;font-size:.65rem;color:var(--muted);margin-top:.25rem;padding:0 '+pad+'px">';
  data.forEach(function(d,i){
    if(i===0||i===data.length-1||data.length<=7)
      labels+='<span>'+d[0].substring(5)+'</span>';
    else labels+='<span></span>';
  });
  labels+='</div>';
  return svg+labels;
}

// ── Export CSV ──
function exportCSV(){
  if(!window._lastData) return;
  var {orders, d} = window._lastData;
  var rows=[['N°','Client','Téléphone','Date','Créneau','Statut','Total','Articles']];
  orders.forEach(function(o){
    rows.push([
      o.orderNumber||'',
      o.userPrenom||'',
      o.userPhone||'',
      o.pickupDate||'',
      o.pickupTime||'',
      o.status||'',
      (o.total||0).toFixed(2),
      (o.items||[]).map(function(i){return i.name+(i.qty>1?' x'+i.qty:'');}).join(' + ')
    ]);
  });
  var csv=rows.map(function(r){return r.map(function(c){return '"'+String(c).replace(/"/g,'""')+'"';}).join(';');}).join('\n');
  var blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'});
  var a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='break-antillais-commandes-'+new Date().toISOString().split('T')[0]+'.csv';
  a.click();
}

// Démarrage
loadData();
</script>
