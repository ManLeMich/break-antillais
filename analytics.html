    _renderPrepModal(o);
  }).catch(function(e){ toast('Erreur: '+e.message, 'error'); });
}

function _renderPrepModal(o) {
  var m = document.getElementById('m-product');
  var items = o.items || [];
  var isPreparing = (o.status === 'preparing');
  var itemsStatus = o.itemsStatus || {};

  // ── Compteur d'articles prêts ──
  var doneCount = 0;
  items.forEach(function(_, i){ if (itemsStatus[i] === 'done') doneCount++; });

  // ── Liste des articles ──
  var itemsHtml = '';
  items.forEach(function(it, i) {
    var isDone = itemsStatus[i] === 'done';
    var dets = it.details ? it.details.split('|').map(function(d){ return d.trim(); }).filter(Boolean) : [];

    itemsHtml += '<div id="prep-item-'+i+'" style="background:'+(isDone?'rgba(16,185,129,.1)':'var(--dark3)')+';'
      + 'border:2px solid '+(isDone?'#10b981':'rgba(255,255,255,.06)')+';'
      + 'border-radius:12px;padding:.85rem 1rem;margin-bottom:.55rem;transition:all .25s">'
      + '<div style="display:flex;align-items:center;gap:.65rem">'
      // Numéro / check
      + '<div style="background:'+(isDone?'#10b981':'var(--red)')+';color:#fff;font-family:var(--head);font-weight:900;'
      + 'font-size:1rem;min-width:30px;height:30px;border-radius:50%;'
      + 'display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .25s">'
      + (isDone ? '✓' : (i+1))+'</div>'
      // Nom + détails
      + '<div style="flex:1">'
      + '<div style="font-family:var(--head);font-weight:800;font-size:1.05rem;line-height:1.3'+(isDone?';text-decoration:line-through;opacity:.6':'')+'">'+it.name+'</div>';
    dets.forEach(function(d){
      itemsHtml += '<div style="font-size:.82rem;color:#f59e0b;font-weight:600;margin-top:.15rem">→ '+d+'</div>';
    });
    itemsHtml += '</div>'
      // Prix
      + '<div style="text-align:right;flex-shrink:0">'
      + '<div style="font-weight:700;color:var(--gold);font-size:.9rem">'+fmt(it.price||0)+'</div>';
    // Bouton Prêt (visible seulement en mode préparation)
    if (isPreparing && !isDone) {
      itemsHtml += '<button class="btn btn-sm" style="margin-top:.3rem;background:rgba(16,185,129,.15);'
        + 'border:1px solid #10b981;color:#10b981;font-size:.75rem;padding:.25rem .6rem"'
        + ' data-oid="'+o.id+'" data-idx="'+i+'" onclick="prepMarkItem(this.dataset.oid,this.dataset.idx)">'
        + '✅ Prêt</button>';
    } else if (isDone) {
      itemsHtml += '<div style="color:#10b981;font-size:.75rem;font-weight:700;margin-top:.2rem">Prêt ✓</div>';
    }
    itemsHtml += '</div></div></div>';
  });

  // ── Barre de progression ──
  var pct = items.length ? Math.round(doneCount/items.length*100) : 0;
  var progressHtml = isPreparing
    ? '<div style="margin-bottom:.85rem">'
      + '<div style="display:flex;justify-content:space-between;font-size:.78rem;margin-bottom:.3rem">'
      + '<span style="font-weight:700">Progression</span>'
      + '<span style="color:'+(pct===100?'#10b981':'#f59e0b')+';font-weight:800">'+doneCount+'/'+items.length+'</span>'
      + '</div>'
      + '<div style="background:var(--dark4);border-radius:100px;height:8px">'
      + '<div style="background:'+(pct===100?'#10b981':'var(--red)')+';border-radius:100px;height:8px;width:'+pct+'%;transition:width .3s"></div>'
      + '</div></div>'
    : '';

  // ── Boutons bas ──
  var bottomHtml;
  if (!isPreparing) {
    // Vue initiale : Annuler + Confirmer
    bottomHtml = '<div style="display:flex;gap:.5rem;margin-top:.75rem">'
      + '<button class="btn btn-secondary" style="flex:1" onclick="closeModal(&apos;m-product&apos;)">Annuler</button>'
      + '<button class="btn btn-primary" style="flex:2" data-oid="'+o.id+'"'
      + ' onclick="prepStart(this.dataset.oid)">✅ Confirmer et démarrer</button>'
      + '</div>';
  } else if (doneCount === items.length) {
    // Tout prêt → bouton passer en Prête
    bottomHtml = '<div style="margin-top:.75rem">'
      + '<button class="btn btn-primary btn-full" style="background:#10b981;border-color:#10b981;font-size:1rem;padding:.9rem"'
      + ' data-oid="'+o.id+'" onclick="prepFinish(this.dataset.oid)">'
      + '🎉 Tout est prêt — Avertir le client !</button>'
      + '</div>';
  } else {
    // En cours
    bottomHtml = '<div style="display:flex;gap:.5rem;margin-top:.75rem">'
      + '<button class="btn btn-secondary btn-full" onclick="closeModal(&apos;m-product&apos;)">Réduire</button>'
      + '</div>';
  }

  var html = '<div class="modal-overlay" onclick="if(event.target===this)closeModal(&apos;m-product&apos;)">'
    + '<div class="modal" id="prep-modal-inner" style="max-height:92vh;overflow-y:auto">'
    + '<div class="modal-handle"></div>'
    // En-tête
    + '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem">'
    + '<div>'
    + '<div style="font-family:var(--head);font-weight:900;font-size:1.25rem;color:var(--red)">🍳 Préparation</div>'
    + '<div style="font-size:.82rem;color:var(--muted)">N°'+o.orderNumber+' · '+o.userPrenom+'</div>'
    + '</div>'
    + '<div style="text-align:right">'
    + '<div style="font-family:var(--head);font-weight:800;font-size:1.1rem;color:#f59e0b">⏰ '+o.pickupTime+'</div>'
    + '<div style="font-size:.72rem;color:var(--muted)">'+(o.userPhone||'')+'</div>'
    + '</div></div>'
    // Résumé
    + '<div style="background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);'
    + 'border-radius:10px;padding:.5rem .85rem;margin-bottom:.75rem;'
    + 'display:flex;align-items:center;justify-content:space-between">'
    + '<span style="font-weight:700;font-size:.9rem">'+items.length+' article'+(items.length>1?'s':'')+' à préparer</span>'
    + '<span style="color:var(--gold);font-weight:800">'+fmt(o.total||0)+'</span>'
    + '</div>'
    + progressHtml
    + itemsHtml
    + bottomHtml
    + '</div></div>';

  m.innerHTML = html;
  m.style.display = 'block';
}

// Démarrer la préparation et rester dans la modale
function prepStart(orderId) {
  var btn = event && event.target;
  if (btn) { btn.disabled = true; btn.textContent = '⏳ Démarrage...'; }
  db.ref('data/ba_orders/' + orderId).once('value').then(function(snap) {
    var o = snap.val();
    if (!o) { o = getOrders().find(function(x){ return x.id===orderId; }); }
    o.status = 'preparing';
    o.updatedAt = new Date().toISOString();
    o.itemsStatus = {};
    saveOrder(o);
    db.ref('data/ba_orders/'+o.id).set(o);
    notifyOrder(o.userId, '👨‍🍳 En preparation', 'Votre commande est en preparation.', 'preparing', o.id, o.orderNumber, o.pickupTime);
    // Recharger la modale en mode préparation
    _renderPrepModal(o);
  }).catch(function(e){ toast('Erreur: '+e.message, 'error'); });
}

// Marquer un article comme prêt
function prepMarkItem(orderId, itemIdx) {
  var btn = event && event.target;
  if (btn) { btn.disabled = true; btn.textContent = '...'; }
  db.ref('data/ba_orders/' + orderId).once('value').then(function(snap) {
    var o = snap.val();
    if (!o) { o = getOrders().find(function(x){ return x.id===orderId; }); }
    if (!o.itemsStatus) o.itemsStatus = {};
    o.itemsStatus[parseInt(itemIdx)] = 'done';
    o.updatedAt = new Date().toISOString();
    saveOrder(o);
    db.ref('data/ba_orders/'+o.id+'/itemsStatus').set(o.itemsStatus);
    // Vérifier si tout est prêt
    var items = o.items || [];
    var allDone = items.every(function(_, i){ return o.itemsStatus[i] === 'done'; });
    if (allDone) {
      // Passer automatiquement en ready
      prepFinishOrder(o);
    } else {
      _renderPrepModal(o);
    }
  }).catch(function(e){ if(btn){btn.disabled=false;btn.textContent='✅ Prêt';} toast('Erreur','error'); });
}

// Bouton "Tout est prêt" manuel
function prepFinish(orderId) {
  db.ref('data/ba_orders/' + orderId).once('value').then(function(snap) {
    var o = snap.val();
    if (!o) { o = getOrders().find(function(x){ return x.id===orderId; }); }
    prepFinishOrder(o);
  });
}

// Passer en ready et fermer la modale
function prepFinishOrder(o) {
  o.status = 'ready';
  o.updatedAt = new Date().toISOString();
  saveOrder(o);
  db.ref('data/ba_orders/'+o.id).set(o);
  notifyOrder(o.userId, '🎉 Prete !', 'Votre commande est prete ! Venez la recuperer.', 'ready', o.id, o.orderNumber, o.pickupTime);
  closeModal('m-product');
  toast('🎉 Commande prête ! Client averti.', 'success', 4000);
  var ac = document.getElementById('admin-content');
  if (ac) ac.innerHTML = adminOrders();
}


function advanceOrder(id) {
  db.ref('data/ba_orders/' + id).once('value').then(function(snap) {
    var o = snap.val();
    if (!o) {
      var local = getOrders().find(function(x) { return x.id === id; });
      if (!local) { toast('Commande introuvable', 'error'); return; }
      o = local;
    }

    var next = { pending:'confirmed', confirmed:'preparing', preparing:'ready', ready:'picked_up' };
    var nxt = next[o.status];
    if (!nxt) { toast('Statut invalide', 'error'); return; }

    o.status = nxt;
    o.updatedAt = new Date().toISOString();

    // ══ POINTS FIDÉLITÉ ══
    // Déclenché UNIQUEMENT au passage en picked_up, une seule fois (pointsAwarded flag)
    if (nxt === 'picked_up') {
      if (o.pointsAwarded === true) {
        // Sécurité anti-doublon : déjà attribués, on ignore
        console.log('[Points] Déjà attribués pour commande', o.orderNumber);
      } else if (!o.userId || o.userId.indexOf('guest-') === 0) {
        console.log('[Points] Commande guest, pas de points');
      } else {
        // Marquer IMMÉDIATEMENT avant tout appel async pour éviter le doublon
        o.pointsAwarded = true;


        var cfg = getCfg();
        var ptsPerEuro = cfg.ptsPerEuro || 5;
        var pts = Math.floor(o.total || 0) * ptsPerEuro;
        var bonus = (o.total || 0) >= (cfg.bonusOrderThreshold || 20) ? (cfg.bonusOrderPts || 5) : 0;
        var totalPts = pts + bonus;

        console.log('[Points] Calcul : ' + fmt(o.total||0) + ' × ' + ptsPerEuro + ' = ' + pts + ' pts + ' + bonus + ' bonus = ' + totalPts + ' pts');

        // Fonction qui reçoit le user et applique les points
        var awardTo = function(u) {
          if (!u || !u.id) { console.warn('[Points] User invalide'); return; }
          var before = u.points || 0;
          u.points = before + totalPts;
          console.log('[Points] ' + u.prenom + ' : ' + before + ' → ' + u.points + ' pts');

          // 1. Écrire les points dans Firebase (les deux nœuds)
          db.ref('data/users/' + u.id + '/points').set(u.points);
          db.ref('data/users/' + u.id).once('value').then(function(us){
            // update sans écraser tout le profil
          });

          // 2. Mettre à jour dans ba_users aussi
          db.ref('data/ba_users').once('value').then(function(buSnap){
            var arr = buSnap.val() || [];
            var list = Array.isArray(arr) ? arr : Object.values(arr);
            var i2 = list.findIndex(function(x){ return x && x.id === u.id; });
            if (i2 >= 0) { list[i2].points = u.points; db.ref('data/ba_users').set(list); }
          });

          // 3. Historique points Firebase
          var histEntry = { pts: totalPts, label: 'Commande N°' + o.orderNumber + ' (' + ptsPerEuro + ' pts/€)', at: new Date().toISOString() };
          db.ref('data/ba_pts_history_' + u.id).once('value').then(function(hs){
            var hArr = hs.val() || [];
            if (!Array.isArray(hArr)) hArr = Object.values(hArr);
            hArr.unshift(histEntry);
            db.ref('data/ba_pts_history_' + u.id).set(hArr.slice(0, 50));
          });

          // 4. Mettre à jour localStorage
          try {
            var lsUsers = JSON.parse(localStorage.getItem('_ba_ba_users') || '[]');
            var lu = Array.isArray(lsUsers) ? lsUsers : Object.values(lsUsers);
            var li = lu.findIndex(function(x){ return x && x.id === u.id; });
            if (li >= 0) { lu[li].points = u.points; localStorage.setItem('_ba_ba_users', JSON.stringify(lu)); }
          } catch(e) {}

          // 5. Notification client
          var msg = '+' + totalPts + ' points' + (bonus > 0 ? ' (dont +' + bonus + ' bonus)' : '') + ' ajoutés !';
          notify(o.userId, '🎁 Points ajoutés !', msg);
          db.ref('status_updates/' + o.userId + '/palier-check').set({ status: 'check_palier', pts: totalPts, at: new Date().toISOString() });
        };

        // Chercher le user : data/users → localStorage → data/ba_users
        db.ref('data/users/' + o.userId).once('value').then(function(usnap) {
          var u = usnap.val();
          if (u && u.id) {
            awardTo(u);
          } else {
            var local = getUsers().find(function(x){ return x.id === o.userId; });
            if (local) {
              awardTo(local);
            } else {
              db.ref('data/ba_users').once('value').then(function(buSnap){
                var buArr = buSnap.val() || [];
                var list = Array.isArray(buArr) ? buArr : Object.values(buArr);
                var found = list.find(function(x){ return x && x.id === o.userId; });
                if (found) {
                  db.ref('data/users/' + found.id).set(found); // migrer
                  awardTo(found);
                } else {
                  console.warn('[Points] User introuvable userId:', o.userId);
                }
              });
            }
          }
        });
      }
    }

    // Sauvegarder la commande (avec pointsAwarded=true si applicable)
    db.ref('data/ba_orders/' + o.id).set(o).then(function() {
      toast('Statut mis à jour ✓', 'success');
      var orders = getOrders();
      var idx2 = orders.findIndex(function(x) { return x.id === o.id; });
      if (idx2 >= 0) orders[idx2] = o; else orders.push(o);
      try { localStorage.setItem('_ba_ba_orders', JSON.stringify(orders)); } catch(e) {}
      var ac = document.getElementById('admin-content');
      if (ac) ac.innerHTML = adminOrders();
    }).catch(function(e) {
      toast('Erreur: ' + e.message, 'error');
    });

    // Notifications statut
    var titles = { confirmed:'✅ Confirmee', preparing:'👨‍🍳 En preparation', ready:'🎉 Prete !', picked_up:'✅ Recuperee' };
    var bodies = {
      confirmed: 'Votre commande est confirmee. Retrait a ' + o.pickupTime + '.',
      preparing: 'Votre commande est en preparation.',
      ready: 'Votre commande est prete ! Venez la recuperer.',
      picked_up: 'Commande recuperee. Merci ! 🌴'
    };
    notifyOrder(o.userId, titles[nxt], bodies[nxt], nxt, o.id, o.orderNumber, o.pickupTime);

    if (nxt === 'picked_up') {
      setTimeout(function() {
        db.ref('status_updates/' + o.userId + '/rating-' + o.id).set({
          status: 'rate_order', orderId: o.id, orderNumber: o.orderNumber,
          title: 'Comment etait votre commande ?',
          body: 'Donnez votre avis sur votre derniere commande !',
          at: new Date().toISOString()
        });
      }, 25 * 60 * 1000);
    }
  }).catch(function(e) {
    toast('Erreur Firebase: ' + e.message, 'error');
  });
}


function cancelOrder(id) {

    var o = snap.val();
    if (!o) {
      var local = getOrders().find(function(x) { return x.id === id; });

      o = local;
    }
    // Afficher la modale de confirmation

function confirmCancelOrder(id) {
  var reason = (document.getElementById('cancel-reason') || {}).value || '';
  // Chercher dans Firebase par ID
  db.ref('data/ba_orders/' + id).once('value').then(function(snap) {
    var o = snap.val();
    if (!o) {
      var local = getOrders().find(function(x) { return x.id === id; });
      if (!local) { toast('Commande introuvable', 'error'); return; }
      o = local;
    }
    o.status = 'cancelled';
    o.cancelReason = reason;
    o.cancelledAt = new Date().toISOString();

    // Sauvegarder dans Firebase par ID
    db.ref('data/ba_orders/' + o.id).set(o).then(function() {
      // Mettre à jour localStorage
      var orders = getOrders();
      var idx = orders.findIndex(function(x) { return x.id === o.id; });
      if (idx >= 0) orders[idx] = o; else orders.push(o);
      try { localStorage.setItem('_ba_ba_orders', JSON.stringify(orders)); } catch(e) {}
      notify(o.userId, '❌ Commande annulee', 'Votre commande a ete annulee.' + (reason ? ' Raison: ' + reason : ''));
      closeModal('m-product');
      toast('Commande N°' + o.orderNumber + ' annulee', 'info');
      var ac = document.getElementById('admin-content');
      if (ac) ac.innerHTML = adminOrders();
    }).catch(function(e) {
      toast('Erreur: ' + e.message, 'error');
    });
  }).catch(function(e) {
    toast('Erreur Firebase: ' + e.message, 'error');
  });
}

  var html='<div style="padding:0 .9rem">'
    +'<div style="display:flex;justify-content:space-between;align-items:center;margin:.75rem 0">'

function previewImg(input){
  var f=input.files[0]; if(!f) return;
  // Lire et compresser l'image
  var reader = new FileReader();
  reader.onload = function(e) {
    var img = new Image();
    img.onload = function() {
      // Compression : max 900px, qualite 80%
      var MAX = 900;
      var w = img.width, h = img.height;
      if (w > h) { if(w>MAX){h=Math.round(h*MAX/w);w=MAX;} } else { if(h>MAX){w=Math.round(w*MAX/h);h=MAX;} }
      var canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      var dataUrl = canvas.toDataURL('image/jpeg', 0.80);
      // Stocker l'image compressée en base64
      _newImg = dataUrl;
      // Afficher l'apercu
      var prev = document.getElementById('pf-prev');
      if (prev) {
        if (prev.tagName==='IMG') prev.src = dataUrl;
        else prev.outerHTML = '<img id="pf-prev" src="'+dataUrl+'" style="width:100%;height:110px;object-fit:cover;border-radius:8px;margin-top:.4rem">';
      }
      toast('Photo prête ! Cliquez Enregistrer.','success',2000);
    };
    img.onerror = function(){
      // Fallback sans compression
      _newImg = e.target.result;
      toast('Photo prête !','success',1500);
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(f);
}

function getProdFormData(){
  var n = document.getElementById('pf-n');
  var c = document.getElementById('pf-c');
  var p = document.getElementById('pf-p');
  var d = document.getElementById('pf-d');
  var ok = document.getElementById('pf-ok');
  var soon = document.getElementById('pf-soon');
  var stockEl = document.getElementById('pf-stock');
  var stockAlertEl = document.getElementById('pf-stock-alert');
  return {
    name: n ? n.value.trim() : '',
    cat: c ? c.value : 'bokit',
    price: p ? (parseFloat(p.value)||0) : 0,
    desc: d ? d.value.trim() : '',
    ok: ok ? ok.checked : true,
    soon: soon ? soon.checked : false,
    featured: document.getElementById('pf-feat') ? document.getElementById('pf-feat').checked : false,
    stock: stockEl && stockEl.value!=='' ? parseInt(stockEl.value) : null,
    stockAlert: stockAlertEl && stockAlertEl.value!=='' ? parseInt(stockAlertEl.value) : 3,
    allergens: Array.from(document.querySelectorAll('input[name="pf-allergen"]:checked')).map(function(el){return el.value;})
  };
}
function saveNewProd(){
  var d=getProdFormData();
  if(!d.name){toast('Nom requis','error');return;}
  var p=Object.assign({id:genId(),image:_newImg||null},d);
  saveProduct(p); _newImg=null; closeModal('m-product');
  toast('Produit ajoute !','success');
  document.getElementById('admin-content').innerHTML=adminProducts();
}
function saveEditProd(id){
  var p=getProducts().find(function(x){return x.id===id;});
  if(p){
    var d=getProdFormData();
    var oldImage = p.image;
    var oldImageRef = p._imageRef;
    Object.assign(p,d);
    if(_newImg) { p.image=_newImg; } else { p.image=oldImage; if(oldImageRef) p._imageRef=oldImageRef; }
    saveProduct(p);
    // Si c'est un agoulou, propager le stock à toutes les variantes
    if (p.cat === 'agoulou') {
      var allAgoulou = getProducts().filter(function(x){ return x.cat==='agoulou'; });
      allAgoulou.forEach(function(ag){
        if (ag.id === p.id) return; // déjà sauvegardé
        ag.stock = p.stock;
        ag.stockAlert = p.stockAlert;
        // Même disponibilité si stock épuisé
        if (p.stock === 0) ag.ok = false;
        else if (p.ok) ag.ok = true;
        saveProduct(ag);
        db.ref('data/ba_products/'+ag.id+'/stock').set(p.stock);
        db.ref('data/ba_products/'+ag.id+'/ok').set(ag.ok);
      });
    }
  }
  _newImg=null; closeModal('m-product');
  toast('Produit modifie !','success');
  document.getElementById('admin-content').innerHTML=adminProducts();
}
function deleteProd(id){
  deleteProduct(id);
  toast('Produit supprime','info');
  document.getElementById('admin-content').innerHTML=adminProducts();
}

function adminStats(period, dateFrom, dateTo){
  period = period||'all';
  var allOrders = getOrders();
  var now = new Date();

  // Filtrer par période
  var filtered = allOrders.filter(function(o){
    if(o.status==='cancelled') return false;
    var d = new Date(o.createdAt);
    if(period==='week')  return (now-d)<7*86400000;
    if(period==='month') return (now-d)<30*86400000;
    if(period==='custom' && dateFrom && dateTo){
      var from = new Date(dateFrom+'T00:00:00');
      var to   = new Date(dateTo+'T23:59:59');
      return d>=from && d<=to;
    }
    return true;
  });

  var done    = filtered.filter(function(o){return o.status==='picked_up';});
  var revenue = done.reduce(function(s,o){return s+(o.total||0);},0);
  var avg     = done.length ? revenue/done.length : 0;
  var clients = getUsers().filter(function(u){var r=u.role||'client';return r==='client'||r==='';});

  // CA par jour de semaine
  var byDay=[0,0,0,0,0,0,0], byDayCount=[0,0,0,0,0,0,0];
  done.forEach(function(o){
    var d=new Date(o.createdAt).getDay();
    byDay[d]+=(o.total||0); byDayCount[d]++;
  });
  var dayNames=['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];
  var maxDay=Math.max.apply(null,byDay)||1;

  // Affluence par heure
  var byHour={};
  filtered.forEach(function(o){
    var h=o.pickupTime?o.pickupTime.split(':')[0]:null;
    if(h) byHour[h]=(byHour[h]||0)+1;
  });
  var maxHour=Math.max.apply(null,Object.values(byHour).concat([1]));

  // Top produits
  var freq={};
  done.forEach(function(o){(o.items||[]).forEach(function(i){if(i.cat!=='reward') freq[i.name]=(freq[i.name]||0)+1;});});
  var top=Object.entries(freq).sort(function(a,b){return b[1]-a[1];}).slice(0,8);

  var html='<div style="padding:0 .9rem 5rem">';

  // ── Sélecteur de période ──
  var customStyle = 'display:'+(period==='custom'?'flex':'none')+';gap:.4rem;margin-top:.4rem;align-items:center;flex-wrap:wrap';
  html+='<div style="margin:.75rem 0">'
    +'<div style="display:flex;gap:.35rem;flex-wrap:wrap;margin-bottom:.3rem">'
    +'<button class="btn btn-sm '+(period==='all'?'btn-primary':'btn-secondary')+'" onclick="document.getElementById(&apos;admin-content&apos;).innerHTML=adminStats(&apos;all&apos;)">Tout</button>'
    +'<button class="btn btn-sm '+(period==='month'?'btn-primary':'btn-secondary')+'" onclick="document.getElementById(&apos;admin-content&apos;).innerHTML=adminStats(&apos;month&apos;)">30 jours</button>'
    +'<button class="btn btn-sm '+(period==='week'?'btn-primary':'btn-secondary')+'" onclick="document.getElementById(&apos;admin-content&apos;).innerHTML=adminStats(&apos;week&apos;)">7 jours</button>'
    +'<button class="btn btn-sm '+(period==='custom'?'btn-primary':'btn-secondary')+'" onclick="toggleStatsCustom()">📅 Période</button>'
    +'</div>'
    +'<div id="stats-custom-range" style="'+customStyle+'">'
    +'<input type="date" id="stats-from" class="form-input" style="flex:1;padding:.3rem .5rem;font-size:.8rem" value="'+(dateFrom||'')+'">'
    +'<span class="text-sm text-muted">→</span>'
    +'<input type="date" id="stats-to" class="form-input" style="flex:1;padding:.3rem .5rem;font-size:.8rem" value="'+(dateTo||'')+'">'
    +'<button class="btn btn-primary btn-sm" onclick="applyStatsCustom()">OK</button>'
    +'</div>'
    +'</div>';

  // ── KPIs ──
  html+='<div class="stat-grid">'
    +'<div class="stat-card"><div class="stat-val">'+fmt(revenue)+'</div><div class="stat-lbl">CA</div></div>'
    +'<div class="stat-card"><div class="stat-val">'+done.length+'</div><div class="stat-lbl">Commandes</div></div>'
    +'<div class="stat-card"><div class="stat-val">'+fmt(avg)+'</div><div class="stat-lbl">Panier moy.</div></div>'
    +'<div class="stat-card"><div class="stat-val">'+clients.length+'</div><div class="stat-lbl">Clients</div></div>'
    +'</div>';

  // ── Bouton export CSV ──
  html+='<button class="btn btn-secondary btn-full" style="margin:.5rem 0" onclick="exportStatsCSV(\''+period+'\',\''+(dateFrom||'')+'\',\''+(dateTo||'')+'\')">'
    +'📊 Exporter en CSV (Excel / Google Sheets)</button>';

  // ── CA par jour ──
  html+='<div class="sec-title mt-2">📅 CA par jour</div><div class="card mb-2">';
  dayNames.forEach(function(d,i){
    var pct=Math.round((byDay[i]/maxDay)*100);
    var col=byDay[i]>0?'var(--red)':'var(--dark4)';
    html+='<div style="display:flex;align-items:center;gap:.75rem;margin-bottom:.45rem">'
      +'<div style="width:28px;font-size:.75rem;font-weight:700;color:var(--muted)">'+d+'</div>'
      +'<div style="flex:1;background:var(--dark4);border-radius:100px;height:8px">'
      +'<div style="background:'+col+';width:'+pct+'%;height:100%;border-radius:100px"></div></div>'
      +'<div style="min-width:60px;text-align:right;font-size:.75rem;font-weight:700;color:var(--gold)">'+fmt(byDay[i])+'</div>'
      +'<div style="min-width:30px;text-align:right;font-size:.7rem;color:var(--muted)">'+byDayCount[i]+'x</div>'
      +'</div>';
  });
  html+='</div>';

  // ── Affluence par créneau ──
  html+='<div class="sec-title">\u{1F550} Affluence par créneau</div><div class="card mb-2">';
  Object.keys(byHour).sort().forEach(function(h){
    var pct=Math.round((byHour[h]/maxHour)*100);
    var col=pct>=80?'#ef4444':pct>=50?'#f59e0b':'#10b981';
    html+='<div style="display:flex;align-items:center;gap:.75rem;margin-bottom:.45rem">'
      +'<div style="width:40px;font-size:.75rem;font-weight:700">'+h+'h</div>'
      +'<div style="flex:1;background:var(--dark4);border-radius:100px;height:8px">'
      +'<div style="background:'+col+';width:'+pct+'%;height:100%;border-radius:100px"></div></div>'
      +'<div style="min-width:35px;text-align:right;font-size:.75rem;font-weight:700;color:'+col+'">'+byHour[h]+'</div>'
      +'</div>';
  });
  if(!Object.keys(byHour).length) html+='<p class="text-sm text-muted">Pas encore de données</p>';
  html+='</div>';

  // ── Top produits ──
  if(top.length){
    html+='<div class="sec-title">\u{1F3C6} Top produits</div>';
    var maxFreq=top[0][1]||1;
    top.forEach(function(e,i){
      var pct=Math.round((e[1]/maxFreq)*100);
      html+='<div style="display:flex;align-items:center;gap:.75rem;padding:.5rem .75rem;background:var(--dark3);border-radius:8px;margin-bottom:.35rem">'
        +'<div style="min-width:20px;font-weight:800;color:var(--red);font-size:.85rem">'+(i+1)+'</div>'
        +'<div style="flex:1"><div class="fw-700 text-sm">'+e[0]+'</div>'
        +'<div style="background:var(--dark4);border-radius:100px;height:4px;margin-top:.25rem">'
        +'<div style="background:var(--red);width:'+pct+'%;height:100%;border-radius:100px"></div></div></div>'
        +'<div class="fw-700 text-gold" style="font-size:.85rem">'+e[1]+'x</div>'
        +'</div>';
    });
  }

  // ── Avis clients ──
  var ratings=load('ba_ratings',[]);
  if(ratings.length){
    html+='<div class="sec-title">⭐ Avis clients ('+ratings.length+')</div>';
    var avgNote=ratings.reduce(function(s,r){return s+r.note;},0)/ratings.length;
    html+='<div style="text-align:center;padding:.75rem;background:var(--dark3);border-radius:var(--radius);margin-bottom:.75rem">'
      +'<div style="font-size:2rem;font-weight:800;color:var(--gold)">'+avgNote.toFixed(1)+'/5</div>'
      +'<div class="text-sm text-muted">Note moyenne sur '+ratings.length+' avis</div></div>';
    ratings.slice(0,10).forEach(function(r){
      html+='<div style="background:var(--dark3);border-radius:8px;padding:.65rem .85rem;margin-bottom:.35rem">'
        +'<div style="display:flex;justify-content:space-between;align-items:center">'
        +'<span class="fw-700 text-sm">'+r.userName+'</span>'
        +'<span style="color:var(--gold)">'+'⭐'.repeat(r.note)+'</span></div>'
        +(r.comment?'<div class="text-sm text-muted mt-1">'+r.comment+'</div>':'')
        +'<div style="font-size:.7rem;color:var(--muted);margin-top:.25rem">'+new Date(r.at).toLocaleDateString('fr-FR')+'</div>'
        +'</div>';
    });
  }

  return html+'</div>';
}

function applyStatsCustom(){

function exportStatsCSV(period, dateFrom, dateTo){
  var allOrders = getOrders();
  var now = new Date();
  var filtered = allOrders.filter(function(o){
    if(o.status==='cancelled') return false;
    var d=new Date(o.createdAt);
    if(period==='week')  return (now-d)<7*86400000;
    if(period==='month') return (now-d)<30*86400000;
    if(period==='custom'&&dateFrom&&dateTo){
      var from=new Date(dateFrom+'T00:00:00');
      var to=new Date(dateTo+'T23:59:59');
      return d>=from&&d<=to;
    }
    return true;
  });

  var BOM = '\uFEFF'; // BOM UTF-8 pour Excel
  var rows = ['N°;Date;Heure retrait;Client;Téléphone;Articles;Total (€);Paiement;Statut'];
  filtered.forEach(function(o){
    var items=(o.items||[]).map(function(i){return i.name+(i.details?' ('+i.details+')':'');}).join(' | ');
    var statuts={pending:'En attente',confirmed:'Confirmée',preparing:'En préparation',ready:'Prête',picked_up:'Récupérée',cancelled:'Annulée'};
    rows.push([
      o.orderNumber||'',
      new Date(o.createdAt).toLocaleDateString('fr-FR'),
      o.pickupTime||'',
      o.userPrenom||'',
      o.userPhone||'',
      '"'+items.replace(/"/g,"'")+'"',
      (o.total||0).toFixed(2).replace('.',','),
      o.payment||'',
      statuts[o.status]||o.status
    ].join(';'));
  });

  // Ajouter totaux en bas
  var done=filtered.filter(function(o){return o.status==='picked_up';});
  var revenue=done.reduce(function(s,o){return s+(o.total||0);},0);
  rows.push('');
  rows.push(';;;;;;TOTAL (CA);'+revenue.toFixed(2).replace('.',',')+';;');
  rows.push(';;;;;;NB COMMANDES;'+done.length+';;');

  var csv = BOM + rows.join('\n');
  var blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  var label = period==='custom'?(dateFrom+'_au_'+dateTo):period;
  a.href=url; a.download='break_antillais_stats_'+label+'.csv';
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
  toast('Export CSV téléchargé !','success');
}

function mcSearchPhone(val) {
  var res = document.getElementById('mc-phone-results');

  var clean = q.replace(/[^0-9]/g,'');
  if (q.length < 2) { res.innerHTML = ''; return; }
  var users = getUsers().filter(function(u){ return !u.role || u.role==='client'; });
  var found = users.filter(function(u){
    var nameMatch = (u.prenom||'').toLowerCase().indexOf(q) >= 0;
    var phoneMatch = clean.length >= 3 && (u.phone||'').replace(/[^0-9]/g,'').indexOf(clean) >= 0;
    return nameMatch || phoneMatch;

    res.innerHTML = '<div class="text-sm" style="color:#f59e0b;padding:.3rem 0">⚠️ Client non enregistré — un code SMS sera généré</div>';

  found.slice(0,6).forEach(function(u) {

  var codeUp = code.trim().toUpperCase();
  db.ref('data/promo_codes/'+codeUp).once('value').then(function(snap){
    var p = snap.val();
    if (!p||!p.active) { toast('Code invalide','error'); return; }
    if (p.expiry && new Date(p.expiry) < new Date()) { toast('Code expire','error'); return; }
    if (p.limit > 0 && p.used >= p.limit) { toast('Code epuise','error'); return; }
    // Vérifier si ce user a déjà utilisé ce code
    db.ref('data/promo_uses/'+codeUp+'/'+user.id).once('value').then(function(usnap){
      if (usnap.exists()) { toast('Vous avez deja utilise ce code','error'); return; }
      // Appliquer
      db.ref('data/promo_codes/'+codeUp+'/used').set((p.used||0)+1);
      db.ref('data/promo_uses/'+codeUp+'/'+user.id).set(new Date().toISOString());
      user.points = (user.points||0) + p.pts;
      db.ref('data/users/'+user.id+'/points').set(user.points);
      var hist = load('ba_pts_history_'+user.id,[]);
      hist.unshift({pts:p.pts, label:'Code promo: '+codeUp, at:new Date().toISOString()});
      save('ba_pts_history_'+user.id, hist);
      saveUser(user); setCurrentUser(user);
      toast('+'+p.pts+' points ! Code '+codeUp+' utilise.','success',4000);
      renderProfile();
    });
  }).catch(function(){ toast('Erreur verification','error'); });
}

function savePaliers(){
  var paliers=load('ba_paliers', PALIERS);
  var updated=[];
  for(var i=0;i<paliers.length;i++){
    var name=document.getElementById('pal-name-'+i);
    var ptsEl=document.getElementById('pal-pts-'+i);
    var icon=document.getElementById('pal-icon-'+i);
    var color=document.getElementById('pal-color-'+i);
    if(!name) continue;
    var reward=document.getElementById('pal-reward-'+i);
    var choicesArr = [];
    document.querySelectorAll('[data-palier="'+i+'"][data-prod]').forEach(function(cb){
      if(cb.checked) choicesArr.push(cb.dataset.prod);
    });
    if (!choicesArr.length) choicesArr = paliers[i].choices||[];
    updated.push({
      name:name.value.trim()||paliers[i].name,
      pts:parseInt(ptsEl?ptsEl.value:0)||paliers[i].pts||paliers[i].min||0,
      icon:icon.value.trim()||paliers[i].icon,
      color:color.value||paliers[i].color,
      reward:reward?reward.value.trim():'',
      choices:choicesArr,
      threshold:paliers[i].threshold||''
    });
  }
  updated.sort(function(a,b){return (a.pts||0)-(b.pts||0);});
  save('ba_paliers', updated);
  toast('Paliers enregistres !','success');
  document.getElementById('admin-content').innerHTML=adminLoyalty();
}
function addPalier(){
  var paliers=load('ba_paliers', PALIERS);

function delPalier(i){
  var paliers=load('ba_paliers', PALIERS);

}

function getFilteredClients(target) {
  var allUsers = getUsers();
  // If no users in cache, try to get from Firebase sync
  if (!allUsers.length) {
    toast('Chargement des clients...', 'info', 2000);
  }
  var allClients = allUsers.filter(function(u){ return !u.role || u.role==='client'; });
  var now = new Date();
  if (target === 'all') return allClients;
  if (target === 'inactive' || target === 'inactive30') {
    var days = target === 'inactive' ? 14 : 30;
    var orders = getOrders();
    return allClients.filter(function(u){
      var lastOrder = orders.filter(function(o){ return o.userId===u.id && o.status!=='cancelled'; })
        .sort(function(a,b){ return new Date(b.createdAt)-new Date(a.createdAt); })[0];
      if (!lastOrder) {
        // No orders - check signup date
        var signupDays = (now - new Date(u.createdAt)) / (1000*60*60*24);
        return signupDays >= days;
      }
      var daysSince = (now - new Date(lastOrder.createdAt)) / (1000*60*60*24);
      return daysSince >= days;
    });
  }
  if (target.startsWith('palier-')) {
    var palierName = target.replace('palier-','');
    return allClients.filter(function(u){
      var p = getPalier(u.points||0);
      return p.name === palierName;
    });
  }
  return allClients;
}

function sendAdminMessage() {
  var target = document.getElementById('msg-target').value;
  var type = document.getElementById('msg-type').value;
  var title = (document.getElementById('msg-title').value||'').trim();
  var body = (document.getElementById('msg-body').value||'').trim();
  if (!title || !body) { toast('Titre et message requis','error'); return; }
  toast('Envoi en cours...','info', 2000);
  // Reload fresh users from Firebase
  db.ref('data/users').once('value').then(function(snap) {
    var usersObj = snap.val() || {};
    var usersArr = Object.values(usersObj).filter(function(u){ return u && (!u.role || u.role==='client'); });
    if (!usersArr.length) { toast('Aucun client inscrit','warning'); return; }
    // Filter by target
    var now = new Date();
    var orders = getOrders();
    var clients = usersArr;
    if (target === 'inactive' || target === 'inactive30') {
      var days = target === 'inactive' ? 14 : 30;
      clients = usersArr.filter(function(u){
        var lastO = orders.filter(function(o){ return o.userId===u.id && o.status!=='cancelled'; })
          .sort(function(a,b){ return new Date(b.createdAt)-new Date(a.createdAt); })[0];
        var ref = lastO ? new Date(lastO.createdAt) : new Date(u.createdAt);
        return (now - ref) / (1000*60*60*24) >= days;
      });
    } else if (target.startsWith('palier-')) {
      var palierName = target.replace('palier-','');
      clients = usersArr.filter(function(u){ return getPalier(u.points||0).name===palierName; });
    }
    if (!clients.length) { toast('Aucun client correspond a ce filtre','warning'); return; }
    var expiry = document.getElementById('msg-expiry');
    var expiryVal = expiry ? expiry.value : null;
    clients.forEach(function(u){
      if (type === 'promo') {
        var promos = load('ba_promos', []);
        var exp = expiryVal ? new Date(expiryVal).toISOString() : new Date(Date.now()+7*86400000).toISOString();
        promos.push({id:genId(),userId:u.id,type:'limited',title:title,desc:body,expiresAt:exp,used:false});
        save('ba_promos', promos);
      }
      notify(u.id, title, body);
      osSendPush(u.id, title, body, 0);
    });
    toast('✅ Message envoye a '+clients.length+' client(s) !','success', 5000);
    ['msg-title','msg-body'].forEach(function(id){ var el=document.getElementById(id); if(el) el.value=''; });
  }).catch(function(e){ toast('Erreur envoi: '+e.message,'error'); });
}

    var bg  = isOff ? 'rgba(200,35,43,.2)' : 'rgba(16,185,129,.1)';
    var lbl = (isOff ? '🔴 ' : '🟢 ') + s.time;
    h += '<button data-slot="' + s.time + '" onclick="toggleSlot(this.dataset.slot,this)"'
      + ' style="padding:.35rem .7rem;border-radius:6px;font-size:.82rem;font-weight:700;cursor:pointer;'
      + 'border:1px solid ' + col + ';background:' + bg + ';color:' + col + '">'
      + lbl + '</button>';
  });
  return h;
  } catch(e) { return '<span class="text-muted text-sm">Creneaux non disponibles</span>'; }
}
function toggleSlot(time, btn) {
  var cfg = getCfg();
  var disabled = (cfg.disabledSlots || []).slice();
  var idx = disabled.indexOf(time);
  if (idx >= 0) {
    disabled.splice(idx, 1);
  } else {
    disabled.push(time);
  }
  cfg.disabledSlots = disabled;
  save('ba_cfg', cfg);
  // Mettre à jour le bouton visuellement
  var isOff = disabled.indexOf(time) >= 0;
  btn.style.borderColor = isOff ? '#ef4444' : '#10b981';
  btn.style.background = isOff ? 'rgba(200,35,43,.2)' : 'rgba(16,185,129,.1)';
  btn.style.color = isOff ? '#ef4444' : '#10b981';
  btn.textContent = (isOff ? '🔴 ' : '🟢 ') + time;
  toast(time + (isOff ? ' bloqué' : ' réouvert'), isOff ? 'warning' : 'success', 2000);
}

function exportAllData() {
  var data = {
    version: '1.0',
    exportedAt: new Date().toISOString(),
    ba_users: load('ba_users', []),
    ba_orders: load('ba_orders', []),
    ba_products: load('ba_products', null),
    ba_deleted_products: load('ba_deleted_products', []),
    ba_cfg: load('ba_cfg', {}),
    ba_meats: load('ba_meats', []),
    ba_sauces: load('ba_sauces', []),
    ba_supplements: load('ba_supplements', null),
    ba_paliers: load('ba_paliers', []),
    ba_promos: load('ba_promos', []),
    ba_auto_relance: load('ba_auto_relance', {})
  };
  // Include per-user data
  var users = data.ba_users;
  users.forEach(function(u){
    data['ba_pts_history_'+u.id] = load('ba_pts_history_'+u.id, []);
    data['ba_favs_'+u.id] = load('ba_favs_'+u.id, []);
    data['ba_bday_'+u.id] = load('ba_bday_'+u.id, null);
    data['ba_relance_sent_'+u.id] = load('ba_relance_sent_'+u.id, null);
  });
  var json = JSON.stringify(data, null, 2);
  var blob = new Blob([json], {type:'application/json'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  var date = new Date().toISOString().split('T')[0];
  a.href = url; a.download = 'break-antillais-data-'+date+'.json';
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
  save('ba_last_save', new Date().toISOString());
  toast('Donnees exportees !','success', 4000);
}

function importAllData(input) {
  var file = input.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var data = JSON.parse(e.target.result);
      if (!data.version || !data.ba_users) { toast('Fichier invalide','error'); return; }
      // Restore all keys
      Object.keys(data).forEach(function(k){
        if (k === 'version' || k === 'exportedAt') return;
        if (data[k] !== null && data[k] !== undefined) {
          save(k, data[k]);
        }
      });
      save('ba_last_save', new Date().toISOString());
      toast('Donnees importees ! Rechargement...','success', 3000);
      setTimeout(function(){ location.reload(); }, 2000);
    } catch(err) {
      toast('Erreur lors de l\'import : '+err.message,'error');
    }
  };
  reader.readAsText(file);
  input.value = '';
}

function exportCSV(){
  var orders=getOrders().filter(function(o){return o.status!=='cancelled';});
  var csv='N,Date,Client,Telephone,Articles,Total,Reglement,Statut\n';
  orders.forEach(function(o){
    var items=(o.items||[]).map(function(i){return i.name;}).join(' | ');
    csv+=o.orderNumber+','
      +'"'+new Date(o.createdAt).toLocaleString('fr-FR')+'",'
      +'"'+o.userPrenom+'",'
      +'"'+o.userPhone+'",'
      +'"'+items+'",'
      +o.total.toFixed(2)+','
      +'"'+o.payment+'",'
      +'"'+o.status+'"\n';
  });
  var blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url; a.download='break-antillais-factures.csv';
  document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
  toast('Export telecharge','success');
}

// POINTS REDUCTIONS
function getPointsReductions(pts, palier, total) {
  var reductions = [];
  // Single reduction: 200pts = -1€
  if (pts >= 200) reductions.push({id:'r1', label:'Remise -1€ sur cette commande', pts:200, discount:1.00});
  return reductions.filter(function(r){ return r.discount <= total; });
}

function togglePtsReduction(id) {
  var user = getCurrentUser();
  if (!user) return;
  var total = cart.reduce(function(s,i){return s+i.price*i.qty;},0);

  // Build full list of available options
  var palierList = load('ba_paliers', PALIERS);
  var curPalier = getPalier(user.points||0);
  var curPalierFull = palierList.find(function(p){ return p.name===curPalier.name; });
  var allOptions = [];

  // Palier reward
  if (curPalierFull && curPalierFull.reward && curPalier.name !== 'Bronze') {
    allOptions.push({id:'palier', label:curPalierFull.reward, pts:0, discount:0, type:'palier', reward:curPalierFull.reward});
  }
  // Active promos
  var promos = load('ba_promos',[]).filter(function(p){
    return p.userId===user.id && !p.used && new Date(p.expiresAt)>new Date();
  });
  promos.forEach(function(p){
    allOptions.push({id:'promo-'+p.id, label:p.title, pts:0, discount:0, type:'promo', promoId:p.id});
  });
  // Points reduction
  getPointsReductions(user.points||0, curPalier, total).forEach(function(r){ allOptions.push(r); });

  var opt = allOptions.find(function(x){return x.id===id;});
  if (!opt) return;

  // Deselect previous
  if (_selectedReduction) {
    var prevEl = document.getElementById('pts-opt-'+_selectedReduction.id);
    var prevCk = document.getElementById('pts-check-'+_selectedReduction.id);
    if (prevEl) { prevEl.style.borderColor='var(--border)'; prevEl.style.background=''; }
    if (prevCk) { prevCk.style.background='transparent'; }
  }

  if (_selectedReduction && _selectedReduction.id === id) {
    _selectedReduction = null;
  } else {
    _selectedReduction = opt;
    var el = document.getElementById('pts-opt-'+id);
    var ck = document.getElementById('pts-check-'+id);

function playPresenceAlert() {
  // Son "ding" doux pour signaler la présence client
  try {
    var ctx = new (window.AudioContext || window.webkitAudioContext)();
    [[1046,0,.08],[1318,.1,.08],[1568,.2,.15],[1318,.38,.08],[1568,.5,.25]].forEach(function(b){
      var osc = ctx.createOscillator();
      var gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.value = b[0];
      gain.gain.setValueAtTime(0.0001, ctx.currentTime+b[1]);
      gain.gain.exponentialRampToValueAtTime(0.2, ctx.currentTime+b[1]+0.01);
      gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime+b[1]+b[2]);
      osc.start(ctx.currentTime+b[1]);
      osc.stop(ctx.currentTime+b[1]+b[2]+0.05);
    });
  } catch(e) { console.warn('Son présence:', e); }
  if (navigator.vibrate) navigator.vibrate([100,50,100,50,200]);
}

function startOrderPolling() {
  setInterval(function(){
    var user = getCurrentUser();
    if (!user) return;
    var isAdmin = user.role==='superadmin'||user.role==='admin'||user.role==='entreprise';

    if (isAdmin) {
      // Admin: check for new orders
      var allOrders = getOrders();
      var pendingOrders = allOrders.filter(function(o){ return o.status==='pending'; });
      if (_lastOrderCount >= 0 && pendingOrders.length > _lastOrderCount && _adminAlertEnabled) {
        // New order(s) arrived!
        var newOrders = pendingOrders.slice(0, pendingOrders.length - _lastOrderCount);
        newOrders.forEach(function(o){
          playAdminAlert();
          showNewOrderBanner(o);
          sendPushNotif('🆕 Nouvelle commande !', 'N°'+o.orderNumber+' — '+o.userPrenom+' — '+fmt(o.total||0));
        });
      }
      _lastOrderCount = pendingOrders.length;
      // Refresh admin orders tab if open
      if (currentScreen === 'profile') {
        var ac = document.getElementById('admin-content');
        if (ac) {
          var activeTab = document.querySelector('.admin-tab.active');
          if (activeTab && activeTab.textContent.indexOf('Commandes') >= 0) {
            ac.innerHTML = adminOrders();
          }
          if (activeTab && activeTab.textContent.indexOf('Dashboard') >= 0) {
            ac.innerHTML = adminDashboard();
          }
        }
      }
      return;

    // Auto relance check (once per session via flag)
    if (!window._relanceChecked) {
      window._relanceChecked = true;
      checkAutoRelance();
    }
    // Client: check order status changes
    var orders = getOrders().filter(function(o){ return o.userId === user.id; });
    orders.forEach(function(o){
      var prev = _lastOrderStatuses[o.id];
      if (prev && prev !== o.status) {
        if (o.status === 'ready') {
          showOrderReadyAlert(o);

    });
    if (Object.keys(_lastOrderStatuses).length === 0) {

    var freshUser = getUsers().find(function(u){ return u.id === user.id; });

  }, 5000);

// ANNIVERSAIRE AUTO
function checkBirthdayOffer(user) {
  if (!user || !user.bday) return;
  var today = new Date();
  var bday = new Date(user.bday);
  if (bday.getDate() !== today.getDate() || bday.getMonth() !== today.getMonth()) return;
  // Vérifier si déjà offert cette année (Firebase)
  var thisYear = today.getFullYear();
  db.ref('data/ba_bday_'+user.id).once('value').then(function(snap) {
    if (snap.val() === thisYear) return; // déjà fait
    // Marquer comme fait
    db.ref('data/ba_bday_'+user.id).set(thisYear);
    save('ba_bday_'+user.id, thisYear);
    var cfg = getCfg();
    var bdayPts = cfg.birthdayPts || 50;
    // Ajouter les points
    user.points = (user.points||0) + bdayPts;
    db.ref('data/users/'+user.id+'/points').set(user.points);
    saveUser(user);
    setCurrentUser(user);
    // Historique points Firebase
    var histEntry = {pts: bdayPts, label: 'Cadeau anniversaire 🎂', at: new Date().toISOString()};
    db.ref('data/ba_pts_history_'+user.id).once('value').then(function(hs) {
      var arr = hs.val() || [];
      if (!Array.isArray(arr)) arr = Object.values(arr);
      arr.unshift(histEntry);
      db.ref('data/ba_pts_history_'+user.id).set(arr.slice(0, 50));
    });
    // Notification in-app
    notify(user.id, '🎂 Joyeux anniversaire '+user.prenom+' !', '+'+bdayPts+' points offerts pour votre anniversaire !');
    // Email
    try {
      if (user.email && typeof emailjs !== 'undefined') {
        emailjs.send('service_uez8gro', 'template_gs8itxh', {
          email: user.email,
          client_name: user.prenom,
          order_number: 'ANNIV-'+thisYear,
          items: 'Cadeau anniversaire Break Antillais 🎂',
          total: '+'+bdayPts+' points offerts',
          pickup_date: today.toLocaleDateString('fr-FR'),
          pickup_time: '',
          payment: 'Cadeau',
          address: getCfg().address || ''
        }).catch(function(e){ console.warn('Bday email:', e); });
      }
    } catch(e) {}
    // SMS WhatsApp
    var smsMsg = '🎂 Joyeux anniversaire '+user.prenom+' ! Break Antillais vous offre +'+bdayPts+' points fidélité aujourd\'hui. Bonne journée !';
    if (user.phone) {
      db.ref('data/ba_bday_sms_'+user.id).set({msg: smsMsg, phone: user.phone, at: new Date().toISOString()});
    }
    setTimeout(function(){
      toast('🎂 Joyeux anniversaire '+user.prenom+' ! +'+bdayPts+' points offerts !', 'success', 6000);
      updateBadges();
    }, 1000);
  }).catch(function(e){ console.warn('Birthday check:', e); });
}

function confirmRewardChoice(productName, palierName) {
  var products = getProducts();
  var prod = products.find(function(p){ return p.name === productName; });
  // Detect if config needed by category OR by name keywords
  var cat = prod ? prod.cat : '';
  var nameLow = productName.toLowerCase();
  var needsConfig = ['bokit','crepe_salee','agoulou'].indexOf(cat) >= 0
    || nameLow.indexOf('bokit') >= 0
    || nameLow.indexOf('agoulou') >= 0
    || nameLow.indexOf('crepe jambon') >= 0
    || nameLow.indexOf('crepe complete') >= 0;

  // Always use a fake prod object if not found
  if (!prod) {
    prod = {
      id: 'reward-'+palierName,
      name: productName,
      cat: needsConfig ? 'bokit' : 'boisson',
      price: 0,
      ok: true
    };
  }

  if (needsConfig) {
    closeModal('m-product');
    setTimeout(function(){ showRewardConfig(productName, palierName, prod); }, 50);
  } else {
    closeModal('m-product');
    // Vérifier stock avant d'ajouter
    var freshProd = getProducts().find(function(p){ return p.id === prod.id; });
    if (freshProd && freshProd.stock !== null && freshProd.stock !== undefined && freshProd.stock === 0) {
      toast('Désolé, ce produit est épuisé.', 'error'); return;
    }
    cart.push({
      id: genId(),
      pid: prod.id,
      name: productName,
      price: 0,
      cat: prod.cat,
      details: 'Recompense palier '+palierName,
      qty: 1,
      isReward: true,
      rewardPalier: palierName
    });
    updateBadges();
    toast('🎁 '+productName+' ajouté au panier !','success', 4000);
    go('cart');
  }
}

function addRewardConfigToCart(btn) {
  var productName = btn.dataset.pname;
  var palierName = btn.dataset.palier;
  var cat = btn.dataset.pcat;
  var pid = btn.dataset.pid;
  var mc = getMeatCount({name:productName});

  if (mc > 0 && pendingExtras.meats.length < mc) {
    toast('Choisissez '+mc+' viande(s)','warning'); return;
  }

  var details = [];
  if (pendingExtras.meats.length) details.push('Viandes: '+pendingExtras.meats.join(', '));
  if (pendingExtras.sauces.length) details.push('Sauce: '+pendingExtras.sauces.join(', '));
  if (pendingExtras.crudites.length) details.push('Crudites: '+pendingExtras.crudites.join(', '));
  if (pendingExtras.supplements && pendingExtras.supplements.length) {
    details.push('Suppl: '+pendingExtras.supplements.join(', ')+' (+'+fmt(pendingExtras.supplements.length*SUPPLEMENT_PRICE)+')');
  }
  var noteEl = document.getElementById('prod-note');
  if (noteEl && noteEl.value.trim()) details.push('Note: '+noteEl.value.trim());

  var suppCost = (pendingExtras.supplements||[]).length * SUPPLEMENT_PRICE;

  closeModal('m-product');
  cart.push({
    id: genId(),
    pid: pid,
    name: productName,
    price: suppCost, // Only supplements are paid
    cat: cat,
    details: details.join(' | '),
    qty: 1,
    isReward: true,
    rewardPalier: palierName
  });
  pendingExtras = {meats:[], sauces:[], crudites:[], supplements:[]};
  updateBadges();
  toast('🎁 '+productName+' ajoute au panier !'+(suppCost>0?' (+'+fmt(suppCost)+' supplements)':''),'success', 4000);
  go('cart');
}

function copyReferral(code) {
  if (navigator.clipboard) {
    navigator.clipboard.writeText(code).then(function(){ toast('Code copie !','success'); });
  } else {
    var el = document.createElement('textarea');
    el.value = code;
    document.body.appendChild(el);
    el.select();
    document.execCommand('copy');
    document.body.removeChild(el);
    toast('Code copie !','success');
  }
}

function maintLogin() {
  var email = (document.getElementById("maint-email").value||"").trim().toLowerCase();
  var pwd = document.getElementById("maint-pwd").value;
  var err = document.getElementById("maint-err");
  db.ref("data/users").once("value").then(function(snap) {
    var usersObj = snap.val() || {};
    var users = Object.values(usersObj);
    var user = users.find(function(u) { return u.email === email && u.pwd === pwd && (u.role === "superadmin" || u.role === "admin"); });
    if (!user) {
      if (err) err.textContent = "Identifiants invalides ou droits insuffisants.";
      return;
    }
    // Connecté en admin → désactiver maintenance et recharger
    db.ref("data/ba_cfg").once("value").then(function(cfgSnap) {
      var cfg = cfgSnap.val() || {};
      cfg.maintenance = false;
      db.ref("data/ba_cfg").set(cfg).then(function() {
        window.location.reload();
      });
    });
  }).catch(function() {
    if (err) err.textContent = "Erreur de connexion.";
  });
}

function requestNotifPermission() {
  if (!window.Notification) return;
  if (Notification.permission === 'default') {
    setTimeout(function(){
      Notification.requestPermission().then(function(perm){
        if (perm === 'granted') {
          toast('Notifications activees ! 🔔','success', 4000);
          registerFCMToken();
        }
      });
    }, 2000);
  } else if (Notification.permission === 'granted') {
    registerFCMToken();
  }
}

function registerFCMToken() {
  if (!messaging) return;
  var user = getCurrentUser();
  if (!user) return;
  messaging.getToken({vapidKey: VAPID_KEY}).then(function(token) {
    if (token) {
      // Save token to Firebase under user
      db.ref('data/users/'+user.id+'/fcmToken').set(token);
      console.log('FCM token registered');
    }
  }).catch(function(e){ console.log('FCM token error:', e); });

  // Handle foreground messages
  messaging.onMessage(function(payload) {
    var n = payload.notification || {};
    toast((n.title||'Break Antillais')+' : '+(n.body||''), 'info', 6000);
    if (navigator.vibrate) navigator.vibrate([300, 100, 300]);
  });
}

function sendPushNotif(title, body) {

function attachClientNotifListener(user) {
  if (!user || !user.id) return;
  var isAdmin = user.role==='superadmin'||user.role==='admin'||user.role==='entreprise';
  if (isAdmin) return;
  console.log('[Notif] Attaching listener for user:', user.id);
  var sessionStart = new Date().toISOString();
  // Remove old listener first
  db.ref('status_updates/'+user.id).off();
  // Attach new listener
  db.ref('status_updates/'+user.id).on('child_added', function(snap) {
    var update = snap.val();
    if (!update || !update.at) { snap.ref.remove(); return; }
    console.log('[Notif] Received update:', update.status, update.title);
    // Show all updates regardless of age when app is open
    if (update.status === 'ready') {
      showOrderReadyAlert({orderNumber: update.orderNumber, id: update.orderId});
      sendPushNotif(update.title, update.body);
    } else if (update.status === 'confirmed' || update.status === 'preparing') {
      toast('📦 '+update.title+' — '+update.body, 'info', 7000);
      sendPushNotif(update.title, update.body);
      if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
    } else if (update.status === 'picked_up') {
      toast('✅ '+update.body, 'success', 5000);
    } else {
      // Message / offre / relance
      toast('📣 '+update.title+' : '+update.body, 'info', 8000);
      sendPushNotif(update.title, update.body);
      if (navigator.vibrate) navigator.vibrate([300, 100, 300]);
    }
    snap.ref.remove();
  });
}

function startCountdown() {
  setInterval(function(){
    var el = document.getElementById('countdown');
    if (!el) return;
    var cfg = getCfg();
    var now = new Date();
    var cp = cfg.cutoff.split(':');
    var cutoff = new Date(); cutoff.setHours(+cp[0],+cp[1],0,0);
    var ms = cutoff - now;
    if (ms <= 0) {
      // Commandes fermees - refresh home
      if (currentScreen === 'home') renderHome();
      return;
    }
    var h = Math.floor(ms/3600000);
    var m = Math.floor((ms%3600000)/60000);
    var s = Math.floor((ms%60000)/1000);
    el.textContent = h>0 ? h+'h'+String(m).padStart(2,'0')+'min' : m>0 ? m+'min '+String(s).padStart(2,'0')+'s' : s+'s';
  }, 1000);
}
