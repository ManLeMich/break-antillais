var _pendingQty = 1;

function changeQty(delta) {
  _pendingQty = Math.max(1, (_pendingQty||1) + delta);
  var el = document.getElementById('prod-qty');
  if (el) el.textContent = _pendingQty;
  updateModalTotalPrice();
  // Vérifier stock et désactiver bouton Ajouter + bouton + si max atteint
  if (!pendingProd) return;
  var stockMax = null;
  if (pendingProd.cat === 'agoulou') {
    var ar = getProducts().find(function(x){ return x.cat==='agoulou' && x.stock !== null && x.stock !== undefined; });
    if (ar) stockMax = ar.stock;
  } else if (pendingProd.stock !== null && pendingProd.stock !== undefined) {
    stockMax = pendingProd.stock;
  }
  if (stockMax === null) return;
  var inCart = pendingProd.cat === 'agoulou'
    ? cart.filter(function(i){return i.cat==='agoulou';}).reduce(function(s,i){return s+(i.qty||1);},0)
    : cart.filter(function(i){return (i.pid||i.id)===pendingProd.id;}).reduce(function(s,i){return s+(i.qty||1);},0);
  var available = Math.max(0, stockMax - inCart);
  // Bouton Ajouter
  var addBtn = document.querySelector('#m-product .btn-primary');
  if (addBtn) {
    if (_pendingQty > available) {
      addBtn.disabled = true;
      addBtn.style.opacity = '.45';
      addBtn.textContent = available === 0 ? 'Épuisé' : 'Max '+available+' disponible'+(available>1?'s':'');
    } else {
      addBtn.disabled = false;
      addBtn.style.opacity = '';
      addBtn.innerHTML = '🛒 Ajouter au panier';
    }
  }
  // Bouton + désactivé si max atteint
  var plusBtn = document.getElementById('qty-plus-btn');
  if (plusBtn) plusBtn.disabled = (_pendingQty >= available);
}

function updateModalTotalPrice() {
  var qty = _pendingQty || 1;
  var basePrice = pendingProd ? (pendingProd._dynamicPrice || pendingProd.price || 0) : 0;
  var suppCost = (pendingExtras.supplements||[]).length * SUPPLEMENT_PRICE;
  var unitPrice = basePrice + suppCost;
  var total = unitPrice * qty;
  var mainPrice = document.getElementById('modal-main-price');
  if (mainPrice && unitPrice > 0) mainPrice.textContent = qty > 1 ? fmt(unitPrice)+' x'+qty+' = '+fmt(total) : fmt(unitPrice);
  var btnPrice = document.getElementById('cart-btn-price');
  if (btnPrice && unitPrice > 0) btnPrice.textContent = fmt(total);
}

function selectClassiqueMeat(btn) {
  document.querySelectorAll('#meat-chips .chip').forEach(function(c){ c.classList.remove('on'); });
  btn.classList.add('on');
  pendingExtras.meats = [btn.dataset.v];
  var price = parseFloat(btn.dataset.price) || 6.50;
  pendingProd._dynamicPrice = price;
  // Update the main price display at top of modal
  var priceEl = document.getElementById('classique-price');
  if (priceEl) priceEl.style.display = 'none';
  updateModalTotalPrice();
}

function toggleSupp(btn) {
  var v = btn.dataset.v;
  if (!pendingExtras.supplements) pendingExtras.supplements = [];
  var idx = pendingExtras.supplements.indexOf(v);
  if (idx >= 0) {
    pendingExtras.supplements.splice(idx, 1);
    btn.classList.remove('on');
  } else {
    pendingExtras.supplements.push(v);
    btn.classList.add('on');
  }
  var count = pendingExtras.supplements.length;
  var suppCost = count * SUPPLEMENT_PRICE;
  // Update supplement total display
  var suppEl = document.getElementById('supp-total');
  if (suppEl) {
    if (count > 0) {
      suppEl.textContent = '+' + count + ' supplement(s) = +' + fmt(suppCost);
      suppEl.style.display = 'block';
    } else {
      suppEl.style.display = 'none';
    }
  }
  // Update main price display
  updateModalTotalPrice();
}

function getMeatCount(p) {
  // Menu enfant agoulou et enfant bokit : 1 viande
  if (p.cat === 'enfant_agoulou') return 1;
  if (p.cat === 'enfant') return 1;
  var n=p.name.toLowerCase();
  if(n.includes('4 viande'))return 4;
  if(n.includes('3 viande'))return 3;
  if(n.includes('2 viande'))return 2;
  if(n.includes('1 viande'))return 1;
  return 0;
}
function toggleMeat(btn, max) {
  var v=btn.dataset.v, idx=pendingExtras.meats.indexOf(v);
  if(idx>=0){pendingExtras.meats.splice(idx,1);btn.classList.remove('on');}
  else if(pendingExtras.meats.length<max){pendingExtras.meats.push(v);btn.classList.add('on');}
  else toast('Maximum '+max+' viande(s)','warning');
}
function toggleSauce(btn) {
  var v = btn.dataset.v;
  var idx = pendingExtras.sauces.indexOf(v);
  if (idx >= 0) {
    pendingExtras.sauces.splice(idx, 1);
    btn.classList.remove('on');
  } else {
    if (pendingExtras.sauces.length >= 3) { toast('Maximum 3 sauces','warning'); return; }
    pendingExtras.sauces.push(v);
    btn.classList.add('on');
  }
}
function toggleCrudite(btn) {
  var v=btn.dataset.v;
  var excl=['Sans crudites','Tout'];
  if(excl.indexOf(v)>=0){
    document.querySelectorAll('#crud-chips .chip').forEach(function(c){c.classList.remove('on');});
    pendingExtras.crudites=[v]; btn.classList.add('on');
  } else {
    excl.forEach(function(o){
      var ob=Array.from(document.querySelectorAll('#crud-chips .chip')).find(function(x){return x.dataset.v===o;});
      if(ob&&ob.classList.contains('on')){ob.classList.remove('on');pendingExtras.crudites=[];}
    });
    var idx=pendingExtras.crudites.indexOf(v);
    if(idx>=0){pendingExtras.crudites.splice(idx,1);btn.classList.remove('on');}
    else{pendingExtras.crudites.push(v);btn.classList.add('on');}
  }
}
function showStockAlert(msg) {
  // Popup d'alerte stock centrée, au-dessus de tout
  var existing = document.getElementById('stock-alert-popup');
  if (existing) existing.remove();
  var popup = document.createElement('div');
  popup.id = 'stock-alert-popup';
  popup.style.cssText = 'position:fixed;inset:0;z-index:999999;display:flex;align-items:center;justify-content:center;padding:1rem;background:rgba(0,0,0,.6);animation:fadeIn .15s ease';
  popup.innerHTML = '<div style="background:var(--dark2);border:2px solid #ef4444;border-radius:14px;padding:1.5rem 1.25rem;max-width:320px;width:100%;text-align:center;animation:slideUp .2s ease">'
    + '<div style="font-size:2rem;margin-bottom:.5rem">⚠️</div>'
    + '<div style="font-family:var(--head);font-size:1rem;font-weight:800;color:#ef4444;margin-bottom:.5rem">Erreur de Stock</div>'
    + '<div style="font-size:.88rem;color:var(--text);line-height:1.5;margin-bottom:1rem">' + msg + '</div>'
    + '<button class="btn btn-primary btn-full" onclick="document.getElementById(\'stock-alert-popup\').remove()">Compris</button>'
    + '</div>';
  document.body.appendChild(popup);
  // Fermer en cliquant en dehors
  popup.addEventListener('click', function(e){ if(e.target===popup) popup.remove(); });
}

function addToCart() {
  if (!pendingProd) return;
  // Anti-double-ajout
  var addBtn = document.querySelector('#m-product .btn-primary');
  if (addBtn && addBtn._adding) return;
  if (addBtn) { addBtn._adding = true; setTimeout(function(){ if(addBtn) addBtn._adding=false; }, 1500); }
  var mc=getMeatCount(pendingProd);
  if(pendingProd.isClassique && pendingExtras.meats.length===0){toast('Choisissez votre viande','warning');return;}
  if(!pendingProd.isClassique && mc>0&&pendingExtras.meats.length<mc){toast('Choisissez '+mc+' viande(s)','warning');return;}
  var details=[];
  if(pendingExtras.meats.length) details.push('Viandes: '+pendingExtras.meats.join(', '));
  if(pendingExtras.sauces.length) details.push('Sauce: '+pendingExtras.sauces.join(', '));
  if(pendingExtras.crudites.length) details.push('Crudites: '+pendingExtras.crudites.join(', '));
  // Supplements
  if (pendingExtras.supplements && pendingExtras.supplements.length > 0) {
    details.push('Suppl: '+pendingExtras.supplements.join(', ')+' (+'+fmt(pendingExtras.supplements.length*SUPPLEMENT_PRICE)+')');
  }
  var suppCost = (pendingExtras.supplements || []).reduce(function(s, mname){
    var mObj = getMeats().find(function(x){ return x.name===mname; });
    return s + (mObj && mObj.supplementPrice ? mObj.supplementPrice : SUPPLEMENT_PRICE);
  }, 0);
  var noteEl = document.getElementById('prod-note');
  var note = noteEl ? noteEl.value.trim() : '';
  if (note) details.push('Note: '+note);
  // Dynamic price for classique
  var finalPrice = (pendingProd._dynamicPrice || pendingProd.price) + suppCost;
  // Box mini bokit validation
  if (pendingProd.cat === 'mini_bokit') {
    var qps = 5;
    var totalPcs = Object.values(_boxQtys||{}).reduce(function(s,v){return s+(v||0)*qps;},0);
    var activeSav = Object.keys(_boxQtys||{}).filter(function(k){return (_boxQtys[k]||0)>0;});
    if (activeSav.length === 0) { toast('Choisissez au moins une saveur','warning'); return; }
    if (totalPcs !== pendingProd.qty) { toast('Completez votre box : '+totalPcs+'/'+pendingProd.qty+' mini bokits','warning'); return; }
    activeSav.forEach(function(k){
      var cnt = _boxQtys[k]||0;
      if(cnt>0) details.push(MINI_SAVEURS[parseInt(k)]+' x'+(cnt*qps)+' pcs');
    });
    _boxQtys = {};
  }
  // Name for classique
  var cartName = pendingProd.name;
  if (pendingProd.isClassique && pendingExtras.meats.length > 0) {
    cartName = 'Bokit '+pendingExtras.meats[0];
  }
  var qtyToAdd = _pendingQty || 1;
  // ── POINT 1 : Vérification stock avant ajout ──
  if (pendingProd.cat === 'agoulou') {
    // Stock partagé agoulou
    var agoulouRef = getProducts().find(function(x){ return x.cat==='agoulou' && x.stock !== null && x.stock !== undefined; });
    var agoulouStock = agoulouRef ? (agoulouRef.stock||0) : null;
    // Compter les agoulou déjà dans le panier
    var inCart = cart.filter(function(i){ return i.cat==='agoulou'; }).reduce(function(s,i){return s+(i.qty||1);},0);
    if (agoulouStock !== null && (inCart + qtyToAdd) > agoulouStock) {
      var reste = Math.max(0, agoulouStock - inCart);
      if (reste === 0) showStockAlert('Désolé, les Agoulous sont épuisés !');
      else showStockAlert('Désolé, il ne reste que '+reste+' Agoulou(s) disponible(s).');
      if (addBtn) addBtn._adding = false;
      return;
    }
  } else if (pendingProd.stock !== null && pendingProd.stock !== undefined) {
    // Stock individuel (boissons etc.)
    var inCartProd = cart.filter(function(i){ return i.pid===pendingProd.id; }).reduce(function(s,i){return s+(i.qty||1);},0);
    if ((inCartProd + qtyToAdd) > pendingProd.stock) {
      var resteProd = Math.max(0, pendingProd.stock - inCartProd);
      if (resteProd === 0) showStockAlert('Désolé, ce produit est épuisé !');
      else showStockAlert('Désolé, il ne reste que '+resteProd+' article(s) disponible(s).');
      if (addBtn) addBtn._adding = false;
      return;
    }
  }
  // Mode commande manuelle admin
  if (_manualOrderMode) {
    for (var qi = 0; qi < qtyToAdd; qi++) {
      _manualCart.push({id:genId(),pid:pendingProd.id,name:cartName,price:finalPrice,cat:pendingProd.cat,details:details.join(' | '),qty:1});
    }
    var qtyMsg2 = qtyToAdd > 1 ? ' x'+qtyToAdd : '';
    toast(cartName+qtyMsg2+' ajouté au panier','success',1500);
    renderManualOrderModal();
    return;
  }
  for (var qi = 0; qi < qtyToAdd; qi++) {
    cart.push({id:genId(),pid:pendingProd.id,name:cartName,price:finalPrice,cat:pendingProd.cat,details:details.join(' | '),qty:1});
  }
  
  closeModal('m-product'); updateBadges();
  setTimeout(function(){
    var b = document.querySelector('#nav-cart .nav-badge');
    if (b) { b.classList.remove('badge-bounce'); void b.offsetWidth; b.classList.add('badge-bounce'); }
  }, 50);
  var qtyMsg = (_pendingQty||1) > 1 ? ' x'+(_pendingQty||1) : '';
  toast(cartName+qtyMsg+' ajoute !','success');
  setTimeout(function(){ showUpsell(pendingProd); }, 500);
}
function showUpsell(p) {
  if(['bokit','crepe_salee','agoulou'].indexOf(p.cat)<0) return;
  var prods=getProducts().filter(function(x){return x.ok&&!x.soon;});
  var sw=prods.filter(function(x){return x.cat==='crepe_sucree';});
  var dr=prods.filter(function(x){return x.cat==='boisson';});
  var sug=[];
  if(sw.length) sug.push(sw[Math.floor(Math.random()*sw.length)]);
  if(dr.length) sug.push(dr[Math.floor(Math.random()*dr.length)]);
  if(!sug.length) return;
  var html='<div class="modal-overlay" onclick="if(event.target===this)closeModal(&apos;m-product&apos;)">'
    +'<div class="modal"><div class="modal-handle"></div><h2 class="modal-title">On vous propose aussi 🤤</h2>'
    +'<div style="display:flex;flex-direction:column;gap:.6rem">';
  sug.forEach(function(s){
    html+='<div style="display:flex;align-items:center;gap:.85rem;padding:.75rem;background:var(--dark3);border-radius:var(--radius-sm);border:1px solid var(--border)">'
      +'<div style="font-size:1.8rem">'+(EMOJI[s.cat]||'🍽')+'</div>'
      +'<div style="flex:1"><div style="font-weight:700;font-size:.88rem">'+s.name+'</div>'
      +'<div style="color:var(--gold);font-family:var(--head);font-weight:800">'+fmt(s.price||0)+'</div></div>'
      +'<button class="btn btn-primary btn-sm" data-sid="'+s.id+'" onclick="quickAdd(this.dataset.sid)">+</button></div>';
  });
  html+='</div><button class="btn btn-secondary btn-full mt-2" onclick="closeModal(&apos;m-product&apos;)">Non merci</button></div></div>';
  var m=document.getElementById('m-product');
  m.innerHTML=html; m.style.display='block';
}
function quickAdd(id) {
  var p=getProducts().find(function(x){return x.id===id;});
  if(!p) return;
  cart.push({id:genId(),pid:p.id,name:p.name,price:p.price,cat:p.cat,details:'',qty:1});
  closeModal('m-product'); updateBadges();
  toast(p.name+' ajoute !','success');
}

// ══════════════════════════════════════════════════════
function renderCart() {
  var sc=document.getElementById('s-cart');
  if(!sc) return;
  if(cart.length===0) {
    sc.innerHTML=header('Panier')+'<div class="empty-state"><div class="icon">🛒</div><div class="title">Panier vide</div><p class="text-sm">Ajoutez des produits depuis le menu</p><button class="btn btn-primary mt-2" onclick="go(\'home\')">Voir le menu</button></div>';
    return;
  }
  var cfg=getCfg();
  var total=cart.reduce(function(s,i){return s+i.price*i.qty;},0);
  var ptsPerEuro = cfg.ptsPerEuro||5;
  var pts=Math.floor(total)*ptsPerEuro + (total>=(cfg.bonusOrderThreshold||20)?(cfg.bonusOrderPts||5):0);
  var html=header('Panier')+'<div style="padding:1rem 1rem 5rem">';
  html+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">'
    +'<span class="font-head fw-800" style="font-size:1.2rem">Mon panier</span>'
    +'<button class="btn btn-danger btn-sm" onclick="clearCart()">🗑 Vider</button></div>';
  cart.forEach(function(item){
    var isReward = item.isReward;
    html+='<div class="cart-item" style="'+(isReward?'background:rgba(45,158,95,.05);border-radius:var(--radius-sm);padding:.6rem':'')+'">'
      +'<div style="font-size:1.8rem;flex-shrink:0">'+(isReward?'🎁':(EMOJI[item.cat]||'🍽'))+'</div>'
      +'<div style="flex:1"><div class="cart-item-name">'+item.name+'</div>'
      +(item.details?'<div class="cart-item-detail">'+item.details+'</div>':'')
      +'</div><div style="display:flex;align-items:center;gap:.65rem">'
      +'<span class="cart-item-price" style="'+(isReward?'color:#2d9e5f':'')+'">'+( isReward?'Offert':fmt(item.price||0))+'</span>'
      +(!isReward?'<button style="width:26px;height:26px;border-radius:50%;background:rgba(212,175,55,.15);border:none;color:var(--gold);cursor:pointer;font-size:.75rem" data-cid="'+item.id+'" onclick="editCartItem(this.dataset.cid)">✏️</button>':'')
      +'<button style="width:26px;height:26px;border-radius:50%;background:rgba(200,35,43,.15);border:none;color:var(--red);cursor:pointer" data-cid="'+item.id+'" onclick="removeFromCart(this.dataset.cid)">✕</button>'
      +'</div></div>';
  });
  html+='<div class="card mt-2">'
    +'<div style="display:flex;justify-content:space-between;align-items:center">'
    +'<span class="font-head fw-800" style="font-size:1.1rem">Total</span>'
    +'<span class="font-head fw-800 text-gold" style="font-size:1.25rem">'+fmt(total)+'</span></div></div>'
    +'<div style="background:rgba(22,101,52,.12);border:1px solid rgba(22,101,52,.3);border-radius:var(--radius);padding:.7rem 1rem;margin-top:.65rem;font-size:.82rem">'
    +'🎁 Cette commande vous rapportera <strong style="color:#2d9e5f">+'+pts+' points</strong></div>'
    +'<button class="btn btn-primary btn-full mt-2" onclick="showCheckout()" style="padding:1rem">Choisir l&apos;heure de retrait →</button>'
    +'</div>';
  sc.innerHTML=html;
}
function clearCart(){
  cart=[];
  updateBadges();
  renderCart();
  toast('Panier vide','info');
}
function removeFromCart(id){cart=cart.filter(function(i){return i.id!==id;});updateBadges();renderCart();}

function editCartItem(id) {
  var item = cart.find(function(i){ return i.id===id; });
  if (!item) return;
  var p = getProducts().find(function(x){ return x.id===item.pid; });
  if (!p) return;
  // Remove from cart then re-open product modal
  cart = cart.filter(function(i){ return i.id!==id; });
  updateBadges();
  openProduct(p.id);
  toast('Modifiez votre selection puis ajoutez au panier','info', 4000);
}

function showCheckout() {
  var u = getCurrentUser();
  var isAdm = u && (u.role==='superadmin'||u.role==='admin'||u.role==='entreprise'||u.role==='preparateur');
  if (window._maintenanceMode && !isAdm) {
    toast(window._maintenanceMsg || 'Commandes momentanément indisponibles.', 'error', 5000);
    return;
  }
  var cfg=getCfg();
  var now=new Date();
  var cp=cfg.cutoff.split(':');
  var cutoff=new Date(); cutoff.setHours(+cp[0],+cp[1],0,0);
  var todayOpen = now < cutoff;
  var dates=[];
  var openDays = cfg.openDays||[2,3,4,5,6];
  var closedDates = cfg.closedDates||[];
  // Commande pour le jour même uniquement
  var dt=new Date();
  var dtStr=dt.toISOString().split('T')[0];
  if (todayOpen
    && openDays.indexOf(dt.getDay()) >= 0
    && !closedDates.find(function(c){return c.date===dtStr;})) {
    dates.push({ value: dtStr, label: 'Aujourd&apos;hui' });
  }

    toast('Les commandes sont fermées pour aujourd\'hui. Revenez demain !', 'error', 5000);
    return;
  }

  var total=cart.reduce(function(s,i){return s+i.price*i.qty;},0);
  _slot=null; _payment=null;

  function buildSlots(date) {
    var slots=getSlots(date,cfg);
    var g='';
    slots.forEach(function(s){
      var slotLabel = s.disabled ? s.time+' (indispo)' : s.time;
      g+='<button class="slot-btn'+(s.ok?'':' full')+'"'
        +(s.ok?' data-t="'+s.time+'" onclick="pickSlot(this)"':' disabled="disabled"')
        +'>'+slotLabel+'</button>';

  var html='<div class="modal-overlay">'
    +'<div class="modal modal-checkout modal-fit-no-scroll" id="checkout-modal">'

    // Header fixe
    +'<div class="checkout-head">'
    +'<div style="width:36px;height:3px;background:var(--border);border-radius:2px;margin:0 auto .75rem"></div>'
    +'<div style="font-family:var(--head);font-size:1.3rem;font-weight:800">Retrait ⏰</div>'
    +'<div style="font-size:.8rem;color:var(--muted);margin-top:.2rem">'+cfg.address+'</div>'
    +'</div>'

    // Zone scrollable
    +'<div class="checkout-body modal-scroll">';

  if (!todayOpen) {
      }

  // Date
  html+='<div style="margin-bottom:.85rem">'
    +'<div style="font-size:.72rem;font-weight:700;color:var(--muted);letter-spacing:.07em;text-transform:uppercase;margin-bottom:.4rem">📅 Date de retrait</div>'
    +'<select class="form-select" id="date-select" onchange="changeDate(this.value)">';
  dates.forEach(function(d){
    html+='<option value="'+d.value+'"'+(d.value===_selDate?' selected':'')+'>'+d.label+'</option>';
  });
  html+='</select></div>';

  // Créneaux
  html+='<div style="margin-bottom:.85rem">'
    +'<div style="font-size:.72rem;font-weight:700;color:var(--muted);letter-spacing:.07em;text-transform:uppercase;margin-bottom:.4rem">⏰ Heure de retrait</div>'
    +'<div class="slot-grid" id="slot-grid">'+buildSlots(_selDate||new Date().toISOString().split('T')[0])+'</div>'
    +'<div id="slot-info" class="text-sm text-muted text-center" style="margin-top:.4rem"></div>'
    +'</div>';

  // Paiement
  html+='<div style="margin-bottom:.5rem">'
    +'<div style="font-size:.72rem;font-weight:700;color:var(--muted);letter-spacing:.07em;text-transform:uppercase;margin-bottom:.6rem">💳 Mode de reglement</div>'
    +'<div style="display:flex;gap:.5rem">'
    +'<div class="pay-opt" id="pay-card" onclick="pickPayment(&apos;card&apos;)" style="flex:1;flex-direction:column;padding:.9rem .5rem;text-align:center;gap:.3rem">'
    +'<span style="font-size:1.6rem">💳</span><div class="fw-700 text-sm">Carte</div></div>'
    +'<div class="pay-opt" id="pay-cash" onclick="pickPayment(&apos;cash&apos;)" style="flex:1;flex-direction:column;padding:.9rem .5rem;text-align:center;gap:.3rem">'
    +'<span style="font-size:1.6rem">💵</span><div class="fw-700 text-sm">Especes</div></div>'
    +'</div></div>'
    +'</div>'  // fin zone scroll

    // Footer fixe
    +'<div class="checkout-foot">'
    +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.7rem">'
    +'<span class="font-head fw-800">Total</span>'
    +'<span class="font-head fw-800 text-gold" style="font-size:1.2rem">'+fmt(total)+'</span>'
    +'</div>'
    +'<button class="btn btn-primary btn-full" id="confirm-btn" onclick="confirmOrder()" disabled style="padding:.95rem;font-size:1rem">Valider la commande</button>'
    +'<button class="btn btn-secondary btn-full mt-1" onclick="closeModal(&apos;m-product&apos;)" style="padding:.7rem">Annuler</button>'

function getSlots(date,cfg) {
  if (!cfg || !cfg.start || !cfg.end) return [];
  var sp=cfg.start.split(':'),ep=cfg.end.split(':');
  var sh=+sp[0],sm=+sp[1],eh=+ep[0],em=+ep[1];
  var max=cfg.maxSlot||8;
  var orders=getOrders().filter(function(o){return o.pickupDate===date&&o.status!=='cancelled';});
  var slots=[];
  while(sh*60+sm<=eh*60+em){
    var t=(sh<10?'0':'')+sh+':'+(sm<10?'0':'')+sm;
    // Count total items (not orders) for this slot
    var itemCount=0;
    orders.filter(function(o){return o.pickupTime===t;}).forEach(function(o){
      itemCount+=(o.items||[]).reduce(function(s,i){return s+1;},0);
    });
    var disabled = (cfg.disabledSlots||[]).indexOf(t)>=0;
    slots.push({time:t,count:itemCount,ok:!disabled&&itemCount<max,disabled:disabled});
    sm+=30; if(sm>=60){sh++;sm-=60;}
  }
  return slots;
}

// Find next available slot for a given item count
function findNextAvailableSlot(date, itemCount, cfg) {
  var slots = getSlots(date, cfg);
  var max = cfg.maxSlot||8;
  for (var i=0; i<slots.length; i++) {
    if (slots[i].count + itemCount <= max) return slots[i].time;
  }
  return null;
}
function pickSlot(btn){
  document.querySelectorAll('.slot-btn').forEach(function(b){b.classList.remove('on');});
  btn.classList.add('on'); _slot=btn.dataset.t;
  var itemCount = cart.reduce(function(s,i){return s+1;},0);
  var cfg = getCfg();
  var date = window._selectedDate||new Date().toISOString().split('T')[0];
  var slots = getSlots(date, cfg);
  var slotData = slots.find(function(s){return s.time===_slot;});
  var info = document.getElementById('slot-info');
  if (info) {
    var remaining = (cfg.maxSlot||8) - (slotData?slotData.count:0);
    if (slotData && slotData.count + itemCount > (cfg.maxSlot||8)) {
      // Suggest next slot
      var next = findNextAvailableSlot(date, itemCount, cfg);
      info.innerHTML = '<span style="color:#f59e0b">⚠️ Ce creneau sera plein avec votre commande ('+(slotData.count+itemCount)+' articles).'+(next?' <button class="btn btn-sm" style="background:rgba(200,35,43,.2);color:var(--red);border:none;cursor:pointer;font-size:.78rem" onclick="autoSelectSlot(&quot;'+next+'&quot;)">→ Prendre '+next+' a la place</button>':'')+'</span>';
    } else {
      info.textContent = '';
    }
  }
  checkReady();
}

function autoSelectSlot(time) {
  var btn = Array.from(document.querySelectorAll('.slot-btn')).find(function(b){return b.dataset.t===time;});
  if (btn) pickSlot(btn);
}
function pickPayment(m){
  document.querySelectorAll('.pay-opt').forEach(function(b){b.classList.remove('on');});
  document.getElementById('pay-'+m).classList.add('on'); _payment=m;
  checkReady();
}
function checkReady(){
  var b=document.getElementById('confirm-btn');
  if(b) b.disabled=!(_slot&&_payment);
}
// ══ ANTI DOUBLE-CLIC ══
function btnLoading(btn, loadingText) {
  if (!btn) return;
  btn.disabled = true;
  btn._origText = btn.innerHTML;
  btn.innerHTML = loadingText || '⏳ ...';
  btn.style.opacity = '.7';
}
function btnReset(btn) {
  if (!btn) return;
  btn.disabled = false;
  if (btn._origText) btn.innerHTML = btn._origText;
  btn.style.opacity = '';
}

function confirmOrder(){
  var confirmBtn = document.getElementById('confirm-btn');
  if (confirmBtn && confirmBtn._loading) return;
  var user = getCurrentUser();
  if (!user||!_slot||!_payment) { toast('Sélectionnez un créneau et un mode de paiement','warning'); return; }

  console.log('[BA] Etape 0 : vérification stock...');

  // Vérif stock Firebase AVANT de bloquer le bouton
  db.ref('data/ba_products').once('value').then(function(snapProds){
    var freshProds = snapProds.val();
    if (freshProds) {
      var freshArr = Array.isArray(freshProds) ? freshProds : Object.values(freshProds).filter(function(x){return x&&x.id;});
      var stockError = null;
      var agoulouQtyCart = cart.filter(function(i){return i.cat==='agoulou';}).reduce(function(s,i){return s+(i.qty||1);},0);
      if (agoulouQtyCart > 0) {
        var fa = freshArr.find(function(p){return p.cat==='agoulou'&&p.stock!==null&&p.stock!==undefined;});
        if (fa && agoulouQtyCart > fa.stock) {
          stockError = 'Il ne reste que '+fa.stock+' Agoulou(s) disponible(s).';
          var excess = agoulouQtyCart - fa.stock;
          for (var ri = cart.length-1; ri >= 0 && excess > 0; ri--) { if(cart[ri].cat==='agoulou'){cart.splice(ri,1);excess--;} }
        }
      }

      if (!stockError) {
        var byPid = {};
        cart.forEach(function(i){ byPid[i.pid||i.id]=(byPid[i.pid||i.id]||0)+(i.qty||1); });
        Object.keys(byPid).forEach(function(pid){
          var fp = freshArr.find(function(p){return p.id===pid;});
          if (fp&&fp.stock!==null&&fp.stock!==undefined&&byPid[pid]>fp.stock)
            if (!stockError) stockError='Le stock de "'+fp.name+'" a changé : il ne reste que '+fp.stock+' article(s).';
        });
      }
      if (stockError) {
        console.log('[BA] Etape 0 ECHEC :', stockError);
        updateBadges();
        showStockAlert(stockError);
        return;
      }
    }
    console.log('[BA] Etape 1 : stock OK, lancement commande');
    // Stock OK → bloquer bouton + timer sécurité 8s
    btnLoading(confirmBtn, '⏳ Validation...');
    confirmBtn && (confirmBtn._loading = true);
    var safetyTimer = setTimeout(function(){
      console.warn('[BA] Sécurité : timeout 8s → déblocage bouton');
      btnReset(confirmBtn);
      if (confirmBtn) confirmBtn._loading = false;
    }, 8000);
    _doConfirmOrder(confirmBtn, safetyTimer);
  }).catch(function(e){
    console.log('[BA] Etape 0 : Firebase inaccessible, on continue', e);
    btnLoading(confirmBtn, '⏳ Validation...');
    confirmBtn && (confirmBtn._loading = true);
    var safetyTimer = setTimeout(function(){
      btnReset(confirmBtn);
      if (confirmBtn) confirmBtn._loading = false;
    }, 8000);
    _doConfirmOrder(confirmBtn, safetyTimer);
  });
}

function _doConfirmOrder(confirmBtn, safetyTimer) {
  console.log('[BA] Etape 2 : _doConfirmOrder démarrée');
  try {
    var user = getCurrentUser();
    var cfg = getCfg();
    var today = window._selectedDate||new Date().toISOString().split('T')[0];
    var total = cart.reduce(function(s,i){return s+i.price*i.qty;},0);
    var orders = getOrders();
    var num = String(orders.length+1).padStart(4,'0');
    var discount = _selectedReduction ? (_selectedReduction.discount||0) : 0;
    var finalTotal = Math.max(0, total - discount);
    // Mark promo as used
    if (_selectedReduction && _selectedReduction.type === 'promo') {
      var promos = load('ba_promos', []);
      var pi = promos.findIndex(function(p){ return p.id === _selectedReduction.promoId; });
      if (pi >= 0) { promos[pi].used = true; save('ba_promos', promos); }
    }
    var order = {
      id:genId(), orderNumber:num, userId:user.id, userPrenom:user.prenom, userPhone:user.phone,
      items:cart.slice(), total:finalTotal, originalTotal:total,
      pointsDiscount:_selectedReduction?_selectedReduction.pts:0,
      discountLabel:_selectedReduction?_selectedReduction.label:null,
      pickupDate:today, pickupTime:_slot,
      payment:_payment==='card'?'Carte':'Especes',
      status:'pending', createdAt:new Date().toISOString(), pointsAwarded:false
    };
    // Deduct points if reduction used
    if (_selectedReduction) {
      user.points = Math.max(0, (user.points||0) - _selectedReduction.pts);
      var hist = load('ba_pts_history_'+user.id, []);
      hist.unshift({pts:-_selectedReduction.pts, label:'Reduction utilisee: '+_selectedReduction.label, at:new Date().toISOString()});
      save('ba_pts_history_'+user.id, hist);
      saveUser(user);
      _selectedReduction = null;
    }
    // Deduct palier points
    var rewardItem = cart.find(function(i){ return i.isReward && i.rewardPalier; });
    if (rewardItem) {
      var paliers = load('ba_paliers', PALIERS);
      var rewardPal = paliers.find(function(p){ return p.name === rewardItem.rewardPalier; });
      if (rewardPal) {
        var palPts = rewardPal.pts || rewardPal.min || 0;
        if (palPts > 0) {
          user.points = Math.max(0, (user.points||0) - palPts);
          var rHist = load('ba_pts_history_'+user.id, []);
          rHist.unshift({pts:-palPts, label:'Recompense palier '+rewardItem.rewardPalier+' utilisee', at:new Date().toISOString()});
          save('ba_pts_history_'+user.id, rHist);
          db.ref('data/users/'+user.id+'/points').set(user.points);
          saveUser(user);
        }
      }
    }
    console.log('[BA] Etape 3 : commande N°'+num+' créée, sauvegarde...');
    saveOrder(order);
    db.ref('data/ba_orders/'+order.id).set(order);
    // Déduire le stock
    (function(){
      var prods = getProducts();
      var changed = false;
      var agoulouQty = 0;
      order.items.forEach(function(item){
        var p = prods.find(function(x){ return x.id===(item.pid||item.id); });
        if (!p) return;
        if (p.cat === 'agoulou') {
          agoulouQty += (item.qty||1);
        } else if (p.stock !== null && p.stock !== undefined) {
          var qty = item.qty||1;
          p.stock = Math.max(0, p.stock - qty);
          if (p.stock === 0) p.ok = false;
          saveProduct(p);
          db.ref('data/ba_products/'+p.id).update({stock:p.stock, ok:p.ok});
          changed = true;
        }
      });
      if (agoulouQty > 0) {
        var agoulousAll = prods.filter(function(p){ return p.cat==='agoulou'; });
        var stockRef = null;
        agoulousAll.forEach(function(p){ if (p.stock!==null&&p.stock!==undefined) stockRef=p; });
        if (stockRef) {
          var newStock = Math.max(0, stockRef.stock - agoulouQty);
          agoulousAll.forEach(function(p){
            p.stock = newStock;
            if (newStock===0) p.ok = false;
            saveProduct(p);
            db.ref('data/ba_products/'+p.id).update({stock:newStock, ok:p.ok});
          });
          changed = true;
        }
      }
      if (changed) renderHome();
    })();
    // Vider le panier et fermer la modale
    cart = [];
    try { localStorage.removeItem('_ba_cart'); } catch(e) {}
    // ── Débloquer le bouton AVANT de fermer la modale ──
    if (safetyTimer) clearTimeout(safetyTimer);
    btnReset(confirmBtn);
    if (confirmBtn) confirmBtn._loading = false;
    console.log('[BA] Etape 4 : bouton débloqué, fermeture modale');
    closeModal('m-product');
    updateBadges();
    // Passer en confirmed après 2s
    setTimeout(function(){
      order.status = 'confirmed';
      saveOrder(order);
      db.ref('data/ba_orders/'+order.id).set(order).catch(function(e){ console.warn('FB confirmOrder:',e); });
      notify(user.id,'✅ Commande confirmee !','Votre commande est confirmee. Retrait a '+_slot+'.');
    }, 2000);
    // Email + modale de confirmation
    sendOrderEmail(order, user, cfg);
    console.log('[BA] Etape 5 : commande terminée avec succès ✅');
    showOrderConfirm(order, cfg);
  } catch(err) {
    console.error('[BA] ERREUR _doConfirmOrder:', err);
    if (safetyTimer) clearTimeout(safetyTimer);
    btnReset(confirmBtn);
    if (confirmBtn) confirmBtn._loading = false;
    toast("Erreur réseau, votre commande n'a pas pu être prise en compte. Veuillez réessayer ou nous contacter via WhatsApp.", 'error', 8000);
  }
}


function sendOrderEmail(order, user, cfg) {
  try {
    if (typeof emailjs === 'undefined') { console.log('EmailJS not loaded'); return; }
    var itemsList = (order.items||[]).map(function(i){
      return '- ' + i.name + (i.details ? ' (' + i.details + ')' : '') + ' : ' + i.price.toFixed(2) + 'EUR';
    }).join('\n');
    var pickupDate = new Date(order.pickupDate).toLocaleDateString('fr-FR', {
      weekday:'long', day:'numeric', month:'long'
    });
    var templateParams = {
      email: user.email,
      client_name: user.prenom,
      order_number: order.orderNumber,
      items: itemsList,
      total: order.total.toFixed(2) + 'EUR',
      pickup_date: pickupDate,
      pickup_time: order.pickupTime,
      payment: order.payment,
      address: cfg.address
    };
    emailjs.send(EMAILJS_SERVICE, EMAILJS_TEMPLATE, templateParams)
      .then(function() {
        console.log('Email envoye avec succes');
        toast('Email de confirmation envoye ! 📧', 'success', 4000);
      })
      .catch(function(e) {
        console.log('EmailJS error:', e);
      });
  } catch(e) { console.log('Email error:', e); }
}

function showOrderConfirm(order,cfg){
  var pts=Math.floor(order.total)*(cfg.ptsPerEuro||5);
  var html='<div class="modal-overlay"><div class="modal">'
    +'<div style="text-align:center;font-size:3rem;margin-bottom:.5rem">🎉</div>'
    +'<h2 class="modal-title text-center">Commande confirmee !</h2>'
    +'<div class="card mb-2" style="background:rgba(16,185,129,.07);border-color:rgba(16,185,129,.25)">'
    +'<div class="fw-700 mb-1">Commande confirmée !</div>'
    +'<div class="text-sm">'+(order.items||[]).map(function(i){return i.name;}).join(', ')+'</div>'
    +'<div class="divider"></div>'
    +'<div style="display:flex;justify-content:space-between"><span class="text-muted text-sm">Retrait</span><span class="fw-700">'+order.pickupTime+'</span></div>'

function renderOrders(){
  var sc=document.getElementById('s-orders');
  if(!sc) return;
  var user=getCurrentUser();
  if(!user){
    sc.innerHTML=header('Commandes')+'<div class="empty-state"><div class="icon">📦</div><div class="title">Mes commandes</div><p class="text-sm">Connectez-vous pour voir vos commandes</p><button class="btn btn-primary mt-2" onclick="showLogin()">Se connecter</button></div>';
    return;
  }
  var orders=getOrders().filter(function(o){return o.userId===user.id;});
  var cfg=getCfg();
  var html=header('Commandes')+'<div style="padding:1rem 1rem 5rem">';
  var active=orders.filter(function(o){return ['pending','confirmed','preparing','ready'].indexOf(o.status)>=0;});
  // Historique trié du plus récent au plus ancien
  var done=orders.filter(function(o){return o.status==='picked_up'||o.status==='cancelled';});
  done.sort(function(a,b){return new Date(b.createdAt)-new Date(a.createdAt);});
  if(active.length>0){
    html+='<div class="sec-title">En cours ('+active.length+')</div>';
    active.forEach(function(o){html+=orderCard(o);});
  }
  if(done.length>0){
    html+='<div class="sec-title" style="margin-top:1.5rem">Historique ('+done.length+')</div>';
    done.forEach(function(o){ if (o && o.id) html+=orderCard(o); });
  }
  if(orders.length===0){
    html+='<div class="empty-state" style="padding:2.5rem 0"><div class="icon">📭</div><div class="title">Aucune commande</div><p class="text-sm">Passez votre premiere commande !</p></div>';
  }
  // Écouter les changements en temps réel sur les commandes actives
  active.forEach(function(o){
    db.ref('data/ba_orders/'+o.id).on('value', function(snap){
      var updated = snap.val();
      if (!updated) return;
      // Mettre à jour localStorage
      var ords = getOrders();
      var idx2 = ords.findIndex(function(x){ return x && x.id === updated.id; });
      if (idx2 >= 0) ords[idx2] = updated; else ords.push(updated);
      try { localStorage.setItem('_ba_ba_orders', JSON.stringify(ords)); } catch(e) {}
      // Rafraîchir uniquement si on est sur l'écran commandes
      if (currentScreen === 'orders') {
        console.log('[BA] Mise à jour temps réel commande N°'+updated.orderNumber+' statut:', updated.status);
        renderOrders();
      }
    });
  });
  // Historique complet des points
  var ptsHist = load('ba_pts_history_'+user.id, []);
  if (ptsHist.length > 0) {
    html += '<div class="sec-title" style="margin-top:1.75rem">Historique des points</div>';
    html += '<div class="card" style="padding:.5rem .75rem">';
    ptsHist.forEach(function(h){
      var isPos = h.pts >= 0;
      var dateStr = h.at ? new Date(h.at).toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit',year:'numeric'}) : '';
      html += '<div style="display:flex;justify-content:space-between;align-items:center;padding:.35rem 0;border-bottom:1px solid var(--border);font-size:.82rem">'
        +'<div><div style="font-weight:600">'+h.label+'</div><div style="font-size:.72rem;color:var(--muted)">'+dateStr+'</div></div>'
        +'<span style="font-weight:800;color:'+(isPos?'#10b981':'#ef4444')+';white-space:nowrap">'+(isPos?'+':'')+h.pts+' pts</span>'
        +'</div>';
    });
    html += '</div>';
  }
  html+='</div>';
  sc.innerHTML=html;
}
function clientSignalPresence(orderId, btn) {
  if (btn) { btn.disabled = true; btn.textContent = "⏳ Envoi..."; }
  // 1. Mettre à jour Firebase
  db.ref("data/ba_orders/" + orderId + "/clientPresent").set(true)
    .then(function() {
      // 2. Mettre à jour localStorage
      var orders = getOrders();
      var o = orders.find(function(x){ return x.id === orderId; });
      if (o) {
        o.clientPresent = true;
        try { localStorage.setItem("_ba_ba_orders", JSON.stringify(orders)); } catch(e) {}
      }
      // 3. Feedback visuel immédiat
      if (btn) {
        btn.textContent = "✅ Signalé ! L'équipe a été prévenue.";
        btn.style.background = "rgba(16,185,129,.1)";
        btn.style.borderColor = "#10b981";
        btn.style.color = "#10b981";
      }
      toast("Votre présence a été signalée ! 📍", "success", 4000);
      // 4. Notifier les admins via status_updates
      var admins = getUsers().filter(function(u){ return u.role==="superadmin"||u.role==="admin"||u.role==="preparateur"; });
      var clientName = (getUsers().find(function(u){ return u.id===(o&&o.userId); })||{}).prenom || (o&&o.userPrenom) || "Client";
      admins.forEach(function(a){
        db.ref("status_updates/" + a.id + "/presence-" + orderId).set({
          status: "client_present",
          orderId: orderId,
          orderNumber: o ? o.orderNumber : "",
          title: "📍 " + clientName + " est arrivé !",
          body: "Le client est au point de retrait.",
          at: new Date().toISOString()
        });
      });
    })
    .catch(function(e) {
      if (btn) { btn.disabled = false; btn.textContent = "📍 Je suis arrivé au point de retrait"; }
      toast("Erreur, veuillez réessayer.", "error");
    });
}

function clientCancelOrder(orderId) {
  // Chercher la commande
  var o = getOrders().find(function(x){ return x.id === orderId; });
  if (!o) { toast('Commande introuvable', 'error'); return; }
  if (o.status !== 'pending' && o.status !== 'confirmed') {
    toast('Cette commande ne peut plus être annulée', 'warning'); return;
  }
  // Modale de confirmation
  var m = document.getElementById('m-product');
  var itemsList = (o.items||[]).map(function(i){ return '• '+i.name; }).join('<br>');
  m.innerHTML = '<div class="modal-overlay" onclick="if(event.target===this)closeModal(&apos;m-product&apos;)">'
    + '<div class="modal"><div class="modal-handle"></div>'
    + '<div style="text-align:center;margin-bottom:.75rem"><div style="font-size:2.5rem">❌</div>'
    + '<h2 class="modal-title">Annuler la commande ?</h2></div>'
    + '<div style="background:var(--dark3);border-radius:var(--radius);padding:.75rem 1rem;margin-bottom:1rem;font-size:.85rem;line-height:1.7">'

    + '<button class="btn btn-full mb-1" style="background:#ef4444;color:#fff;border:none" data-oid="'+o.id+'" onclick="clientConfirmCancel(this.dataset.oid)">Oui, annuler ma commande</button>'

function clientConfirmCancel(orderId) {
  db.ref('data/ba_orders/'+orderId).once('value').then(function(snap){
    var o = snap.val();
    if (!o) { o = getOrders().find(function(x){ return x.id===orderId; }); }
    if (!o) { toast('Commande introuvable', 'error'); return; }
    o.status = 'cancelled';
    o.cancelReason = 'Annulée par le client';
    o.cancelledAt = new Date().toISOString();
    saveOrder(o);
    // Remettre le stock des produits commandés
    var prods = getProducts();
    var agoulouQty = 0;
    (o.items||[]).forEach(function(item){
      var p = prods.find(function(x){ return x.id===(item.pid||item.id); });
      if (!p) return;
      if (p.cat === 'agoulou') {
        agoulouQty += (item.qty||1);
      } else if (p.stock !== null && p.stock !== undefined) {
        p.stock = p.stock + (item.qty||1);
        p.ok = true;
        saveProduct(p);
        db.ref('data/ba_products/'+p.id).update({stock: p.stock, ok: true});
      }
    });
    // Remettre stock agoulou partagé
    if (agoulouQty > 0) {
      var agoulousAll = prods.filter(function(p){ return p.cat==='agoulou'; });
      var stockRef = agoulousAll.find(function(p){ return p.stock !== null && p.stock !== undefined; });
      if (stockRef) {
        var newStock = (stockRef.stock||0) + agoulouQty;
        agoulousAll.forEach(function(p){
          p.stock = newStock;
          p.ok = newStock > 0;
          saveProduct(p);
          db.ref('data/ba_products/'+p.id).update({stock: newStock, ok: p.ok});
        });
      }
    }

    closeModal('m-product');
    toast('Commande annulée.', 'info', 4000);
    // Notifier l'admin
    var adminUsers = getUsers().filter(function(u){ return u.role==='superadmin'||u.role==='admin'; });
    adminUsers.forEach(function(a){ notify(a.id, '❌ Commande annulée', 'Le client '+o.userPrenom+' a annulé sa commande N°'+o.orderNumber+'.'); });
    renderOrders();
  }).catch(function(e){ toast('Erreur: '+e.message, 'error'); });
}

function orderCard(o){
  console.log("[BA] orderCard statut:", o.status, "| clientPresent:", o.clientPresent, "| N°"+o.orderNumber);
  var st=STATUTS[o.status]||STATUTS.pending;
  var steps=['confirmed','preparing','ready','picked_up'];
  var stepL={confirmed:'Confirmee',preparing:'En prep.',ready:'Prete',picked_up:'Recuperee'};
  var cur=steps.indexOf(o.status);
  var html='<div class="card mb-2">'
    +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.65rem">'
    +'<span class="font-head fw-800">Ma commande</span>'
    +'<span class="status-badge" style="background:'+st.color+'22;color:'+st.color+'">'+st.icon+' '+st.label+'</span></div>'
    +'<div class="text-sm text-muted mb-1">'+new Date(o.createdAt).toLocaleDateString('fr-FR',{day:'numeric',month:'long',hour:'2-digit',minute:'2-digit'})+'</div>'
    +'<div style="margin:.4rem 0">'+(o.items||[]).map(function(it,idx){
      var s = o.itemsStatus && o.itemsStatus[idx];
      var dot = s==='done'?'<span style="color:#10b981">✓</span>':o.status==='picked_up'?'<span style="color:#6b7280">✓</span>':o.status==='preparing'&&idx===0&&!s?'<span style="color:#3b82f6">~</span>':'<span style="color:#6b7280">○</span>';
      var detailHtml = '';
      if (it.details) {
        it.details.split('|').forEach(function(d){ d=d.trim(); if(d) detailHtml += '<div style="font-size:.72rem;color:var(--muted);padding-left:.9rem">→ '+d+'</div>'; });
      }
      return '<div style="padding:.15rem 0"><div style="font-size:.82rem">'+dot+' '+it.name+'</div>'+detailHtml+'</div>';
    }).join('')+'</div>'
    +'<div class="text-sm fw-700 text-gold">'+fmt(o.total||0)+' · '+o.payment+'</div>'
    +'<div class="text-sm mt-1">⏰ Retrait a '+o.pickupTime+'</div>';
  if(cur>=0){
    html+='<div style="display:flex;margin-top:.85rem;overflow-x:auto">';
    steps.forEach(function(s,i){
      html+='<div style="flex:1;text-align:center;min-width:60px">'
        +'<div style="width:24px;height:24px;border-radius:50%;background:'+(i<=cur?'var(--red)':'var(--dark4)')+';border:2px solid '+(i<=cur?'var(--red)':'var(--border)')+';margin:0 auto;display:flex;align-items:center;justify-content:center;font-size:.7rem;color:#fff">'
        +(i<=cur?'✓':'')+'</div>'
        +'<div style="font-size:.6rem;color:'+(i<=cur?'var(--text)':'var(--muted)')+';margin-top:.2rem;line-height:1.2">'+stepL[s]+'</div></div>';
    });
    html+='</div>';
  }
  if(o.pointsAwarded){
    var cfg2=getCfg();
    var earnedPts=Math.floor(o.total)*(cfg2.ptsPerEuro||5);
    var bonus=o.total>=(cfg2.bonusOrderThreshold||20)?(cfg2.bonusOrderPts||5):0;
    html+='<div class="text-sm mt-1" style="color:#2d9e5f">+'+( earnedPts+bonus)+' pts gagnés'+( bonus>0?' (dont +'+bonus+' bonus)':'')+'</div>';
  }
  if(o.status==='picked_up'||o.status==='cancelled'){
    html+='<button class="btn btn-secondary btn-sm btn-full mt-2" data-oid="'+o.id+'" onclick="reorder(this.dataset.oid)">🔄 Recommander la même chose</button>';
  }
  // Annulation possible seulement si pending ou confirmed
  if(o.status==='pending'||o.status==='confirmed'){
    html+='<button class="btn btn-sm btn-full mt-2" style="background:rgba(239,68,68,.12);border:1px solid #ef4444;color:#ef4444" data-oid="'+o.id+'" onclick="clientCancelOrder(this.dataset.oid)">❌ Annuler ma commande</button>';
  }
  // Bouton présence : visible uniquement si statut 'ready'
  if(o.status==='ready'){
    if(o.clientPresent){
      html+='<button class="btn btn-sm btn-full mt-2" disabled style="background:rgba(16,185,129,.1);border:1px solid #10b981;color:#10b981;opacity:.8">✅ Signalé ! L\'équipe a été prévenue.</button>';
    } else {
      html+='<button class="btn btn-primary btn-sm btn-full mt-2" data-oid="'+o.id+'" onclick="clientSignalPresence(this.dataset.oid,this)">📍 Je suis arrivé au point de retrait</button>';
    }
  }
  html+='</div>';
  return html;
}

function buildMsgCreneauSection() {
  var today = new Date().toISOString().split('T')[0];
  var cfg = getCfg();
  var slots = getSlots(today, cfg);
  if (!slots.length) return '<div class="text-sm text-muted">Aucun creneau aujourd\'hui</div>';
  var html = '<div class="card" style="padding:.75rem">';
  html += '<div class="form-group"><label class="form-label">Creneau</label><select class="form-select" id="msg-slot-select">';
  slots.forEach(function(s){ html += '<option value="'+s.time+'">'+s.time+' ('+s.count+' cmd)</option>'; });
  html += '</select></div>';
  html += '<div class="form-group"><label class="form-label">Message</label>';
  html += '<textarea class="form-input" id="msg-slot-text" rows="2" placeholder="Ex: Votre commande est prete !" style="resize:none"></textarea></div>';
  html += '<button class="btn btn-primary btn-sm btn-full" onclick="sendMsgToCreneau()">Envoyer a ce creneau</button>';
  html += '</div>';
  return html;
}

function sendMsgToCreneau() {
  var slot = document.getElementById('msg-slot-select') ? document.getElementById('msg-slot-select').value : '';
  var msg = document.getElementById('msg-slot-text') ? document.getElementById('msg-slot-text').value.trim() : '';
  if (!slot || !msg) { toast('Remplissez creneau et message','error'); return; }
  var today = new Date().toISOString().split('T')[0];
  var orders = getOrders().filter(function(o){
    return o.pickupDate===today && o.pickupTime===slot && ['pending','confirmed','preparing','ready'].indexOf(o.status)>=0;
  });
  if (!orders.length) { toast('Aucun client actif sur ce creneau','info'); return; }
  orders.forEach(function(o){ notify(o.userId, 'Break Antillais', msg); });
  toast('Message envoye a '+orders.length+' client(s) !','success');
  var el = document.getElementById('msg-slot-text');
  if(el) el.value = '';
}

        + '</div>'
        + '<div style="max-height:300px;overflow-y:auto">';
      orders.sort(function(a,b){ return new Date(b.createdAt)-new Date(a.createdAt); }).forEach(function(o) {
        var statColor = o.status==='picked_up'?'#10b981':o.status==='cancelled'?'#ef4444':'#f59e0b';

      });

  }).catch(function(e) {
    var el = document.getElementById('archive-content');
    if (el) el.innerHTML = '<p class="text-sm" style="color:#ef4444">Erreur: ' + e.message + '</p>';
  });

function recoverOrdersFromBackup() {
  toast('Récupération en cours...', 'info', 2000);
  // Lire depuis archive (source la plus fiable)
  db.ref('data/ba_safe').once('value').then(function(snap) {
    var v = snap.val();
    var archiveOrders = v ? (Array.isArray(v) ? v : Object.values(v).filter(function(x){ return x && x.id; })) : [];
    // Lire aussi depuis journal (toutes les dates)
    db.ref('data/ba_journal').once('value').then(function(jsnap) {
      var jv = jsnap.val() || {};
      var journalOrders = [];
      Object.values(jv).forEach(function(day){
        if (!day) return;
        Object.values(day).forEach(function(o){ if (o && o.id) journalOrders.push(o); });
      });
      // Fusionner archive + journal
      var all = {};
      archiveOrders.forEach(function(o){ all[o.id] = o; });
      journalOrders.forEach(function(o){ if (!all[o.id]) all[o.id] = o; });
      var allOrders = Object.values(all);
      if (!allOrders.length) { toast('Aucune commande dans les archives', 'error'); return; }
      // Restaurer dans data/ba_orders
      var updates = {};
      allOrders.forEach(function(o){ if (o && o.id) updates[o.id] = o; });
      db.ref('data/ba_orders').update(updates).then(function(){
        // Mettre à jour localStorage
        var existing = getOrders();
        allOrders.forEach(function(o){
          var i = existing.findIndex(function(x){ return x && x.id === o.id; });
          if (i >= 0) existing[i] = o; else existing.push(o);
        });

// ══ PROTECTION DONNÉES ══
// Snapshot automatique toutes les 5 minutes dans data/snapshot/latest
// + double-write sur chaque sauvegarde critique

function snapshotAll() {
  try {
    var users   = getUsers();
    var orders  = getOrders();
    var prods   = getProducts();
    var cfg     = getCfg();
    var meats   = getMeats();
    var sauces  = getSauces();
    var paliers = load('ba_paliers', []);

    // Snapshot complet dans Firebase sous data/snapshot/latest
    var snap = {
      at: new Date().toISOString(),
      ba_users: users,
      ba_orders: orders,
      ba_products: prods,
      ba_cfg: cfg,
      ba_meats: meats,
      ba_sauces: sauces,
      ba_paliers: paliers
    };
    db.ref('data/snapshot/latest').set(snap).catch(function(e){ console.warn('snapshot:', e); });

    // Snapshot daté (gardé 7 jours) — clé = date du jour
    var dateKey = new Date().toISOString().split('T')[0];
    db.ref('data/snapshot/'+dateKey).set(snap).catch(function(e){});

    console.log('[BA] Snapshot sauvegardé', new Date().toLocaleTimeString('fr-FR'));
  } catch(e) { console.warn('snapshotAll error:', e); }
}

function restoreFromSnapshot() {
  toast('Restauration en cours...', 'info', 2000);
  db.ref('data/snapshot/latest').once('value').then(function(snap) {
    var d = snap.val();
    if (!d) {
      // Essayer depuis ba_safe + ba_journal
      recoverOrdersFromBackup();
      return;
    }
    var restored = 0;
    // Restaurer commandes (fusion)
    if (d.ba_orders && Array.isArray(d.ba_orders) && d.ba_orders.length) {
      var existing = getOrders();
      d.ba_orders.forEach(function(o){
        if (!o || !o.id) return;
        var i = existing.findIndex(function(x){ return x && x.id === o.id; });
        if (i >= 0) existing[i] = o; else existing.push(o);
        db.ref('data/ba_orders/'+o.id).set(o).catch(function(e){});
      });
      try { localStorage.setItem('_ba_ba_orders', JSON.stringify(existing)); } catch(e) {}
      restored += d.ba_orders.length;
    }
    // Restaurer utilisateurs
    if (d.ba_users && Array.isArray(d.ba_users) && d.ba_users.length) {
      d.ba_users.forEach(function(u){ if (u && u.id) db.ref('data/users/'+u.id).set(u).catch(function(e){}); });
      try { localStorage.setItem('_ba_ba_users', JSON.stringify(d.ba_users)); } catch(e) {}
    }
    // Restaurer produits
    if (d.ba_products && Array.isArray(d.ba_products) && d.ba_products.length) {
      try { localStorage.setItem('_ba_ba_products', JSON.stringify(d.ba_products)); } catch(e) {}
    }
    toast('✅ Restauration terminée — '+restored+' commandes récupérées', 'success', 6000);
    var ac = document.getElementById('admin-content');
    if (ac) ac.innerHTML = adminOrders();
  }).catch(function(e){ toast('Erreur: '+e.message, 'error'); });
}

function startSnapshotTimer() {
  // Premier snapshot après 30s (app bien chargée)
  setTimeout(function(){
    snapshotAll();
    // Puis toutes les 5 minutes
    setInterval(snapshotAll, 5 * 60 * 1000);
  }, 30000);
  // Démarrer le polling présence admin
  startPresencePolling();
}

function adminPrepa() {
  // Toutes les commandes actives (non annulees, non recuperees) peu importe la date
  var allOrders = getOrders();
  var activeStatus = ['pending','confirmed','preparing','ready'];
  var orders = allOrders.filter(function(o) {
    return activeStatus.indexOf(o.status) >= 0;
  });

  // Aggreger tous les produits
  var counts = {};
  orders.forEach(function(o) {
    (o.items||[]).forEach(function(item) {
      if (item.isReward) return;
      var key = item.name;
      if (!counts[key]) counts[key] = {name: item.name, cat: item.cat||'', qty: 0, details: [], orderNums: []};
      counts[key].qty += (item.qty || 1);
      if (item.details && item.details.trim()) {
        for (var q = 0; q < (item.qty||1); q++) counts[key].details.push(item.details);
      }
      if (o.orderNumber) counts[key].orderNums.push('N\u00b0'+o.orderNumber);
    });
  });

  var CAT_ORDER = ['bokit','agoulou','crepe_salee','crepe_sucree','mini_bokit','enfant','boisson'];
  var CAT_LABELS = {
    bokit:       '🥩 Bokits',
    agoulou:     '🌯 Agoulous',
    crepe_salee: '🥞 Crèpes Salées',
    crepe_sucree:'🍫 Crèpes Sucrées',
    mini_bokit:  '📦 Mini Bokits',
    enfant:      '🧒 Menus Enfants',
    boisson:     '🥤 Boissons'
  };

  var bycat = {};
  Object.values(counts).forEach(function(p) {
    var cat = p.cat || 'autre';
    if (!bycat[cat]) bycat[cat] = [];
    bycat[cat].push(p);
  });

  var totalItems = Object.values(counts).reduce(function(s,p){return s+p.qty;},0);

  var html = '<div style="padding:.75rem">';
  html += '<div class="sec-title">🍴 Récap Préparation \u2014 Commandes actives</div>';

  // Bandeau résumé
  html += '<div style="display:flex;gap:.5rem;margin-bottom:1rem">';
  html += '<div class="card" style="flex:1;text-align:center;padding:.75rem">';
  html += '<div style="font-size:1.8rem;font-weight:900;color:var(--red)">' + orders.length + '</div>';
  html += '<div class="text-muted" style="font-size:.73rem">commandes</div></div>';
  html += '<div class="card" style="flex:1;text-align:center;padding:.75rem">';
  html += '<div style="font-size:1.8rem;font-weight:900;color:var(--gold)">' + totalItems + '</div>';
  html += '<div class="text-muted" style="font-size:.73rem">articles</div></div>';
  html += '</div>';

  if (!orders.length) {
    html += '<div class="empty-state" style="padding:2rem 0"><div class="icon">📭</div>';
    html += '<div class="title">Aucune commande active</div></div>';
    html += '</div>';
    return html;
  }

  // Afficher par catégorie
  var orderedCats = CAT_ORDER.filter(function(k){ return bycat[k] && bycat[k].length; });
  var otherCats   = Object.keys(bycat).filter(function(k){ return CAT_ORDER.indexOf(k)<0; });

  orderedCats.concat(otherCats).forEach(function(cat) {
    var items    = bycat[cat].slice().sort(function(a,b){return b.qty-a.qty;});
    var catTotal = items.reduce(function(s,p){return s+p.qty;},0);
    var label    = CAT_LABELS[cat] || ('📌 '+cat);

    html += '<div class="sec-title" style="margin-top:1rem">' + label;

    html += '<div class="card" style="padding:0;overflow:hidden">';

    items.forEach(function(p, i) {
      var bg = i%2===0 ? 'background:var(--dark3)' : 'background:var(--dark2)';
      var border = i < items.length-1 ? ';border-bottom:1px solid var(--border)' : '';
      html += '<div style="display:flex;align-items:flex-start;gap:.75rem;padding:.7rem .9rem;' + bg + border + '">';

      // Nom + détails
      html += '<div style="flex:1">';
      html += '<div style="font-weight:700;font-size:.9rem">' + p.name + '</div>';
      if (p.details.length) {
        // Compter les combinaisons identiques
        var detailMap = {};
        p.details.forEach(function(d){ detailMap[d] = (detailMap[d]||0)+1; });
        Object.keys(detailMap).forEach(function(d) {
          var cnt = detailMap[d];
          html += '<div class="text-muted" style="font-size:.72rem;margin-top:.15rem">';
          html += (cnt>1 ? '<strong style="color:var(--text)">x'+cnt+'</strong> ' : '') + d;
          html += '</div>';
        });
      }
      html += '</div>';

      // Numéros de commandes
      html += '<div style="font-size:.68rem;color:var(--muted);text-align:right;padding-top:.15rem">' + p.orderNums.join(', ') + '</div>';
      html += '</div>';
    });
    html += '</div>';
  });

  html += '<button class="btn btn-secondary btn-full mt-2" onclick="document.getElementById(\'admin-content\').innerHTML=adminPrepa()" style="font-size:.8rem">🔄 Actualiser</button>';
  html += '</div>';
  return html;
}

function moSetPay(val) {
  _manualOrderData.payment = val;
  renderManualOrderModal();
}

function moAddSimple(pid, pname, pprice, pcat) {
  _manualOrderData.prenom = (document.getElementById('mo-prenom')||{}).value || _manualOrderData.prenom;
  _manualOrderData.phone  = (document.getElementById('mo-phone')||{}).value  || _manualOrderData.phone;
  _manualOrderData.email  = (document.getElementById('mo-email')||{}).value  || _manualOrderData.email || '';
  _manualOrderData.slot   = (document.getElementById('mo-slot')||{}).value   || _manualOrderData.slot;

  renderManualOrderModal();
}

function moRemoveItem(name) {
  var idx = _manualCart.findIndex(function(i){ return i.name===name; });
  if (idx>=0) _manualCart.splice(idx,1);
  renderManualOrderModal();
}

function moConfigProduct(pid) {
  _manualOrderData.prenom = (document.getElementById('mo-prenom')||{}).value || _manualOrderData.prenom;
  _manualOrderData.phone  = (document.getElementById('mo-phone')||{}).value  || _manualOrderData.phone;
  _manualOrderData.email  = (document.getElementById('mo-email')||{}).value  || _manualOrderData.email || '';
  _manualOrderData.slot   = (document.getElementById('mo-slot')||{}).value   || _manualOrderData.slot;
  // Ouvrir la modale de config produit — addToCart() détectera _manualOrderMode
  continueOpenProduct(pid);
}

// Recherche client dans la modale manuelle
function moSearchClient(q) {
  var res = document.getElementById('mo-client-results');
  if (!res) return;
  q = (q||'').trim().toLowerCase();
  if (q.length < 2) { res.innerHTML = ''; return; }
  var users = getUsers().filter(function(u){ return !u.role || u.role==='client'; });
  var found = users.filter(function(u){
    return (u.prenom||'').toLowerCase().indexOf(q)>=0
      || (u.phone||'').replace(/\s/g,'').indexOf(q.replace(/\s/g,''))>=0
      || (u.email||'').toLowerCase().indexOf(q)>=0;
  }).slice(0,5);
  if (!found.length) { res.innerHTML = '<div class="text-sm text-muted" style="padding:.3rem 0">Aucun client trouvé</div>'; return; }
  var h = '';
  found.forEach(function(u){
    h += '<div data-uid="'+u.id+'" onclick="moSelectClient(\''+u.id+'\')" style="display:flex;justify-content:space-between;align-items:center;padding:.4rem .65rem;background:var(--dark3);border-radius:6px;margin-bottom:.2rem;cursor:pointer;border:1px solid var(--border)">'
      + '<span class="fw-700 text-sm">'+u.prenom+'</span>'
      + '<span class="text-sm text-muted">'+( u.phone||u.email||'')+'</span>'
      + '</div>';
  });
  res.innerHTML = h;
}

function moSelectClient(uid) {
  var u = getUsers().find(function(x){ return x.id===uid; });
  if (!u) return;
  // Stocker l'ID du client lié
  _manualOrderData.linkedUserId = u.id;
  _manualOrderData.prenom = u.prenom;
  _manualOrderData.phone  = u.phone  || _manualOrderData.phone;
  _manualOrderData.email  = u.email  || '';
  // Mettre à jour les champs
  var pEl = document.getElementById('mo-prenom');
  var phEl = document.getElementById('mo-phone');
  var emEl = document.getElementById('mo-email');
  if (pEl)  pEl.value  = u.prenom;
  if (phEl) phEl.value = u.phone || '';
  if (emEl) emEl.value = u.email || '';
  // Afficher la sélection
  var selEl = document.getElementById('mo-client-selected');
  if (selEl) {
    selEl.style.display = 'block';
    selEl.innerHTML = '✅ <strong>'+u.prenom+'</strong>'
      + (u.phone ? ' · '+u.phone : '')
      + (u.email ? ' · '+u.email : '')
      + ' <button onclick="moUnselectClient()" style="margin-left:.5rem;background:none;border:none;color:var(--muted);cursor:pointer;font-size:.8rem">✕</button>';
  }
  // Vider la recherche
  var srEl = document.getElementById('mo-client-search');
  var resEl = document.getElementById('mo-client-results');
  if (srEl) srEl.value = '';
  if (resEl) resEl.innerHTML = '';
}

function moUnselectClient() {
  _manualOrderData.linkedUserId = null;
  var selEl = document.getElementById('mo-client-selected');
  if (selEl) selEl.style.display = 'none';
}

function submitManualOrder() {
  _manualOrderData.prenom = (document.getElementById('mo-prenom')||{}).value || _manualOrderData.prenom;
  _manualOrderData.phone  = (document.getElementById('mo-phone')||{}).value  || _manualOrderData.phone;
  _manualOrderData.email  = (document.getElementById('mo-email')||{}).value  || _manualOrderData.email || '';
  _manualOrderData.slot   = (document.getElementById('mo-slot')||{}).value   || _manualOrderData.slot;
  var prenom = _manualOrderData.prenom.trim();
  var phone  = _manualOrderData.phone.trim();
  var slot   = _manualOrderData.slot.trim();
  if (!prenom) { toast('Entrez le prénom du client','warning'); return; }
  if (!slot)   { toast('Choisissez un créneau','warning'); return; }
  if (!_manualCart.length) { toast('Ajoutez au moins un produit','warning'); return; }
  var cfg    = getCfg();
  var orders = getOrders();
  var num    = String(orders.length+1).padStart(4,'0');
  var today  = new Date().toISOString().split('T')[0];
  var total  = _manualCart.reduce(function(s,i){return s+i.price;},0);
  var linkedId = _manualOrderData.linkedUserId || ('guest-'+genId());
  var email = ((document.getElementById('mo-email')||{}).value || _manualOrderData.email || '').trim();
  var order  = {
    id:genId(), orderNumber:num,
    userId:linkedId, userPrenom:prenom, userPhone:phone,
    items:_manualCart.slice(), total:total, originalTotal:total,
    pickupDate:today, pickupTime:slot,
    payment:_manualOrderData.payment||'Especes',
    status:'confirmed', createdAt:new Date().toISOString(),
    pointsAwarded:false, manualEntry:true
  };
  // Sauvegarder et gérer les erreurs réseau
  try {
    saveOrder(order);
  } catch(saveErr) {
    btnReset(confirmBtn);
    if(confirmBtn) confirmBtn._loading = false;
    toast('❌ Erreur réseau, votre commande n\'a pas pu être prise en compte. Veuillez réessayer ou nous contacter via WhatsApp.', 'error', 8000);
    return;
  }
  // Réactiver le bouton (commande OK)
  btnReset(confirmBtn);
  if(confirmBtn) confirmBtn._loading = false;
  // Envoyer email si disponible
  if (email) {
    var emailUser = {prenom: prenom, email: email};
    sendOrderEmail(order, emailUser, cfg);
  }
  // Notifier le client sur son compte s'il est lié
  if (_manualOrderData.linkedUserId) {
    notify(_manualOrderData.linkedUserId, '✅ Commande confirmée !', 'Votre commande est enregistrée. Retrait à '+slot+'.');
    db.ref('status_updates/'+_manualOrderData.linkedUserId+'/manual-'+order.id).set({
      status:'confirmed', orderId:order.id, orderNumber:num,
      title:'✅ Commande confirmée !',
      body:'Votre commande est enregistrée. Retrait à '+slot+'.',
      at:new Date().toISOString()
    });
  }
  _manualOrderMode = false;
  _manualOrderData.linkedUserId = null;
  _manualCart = [];
  closeModal('m-product');
  toast('Commande N°'+num+' confirmée pour '+prenom+' ! 🌴','success',4000);
  document.getElementById('admin-content').innerHTML = adminOrders();
}

function adminOrders(){
  var html_top='<div style="padding:.5rem .9rem .75rem">';

  html_top+='<button class="btn btn-sm" style="flex:1;background:rgba(239,68,68,.12);border:1px solid #ef4444;color:#ef4444" onclick="restoreFromSnapshot()">🔄 Restaurer</button>';
  html_top+='</div>';

  html_top+='<div style="margin-top:.5rem"><div class="text-sm text-muted" style="margin-bottom:.35rem">⏰ Créneaux ce soir — appuyez pour bloquer/débloquer :</div>';

    var bActive=activeStatus.indexOf(b.status)>=0;
    if(aActive&&!bActive) return -1;
    if(!aActive&&bActive) return 1;
    if(aActive&&bActive){
      var ta=a.pickupTime||'99:99'; var tb=b.pickupTime||'99:99';
      if(ta!==tb) return ta.localeCompare(tb);
      return (a.pickupDate||'').localeCompare(b.pickupDate||'');
    }
    return new Date(b.createdAt)-new Date(a.createdAt);
  });
  if(!orders.length) return html_top+'<div class="empty-state"><div class="icon">📭</div><div class="title">Aucune commande</div><p class="text-sm">Saisissez la premiere commande !</p></div>';

        +(r.comment?'<div class="text-sm text-muted mt-1">'+r.comment+'</div>':'')

        +'</div>';

  return html+'</div>';
}

function launchConfetti(duration) {
  duration = duration || 2500;
  var colors = ['#C8232B','#D4AF37','#fff','#10b981','#3b82f6','#f59e0b'];
  var container = document.createElement('div');
  container.style.cssText = 'position:fixed;inset:0;pointer-events:none;z-index:9999;overflow:hidden';
  document.body.appendChild(container);
  for (var i = 0; i < 80; i++) {
    (function(i) {
      var el = document.createElement('div');
      var size = Math.random() * 8 + 6;
      var color = colors[Math.floor(Math.random() * colors.length)];
      var left = Math.random() * 100;
      var delay = Math.random() * 1.5;
      var dur = Math.random() * 1.5 + 2;
      var shape = Math.random() > 0.5 ? '50%' : '0';
      el.style.cssText = 'position:absolute;top:-20px;left:'+left+'%;width:'+size+'px;height:'+size+'px;background:'+color+';border-radius:'+shape+';animation:confettiFall '+dur+'s ease '+delay+'s forwards,confettiWiggle '+(.3+Math.random()*.4)+'s ease infinite';
      container.appendChild(el);
    })(i);
  }
  setTimeout(function(){ if(container.parentNode) container.parentNode.removeChild(container); }, duration + 2000);
}

function openPrepView(orderId) {
  db.ref('data/ba_orders/' + orderId).once('value').then(function(snap) {
    var o = snap.val();
    if (!o) { o = getOrders().find(function(x){ return x.id===orderId; }); }
